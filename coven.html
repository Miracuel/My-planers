<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coven — din digitala vänskapsbok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14101C; --ink-2:#1A1525; --velvet:#231C31; --velvet-hi:#2E2640;
    --line:#3A3050; --gold:#CBA75E; --gold-soft:#E8D6A8; --gold-deep:#9A7C3F;
    --moon:#C3CBE0; --sage:#93A57E; --rose:#C089A0; --ember:#CE8159;
    --parchment:#ECE4D4; --mist:#9C90AE; --mist-2:#6F6584;
    --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
    --sans:'Inter',-apple-system,system-ui,sans-serif;
    --shadow:0 20px 50px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans); color:var(--parchment); background:var(--ink);
    -webkit-font-smoothing:antialiased; overflow:hidden; line-height:1.5;
    background-image:
      radial-gradient(1200px 800px at 80% -10%, rgba(203,167,94,.10), transparent 60%),
      radial-gradient(900px 700px at -10% 110%, rgba(192,137,160,.08), transparent 55%);
  }
  #stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--moon);opacity:.5}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}
  @keyframes drift{0%{transform:translateY(0)}100%{transform:translateY(-14px)}}
  @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(203,167,94,.0)}50%{box-shadow:0 0 18px 2px rgba(203,167,94,.18)}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* ---------- Shell ---------- */
  .app{position:relative;z-index:1;height:100dvh;display:grid;grid-template-columns:1fr}
  @media(min-width:900px){.app{grid-template-columns:248px 1fr}}

  /* Sidebar (desktop) */
  .side{display:none;border-right:1px solid var(--line);padding:26px 18px;flex-direction:column;gap:6px;background:linear-gradient(180deg,var(--ink-2),var(--ink))}
  @media(min-width:900px){.side{display:flex}}
  .brand{display:flex;align-items:center;gap:11px;padding:4px 10px 22px}
  .brand .moon{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 34% 32%,var(--gold-soft),var(--gold) 55%,var(--gold-deep));box-shadow:0 0 22px rgba(203,167,94,.45)}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:.04em;color:var(--gold-soft)}
  .nav-btn{display:flex;align-items:center;gap:13px;width:100%;padding:11px 14px;border-radius:12px;background:none;border:none;color:var(--mist);font-family:var(--sans);font-size:14.5px;cursor:pointer;text-align:left;transition:.18s}
  .nav-btn .ic{width:20px;text-align:center;font-size:16px;opacity:.85}
  .nav-btn:hover{background:var(--velvet);color:var(--parchment)}
  .nav-btn.on{background:var(--velvet-hi);color:var(--gold-soft)}
  .nav-btn.on .ic{opacity:1}
  .side .spacer{flex:1}
  .add-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:12px;border-radius:12px;border:1px solid var(--gold-deep);background:linear-gradient(180deg,rgba(203,167,94,.16),rgba(203,167,94,.06));color:var(--gold-soft);font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;transition:.18s}
  .add-btn:hover{background:rgba(203,167,94,.22);box-shadow:0 0 18px rgba(203,167,94,.25)}

  /* Topbar (mobile) */
  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 6px}
  @media(min-width:900px){.top{display:none}}
  .top .brand{padding:0}
  .top .brand h1{font-size:26px}
  .top .brand .moon{width:26px;height:26px}

  main{overflow-y:auto;padding:14px 18px 110px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  @media(min-width:900px){main{padding:34px 40px 40px}}
  .view{animation:rise .4s ease both;max-width:1040px;margin:0 auto}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist-2);margin-bottom:6px}
  .view h2{font-family:var(--serif);font-weight:500;font-size:34px;color:var(--parchment);line-height:1.1;margin-bottom:4px}
  .view .sub{color:var(--mist);font-size:14px;margin-bottom:24px;max-width:54ch}

  /* ---------- Orbital circle ---------- */
  .orbit-wrap{display:flex;flex-direction:column;align-items:center}
  .orbit{position:relative;width:min(86vw,500px);aspect-ratio:1;margin:6px auto 8px}
  .ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(195,203,224,.10);margin:auto}
  .core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:74px;height:74px;border-radius:50%;
    background:radial-gradient(circle at 36% 30%,#fff7e6,var(--gold) 52%,var(--gold-deep));
    box-shadow:0 0 50px rgba(203,167,94,.5),inset -6px -8px 16px rgba(120,90,40,.5);
    display:flex;align-items:center;justify-content:center;animation:pulseGlow 5s ease-in-out infinite}
  .core span{font-family:var(--serif);font-size:13px;color:#3a2c12;letter-spacing:.16em;font-weight:600}
  .orb{position:absolute;transform:translate(-50%,-50%);cursor:pointer;border:none;background:none;padding:0;transition:filter .2s}
  .orb:hover{filter:brightness(1.12)}
  .orb .disc{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:19px;color:var(--ink);overflow:hidden;border:1.5px solid rgba(232,214,168,.55);box-shadow:0 4px 14px rgba(0,0,0,.45)}
  .orb .disc img{width:100%;height:100%;object-fit:cover}
  .orb .nm{display:block;text-align:center;margin-top:5px;font-size:10.5px;color:var(--mist);max-width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .orb .stat{position:absolute;right:-1px;top:-1px;width:13px;height:13px;border-radius:50%;border:2px solid var(--ink)}
  .legend{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;margin-top:6px}
  .legend span{font-size:11.5px;color:var(--mist);display:flex;align-items:center;gap:6px}
  .legend i{width:8px;height:8px;border-radius:50%;display:inline-block}

  /* ---------- Friend grid / cards ---------- */
  .group{margin-top:30px}
  .group h3{font-family:var(--serif);font-size:21px;color:var(--gold-soft);font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .group h3 .ct{font-family:var(--sans);font-size:11px;color:var(--mist-2);background:var(--velvet);padding:2px 9px;border-radius:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:13px}
  .fcard{background:linear-gradient(180deg,var(--velvet),var(--ink-2));border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .fcard:hover{border-color:var(--gold-deep);transform:translateY(-3px);box-shadow:var(--shadow)}
  .fcard .av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:22px;color:var(--ink);overflow:hidden;margin-bottom:11px;border:1.5px solid rgba(232,214,168,.4)}
  .fcard .av img{width:100%;height:100%;object-fit:cover}
  .fcard .fn{font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.15}
  .fcard .meta{font-size:12px;color:var(--mist);margin-top:2px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 9px;border-radius:20px;margin-top:11px;border:1px solid transparent}
  .pill i{width:7px;height:7px;border-radius:50%}

  .empty{border:1px dashed var(--line);border-radius:18px;padding:42px 24px;text-align:center;color:var(--mist);margin-top:10px}
  .empty .gly{font-family:var(--serif);font-size:40px;color:var(--gold);opacity:.7;margin-bottom:8px}
  .empty button{margin-top:16px}

  /* ---------- Buttons / chips ---------- */
  .btn{font-family:var(--sans);font-size:13.5px;border-radius:11px;padding:10px 16px;cursor:pointer;border:1px solid var(--line);background:var(--velvet);color:var(--parchment);transition:.18s}
  .btn:hover{background:var(--velvet-hi);border-color:var(--gold-deep)}
  .btn.gold{border-color:var(--gold-deep);background:linear-gradient(180deg,rgba(203,167,94,.18),rgba(203,167,94,.07));color:var(--gold-soft);font-weight:600}
  .btn.gold:hover{background:rgba(203,167,94,.26)}
  .btn.ghost{background:none}
  .chip{font-size:12px;padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:var(--ink-2);color:var(--mist);cursor:pointer;transition:.15s;font-family:var(--sans)}
  .chip:hover{border-color:var(--gold-deep);color:var(--parchment)}
  .chip.on{background:rgba(203,167,94,.16);border-color:var(--gold);color:var(--gold-soft)}

  /* ---------- Modal / drawer ---------- */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(8,6,14,.72);backdrop-filter:blur(4px);animation:fade .25s ease;display:flex;justify-content:center;align-items:flex-end}
  @media(min-width:760px){.scrim{align-items:center}}
  .sheet{width:100%;max-width:560px;max-height:92dvh;overflow-y:auto;background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);border-radius:22px 22px 0 0;box-shadow:var(--shadow);animation:rise .3s ease;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  @media(min-width:760px){.sheet{border-radius:22px}}
  .sheet-pad{padding:22px 22px 28px}
  .sheet-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:4px}
  .x{background:var(--velvet);border:1px solid var(--line);color:var(--mist);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:17px;flex:none;transition:.15s}
  .x:hover{color:var(--parchment);border-color:var(--gold-deep)}

  /* friend detail */
  .det-top{display:flex;gap:16px;align-items:center;margin-bottom:18px}
  .det-av{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:32px;color:var(--ink);overflow:hidden;flex:none;border:2px solid rgba(232,214,168,.5)}
  .det-av img{width:100%;height:100%;object-fit:cover}
  .det-top h3{font-family:var(--serif);font-size:30px;font-weight:500;line-height:1.05}
  .det-top .cat{font-size:12px;color:var(--mist);letter-spacing:.04em}
  .facts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0 18px}
  .fact{background:var(--velvet);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .fact .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist-2)}
  .fact .v{font-size:14px;color:var(--parchment);margin-top:3px;word-break:break-word}
  .blk{margin:16px 0}
  .blk .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
  .blk p{font-size:14px;color:var(--parchment);white-space:pre-wrap;line-height:1.55}
  .blk .muted{color:var(--mist-2);font-style:italic}

  /* tarot card */
  .tarot{width:124px;flex:none}
  .tarot .card{aspect-ratio:.62;border-radius:11px;background:linear-gradient(160deg,#241b33,#171120);border:1.5px solid var(--gold-deep);box-shadow:0 10px 26px -8px rgba(0,0,0,.7),inset 0 0 0 3px rgba(203,167,94,.12);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:11px 8px;text-align:center;position:relative;overflow:hidden}
  .tarot .card::before{content:'';position:absolute;inset:5px;border:1px solid rgba(203,167,94,.28);border-radius:7px;pointer-events:none}
  .tarot .rn{font-family:var(--serif);font-size:13px;letter-spacing:.1em;color:var(--gold)}
  .tarot .gl{font-size:30px;line-height:1;color:var(--gold-soft);text-shadow:0 0 16px rgba(203,167,94,.5)}
  .tarot .tn{font-family:var(--serif);font-size:15px;color:var(--gold-soft);line-height:1.05}
  .tarot .mn{font-size:10px;color:var(--mist);margin-top:1px}
  .det-tarot{display:flex;gap:16px;align-items:center;background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:6px}
  .det-tarot .meaning .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mist-2)}
  .det-tarot .meaning h4{font-family:var(--serif);font-weight:500;font-size:22px;color:var(--gold-soft);margin:2px 0}
  .det-tarot .meaning p{font-size:13px;color:var(--mist)}

  /* status row */
  .statrow{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 4px}

  /* rituals quick */
  .rit-quick{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}

  /* AI panel */
  .ai-box{background:linear-gradient(180deg,rgba(192,137,160,.10),rgba(203,167,94,.05));border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:6px}
  .ai-box .hd{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .ai-box .hd .o{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 32%,var(--rose),#7d4f63);display:flex;align-items:center;justify-content:center;font-size:14px}
  .ai-box .hd h4{font-family:var(--serif);font-size:19px;font-weight:500;color:var(--gold-soft)}
  .ai-opts{display:flex;flex-wrap:wrap;gap:8px}
  .ai-out{margin-top:14px;background:var(--ink);border:1px solid var(--line);border-radius:12px;padding:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;color:var(--parchment);animation:fade .3s}
  .ai-out.load{color:var(--mist);font-style:italic}
  .ai-out .cp{margin-top:12px}
  .dots::after{content:'';animation:dots 1.4s steps(4,end) infinite}
  @keyframes dots{0%{content:''}25%{content:'·'}50%{content:'· ·'}75%{content:'· · ·'}}

  /* form */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mist-2);margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--parchment);font-family:var(--sans);font-size:14px;transition:.15s}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(203,167,94,.14)}
  .field textarea{resize:vertical;min-height:64px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .selgrid{display:flex;flex-wrap:wrap;gap:8px}
  .photo-pick{display:flex;align-items:center;gap:14px}
  .photo-prev{width:62px;height:62px;border-radius:50%;background:var(--velvet);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:var(--serif);font-size:24px;color:var(--mist)}
  .photo-prev img{width:100%;height:100%;object-fit:cover}
  .form-actions{display:flex;gap:10px;margin-top:22px}
  .form-actions .btn{flex:1}
  .del-link{background:none;border:none;color:var(--ember);font-size:12.5px;cursor:pointer;margin-top:14px;font-family:var(--sans);opacity:.85}
  .del-link:hover{opacity:1;text-decoration:underline}

  /* rituals view */
  .rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:13px}
  .rit{background:linear-gradient(180deg,var(--velvet),var(--ink-2));border:1px solid var(--line);border-radius:16px;padding:18px 16px;text-align:center}
  .rit .g{font-size:26px;margin-bottom:8px}
  .rit h4{font-family:var(--serif);font-size:18px;font-weight:500;margin-bottom:10px}
  .rit .btn{width:100%;font-size:12.5px;padding:8px}

  /* memories */
  .mem{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}
  .mem .when{font-size:11px;color:var(--mist-2);flex:none;width:74px;padding-top:2px}
  .mem .body .who{font-family:var(--serif);font-size:16px;color:var(--gold-soft)}
  .mem .body p{font-size:14px;color:var(--parchment);margin-top:2px;white-space:pre-wrap}

  /* bottom nav (mobile) */
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-around;background:rgba(20,16,28,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:9px 6px calc(9px + env(safe-area-inset-bottom))}
  @media(min-width:900px){.tabbar{display:none}}
  .tab{background:none;border:none;color:var(--mist-2);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-family:var(--sans);cursor:pointer;flex:1;padding:4px 0;transition:.15s}
  .tab .ic{font-size:18px}
  .tab.on{color:var(--gold-soft)}
  .tab.fab .ic{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:var(--ink);font-size:24px;margin-top:-24px;box-shadow:0 8px 22px rgba(203,167,94,.4);border:3px solid var(--ink)}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:60;background:var(--velvet-hi);border:1px solid var(--gold-deep);color:var(--gold-soft);padding:11px 20px;border-radius:30px;font-size:13.5px;box-shadow:var(--shadow);animation:rise .25s ease;white-space:nowrap}
  @media(min-width:900px){.toast{bottom:30px}}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="stars"></div>

<div class="app">
  <!-- Sidebar (desktop) -->
  <aside class="side">
    <div class="brand"><span class="moon"></span><h1>Coven</h1></div>
    <button class="nav-btn on" data-go="circle"><span class="ic">☾</span> Cirkeln</button>
    <button class="nav-btn" data-go="energy"><span class="ic">◐</span> Energi</button>
    <button class="nav-btn" data-go="rituals"><span class="ic">✶</span> Ritualer</button>
    <button class="nav-btn" data-go="memories"><span class="ic">❧</span> Minnen</button>
    <div class="spacer"></div>
    <button class="add-btn" data-add>＋ Lägg till vän</button>
  </aside>

  <div style="display:flex;flex-direction:column;min-height:0">
    <!-- Topbar (mobile) -->
    <div class="top">
      <div class="brand"><span class="moon"></span><h1>Coven</h1></div>
    </div>
    <main id="main"></main>
  </div>
</div>

<!-- Bottom nav (mobile) -->
<nav class="tabbar">
  <button class="tab on" data-go="circle"><span class="ic">☾</span>Cirkeln</button>
  <button class="tab" data-go="energy"><span class="ic">◐</span>Energi</button>
  <button class="tab fab" data-add><span class="ic">＋</span></button>
  <button class="tab" data-go="rituals"><span class="ic">✶</span>Ritualer</button>
  <button class="tab" data-go="memories"><span class="ic">❧</span>Minnen</button>
</nav>

<div id="modal"></div>
<div id="toast"></div>

<script>
/* ============================ DATA ============================ */
const CATEGORIES = [
  {key:'nara',   label:'Nära vänner',  ring:0},
  {key:'familj', label:'Familj',       ring:1},
  {key:'nya',    label:'Nya vänner',   ring:2},
  {key:'online', label:'Onlinevänner', ring:3},
  {key:'kollegor',label:'Kollegor',    ring:4},
];
const ENERGY = {
  ok:   {label:'Vi är okej',            color:'var(--sage)'},
  soon: {label:'Ses snart',             color:'var(--gold)'},
  soft: {label:'Behöver mjuk kontakt',  color:'var(--rose)'},
  reach:{label:'Borde höra av mig',     color:'var(--ember)'},
  low:  {label:'Låg energi just nu',    color:'var(--mist)'},
};
const TAROT = {
  sun:        {name:'The Sun',          rn:'XIX',  gl:'☉', meaning:'Glädje'},
  moon:       {name:'The Moon',         rn:'XVIII',gl:'☾', meaning:'Mystik'},
  star:       {name:'The Star',         rn:'XVII', gl:'✶', meaning:'Hopp & lugn'},
  hermit:     {name:'The Hermit',       rn:'IX',   gl:'✦', meaning:'Egentid'},
  lovers:     {name:'The Lovers',       rn:'VI',   gl:'♡', meaning:'Djup connection'},
  tower:      {name:'The Tower',        rn:'XVI',  gl:'⚡', meaning:'Kaosvän — på bra sätt'},
  empress:    {name:'The Empress',      rn:'III',  gl:'♀', meaning:'Omtänksam'},
  strength:   {name:'Strength',         rn:'VIII', gl:'∞', meaning:'Trygg styrka'},
  magician:   {name:'The Magician',     rn:'I',    gl:'✷', meaning:'Inspirerande'},
  priestess:  {name:'High Priestess',   rn:'II',   gl:'☽', meaning:'Intuitiv'},
  wheel:      {name:'Wheel of Fortune', rn:'X',    gl:'❂', meaning:'Äventyr'},
  fool:       {name:'The Fool',         rn:'0',    gl:'✧', meaning:'Spontan & fri'},
  temperance: {name:'Temperance',       rn:'XIV',  gl:'≈', meaning:'Balans'},
};
const RITUALS = [

/* ============================ STORAGE ============================ */
const KEY_INDEX='coven:index:v1';
let state={view:'circle', friends:[], selected:null, ready:false};

async function sGet(k){ try{const r=await window.storage.get(k);return r?r.value:null;}catch(e){return null;} }
async function sSet(k,v){ try{await window.storage.set(k,v);}catch(e){console.error('save',e);} }
async function sDel(k){ try{await window.storage.delete(k);}catch(e){} }

async function loadAll(){
  let ids=[];
  const idx=await sGet(KEY_INDEX);
  if(idx){ try{ids=JSON.parse(idx).ids||[];}catch(e){} }
  const out=[];
  for(const id of ids){
    const raw=await sGet('coven:friend:'+id);
    if(raw){ try{out.push(JSON.parse(raw));}catch(e){} }
  }
  state.friends=out; state.ready=true;
}
async function saveIndex(){ await sSet(KEY_INDEX, JSON.stringify({ids:state.friends.map(f=>f.id)})); }
async function saveFriend(f){ await sSet('coven:friend:'+f.id, JSON.stringify(f)); }
async function persistAll(){ for(const f of state.friends) await saveFriend(f); await saveIndex(); }

/* ============================ HELPERS ============================ */
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function colorFromName(n){const h=[...(n||'?')].reduce((a,c)=>a+c.charCodeAt(0),0)%360;return `linear-gradient(150deg,hsl(${h} 42% 62%),hsl(${(h+40)%360} 38% 42%))`;}
function initials(n){return (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}
function timeAgo(ts){ if(!ts) return null; const d=Date.now()-ts, day=864e5;
  if(d<day) return 'idag'; const days=Math.floor(d/day);
  if(days<7) return days+' d sedan'; if(days<31) return Math.floor(days/7)+' v sedan';
  return Math.floor(days/30)+' mån sedan'; }
function avatarHTML(f,cls){
  if(f.photo) return `<div class="${cls}" style="background:#000"><img src="${f.photo}" alt=""></div>`;
  return `<div class="${cls}" style="background:${colorFromName(f.name)}">${esc(initials(f.name))}</div>`;
}
function toast(msg){ const t=$('#toast'); t.innerHTML=`<div class="toast">${esc(msg)}</div>`; clearTimeout(toast._t); toast._t=setTimeout(()=>t.innerHTML='',2200); }

/* ============================ STARFIELD ============================ */
(function(){const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;const w=$('#stars');let h='';
  for(let i=0;i<46;i++){const x=Math.random()*100,y=Math.random()*100,s=Math.random()*1.6+1,dur=(3+Math.random()*4).toFixed(1),del=(Math.random()*5).toFixed(1);
    h+=`<span class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;${reduce?'':`animation:twinkle ${dur}s ease-in-out ${del}s infinite`}"></span>`;}
  w.innerHTML=h;})();

/* ============================ VIEW: CIRCLE ============================ */
function viewCircle(){
  const m=$('#main');
  if(state.friends.length===0){
    m.innerHTML=`<div class="view"><p class="eyebrow">Din vänskapsbok</p><h2>Cirkeln</h2>
      <p class="sub">Samla dina människor, deras energi och magiska profil på ett ställe.</p>
      <div class="empty"><div class="gly">☾</div><div>Din cirkel är tom ännu.</div>
      <div style="font-size:13px;margin-top:6px;color:var(--mist-2)">Bjud in din första vän till covenet.</div>
      <button class="btn gold" onclick="openForm(null)">＋ Lägg till vän</button></div></div>`;
    return;
  }
  // orbital
  let orbs='';
  CATEGORIES.forEach(cat=>{
    const inRing=state.friends.filter(f=>f.category===cat.key);
    const r= 14 + cat.ring*9; // percent radius
    inRing.forEach((f,i)=>{
      const ang=(i/inRing.length)*Math.PI*2 - Math.PI/2 + (cat.ring*0.4);
      const x=50 + Math.cos(ang)*r, y=50 + Math.sin(ang)*r;
      const ec=ENERGY[f.energy]?ENERGY[f.energy].color:'var(--mist)';
      orbs+=`<button class="orb" style="left:${x}%;top:${y}%" onclick="openDetail('${f.id}')" aria-label="${esc(f.name)}">
        <span class="stat" style="background:${ec}"></span>
        ${avatarHTML(f,'disc')}
        <span class="nm">${esc(f.name.split(' ')[0])}</span></button>`;
    });
  });
  const rings=[0,1,2,3,4].map(n=>`<div class="ring" style="width:${(14+n*9)*2}%;height:${(14+n*9)*2}%"></div>`).join('');
  const legend=Object.entries(ENERGY).map(([k,v])=>`<span><i style="background:${v.color}"></i>${v.label}</span>`).join('');

  let groups='';
  CATEGORIES.forEach(cat=>{
    const list=state.friends.filter(f=>f.category===cat.key);
    if(!list.length) return;
    groups+=`<div class="group"><h3>${cat.label}<span class="ct">${list.length}</span></h3><div class="grid">${
      list.map(fcardHTML).join('')}</div></div>`;
  });

  m.innerHTML=`<div class="view">
    <p class="eyebrow">Din vänskapsbok</p><h2>Cirkeln</h2>
    <p class="sub">Dina människor som en levande karta. Inringen är närmast hjärtat; pricken visar er energi just nu.</p>
    <div class="orbit-wrap">
      <div class="orbit">${rings}<div class="core"><span>COVEN</span></div>${orbs}</div>
      <div class="legend">${legend}</div>
    </div>
    ${groups}
  </div>`;
}
function fcardHTML(f){
  const e=ENERGY[f.energy]||ENERGY.ok; const t=TAROT[f.tarot];
  return `<div class="fcard" onclick="openDetail('${f.id}')">
    ${avatarHTML(f,'av')}
    <div class="fn">${esc(f.name)}</div>
    <div class="meta">${t?esc(t.name)+' · ':''}${f.sign?esc(f.sign):'—'}</div>
    <span class="pill" style="border-color:${e.color};color:${e.color}"><i style="background:${e.color}"></i>${e.label}</span>

}

function aiPrompt(type,f){
  const ctx=[
    `Namn: ${f.name}`,
    f.sign?`Stjärntecken: ${f.sign}`:'',
    f.color?`Favoritfärg: ${f.color}`:'',
    f.music?`Favoritmusik: ${f.music}`:'',
    f.comfort?`Trygghetsbehov: ${f.comfort}`:'',
    f.jokes?`Inside jokes: ${f.jokes}`:'',
    f.notes?`Anteckningar: ${f.notes}`:'',
    `Relation: ${(CATEGORIES.find(c=>c.key===f.category)||{}).label||''}`,
    `Nuvarande energi: ${(ENERGY[f.energy]||{}).label||''}`,
    f.lastContact?`Senaste kontakt: ${timeAgo(f.lastContact)}`:'Vet ej när vi sågs senast',
    (f.tarot&&TAROT[f.tarot])?`Tilldelat tarotkort: ${TAROT[f.tarot].name} (${TAROT[f.tarot].meaning})`:'',
  ].filter(Boolean).join('\n');
  const tasks={
    message:'Föreslå 3 korta, varma meddelanden jag kan skicka för att höra av mig. Träffa rätt ton för just den här personen.',
    gift:'Föreslå 3 omtänksamma presentidéer som passar den här personen, kort motiverade.',
    activity:'Föreslå 3 aktiviteter vi kan göra tillsammans som passar relationen och personens energi.',
    reconnect:'Hjälp mig återuppta kontakten på ett mjukt, ärligt sätt. Ge ett konkret förslag på vad jag kan skriva.',
    needs:'Utifrån anteckningarna och tonen — vad verkar den här personen behöva från mig just nu? Svara empatiskt och konkret.',
  };
  return `Här är min vän:\n${ctx}\n\nUppgift: ${tasks[type]}`;
}
async function askAI(id,type){
  const f=state.friends.find(x=>x.id===id); if(!f)return;
  const out=$('#ai-out');
  out.innerHTML=`<div class="ai-out load">Häxan rådfrågar korten<span class="dots"></span></div>`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
        system:"Du är en varm, intuitiv häx-assistent i appen Coven som hjälper användaren vårda sina vänskaper. Svara alltid på svenska, kort och hjärtligt. Var konkret och personlig utifrån informationen. Skriv inga förklaringar om att du är en AI och inga rubriker — bara förslagen, gärna som en kort punktlista.",
        messages:[{role:"user",content:aiPrompt(type,f)}] })
    });
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.type==='text'?b.text:'').join('\n').trim();
    if(!text) throw new Error('tomt svar');
    out.innerHTML=`<div class="ai-out">${esc(text)}<div class="cp"><button class="chip" onclick="copyAI(this)">Kopiera</button></div></div>`;
    out._last=text;
  }catch(e){
    out.innerHTML=`<div class="ai-out">Häxhjälpen kunde inte nå korten just nu. Försök igen om en stund.</div>`;
  }
}
function copyAI(btn){ const t=$('#ai-out')._last||''; navigator.clipboard&&navigator.clipboard.writeText(t); btn.textContent='Kopierat ✦'; setTimeout(()=>btn.textContent='Kopiera',1500); }

    <div class="field"><label>Tarotkort</label><div class="selgrid" id="sel-tarot">${tarotOpts}</div></div>

    <div class="field"><label>Trygghetsbehov</label><textarea id="i-comfort" placeholder="Vad får den här personen att känna sig trygg?">${val('comfort')}</textarea></div>
    <div class="field"><label>Inside jokes</label><textarea id="i-jokes" placeholder="Era egna skämt och referenser">${val('jokes')}</textarea></div>
    <div class="field"><label>Anteckningar</label><textarea id="i-notes" placeholder="Allt du vill minnas">${val('notes')}</textarea></div>

    <div class="form-actions">
      <button class="btn" onclick="${f?`openDetail('${f.id}')`:'closeModal()'}">Avbryt</button>
      <button class="btn gold" onclick="saveForm('${id||''}')">Spara</button>
    </div>
    ${f?`<button class="del-link" onclick="confirmDelete('${f.id}')">Ta bort ur covenet</button>`:''}
  `);
  // store selections on the modal element
  $('#modal')._pick={cat:(f?f.category:'nara'),energy:(f?f.energy:'ok'),tarot:(f&&f.tarot)||''};
}
function pickCat(b){document.querySelectorAll('#sel-cat .chip').forEach(c=>c.classList.remove('on'));b.classList.add('on');$('#modal')._pick.cat=b.dataset.cat;}
function pickEnergy(b){document.querySelectorAll('#sel-energy .chip').forEach(c=>c.classList.remove('on'));b.classList.add('on');$('#modal')._pick.energy=b.dataset.energy;}
function pickTarot(b){const on=b.classList.contains('on');document.querySelectorAll('#sel-tarot .chip').forEach(c=>c.classList.remove('on'));if(!on){b.classList.add('on');$('#modal')._pick.tarot=b.dataset.tarot;}else{$('#modal')._pick.tarot='';}}

function onPhoto(ev){
  const file=ev.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image(); img.onload=()=>{
    const max=260, sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas'); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    formPhoto=c.toDataURL('image/jpeg',0.82);
    $('#ph-prev').innerHTML=`<img src="${formPhoto}">`;
  }; img.src=e.target.result; };
  reader.readAsDataURL(file);
}
function clearPhoto(){formPhoto=null;$('#ph-prev').innerHTML='☾';}

async function saveForm(id){
  const pick=$('#modal')._pick||{};
  const name=$('#i-name').value.trim();
  if(!name){ $('#i-name').focus(); $('#i-name').style.borderColor='var(--ember)'; return; }
  let f=id?state.friends.find(x=>x.id===id):null;
  const data={ name, photo:formPhoto||null,
    birthday:$('#i-birthday').value, sign:$('#i-sign').value.trim(),
    color:$('#i-color').value.trim(), music:$('#i-music').value.trim(),
    comfort:$('#i-comfort').value.trim(), jokes:$('#i-jokes').value.trim(),
    notes:$('#i-notes').value.trim(),
    category:pick.cat||'nara', energy:pick.energy||'ok', tarot:pick.tarot||'' };
  if(f){ Object.assign(f,data); }
  else{ f={id:uid(), ...data, memories:[], lastContact:null, createdAt:Date.now()}; state.friends.push(f); }
  await saveFriend(f); await saveIndex();
  toast(id?'Sparat ✦':'Tillagd i covenet ✦');
  openDetail(f.id); render();
}
function confirmDelete(id){
  const f=state.friends.find(x=>x.id===id); if(!f)return;
  modal(`<div class="sheet-hd"><h3 style="font-family:var(--serif);font-size:24px;font-weight:500">Ta bort ${esc(f.name)}?</h3><button class="x" onclick="openDetail('${id}')">✕</button></div>
    <p style="color:var(--mist);font-size:14px;margin:6px 0 18px">Detta tar bort kortet och alla minnen kopplade till ${esc(f.name.split(' ')[0])}. Det går inte att ångra.</p>
    <div class="form-actions"><button class="btn" onclick="openDetail('${id}')">Behåll</button>
    <button class="btn" style="border-color:var(--ember);color:var(--ember)" onclick="doDelete('${id}')">Ta bort</button></div>`);
}
async function doDelete(id){
  state.friends=state.friends.filter(x=>x.id!==id);
  await sDel('coven:friend:'+id); await saveIndex();
  closeModal(); toast('Borttagen'); render();
}

/* ============================ INIT ============================ */
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
(async function(){
  render();
  if(typeof window.storage==='undefined'){ state.ready=true; render(); return; }
  await loadAll(); render();
})();
</script>
</body>
</html>
