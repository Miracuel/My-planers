<title>Be The Queen</title>
<style>
:root{
  --bg:#F7F2F7;--panel:#FDFAFD;--panel2:#F0E7F1;--line:#E3D4E6;
  --ink:#372B3C;--muted:#8B7893;--accent:#6E3D7E;--accent-soft:#EBDCEF;
  --gold:#C2A36B;--gold-soft:#F0E6CF;--ok:#7A8B6F;--red:#C0798A;--navbg:rgba(247,242,247,.95);
  --q1:#C2683F;--q2:#4E7FA8;--q3:#5C8A5E;--q4:#7A85A6;
  --q1s:#F6E3D7;--q2s:#DCE8F1;--q3s:#DEEBDE;--q4s:#E2E5EE;
  --grid:#E3D4E6;--shadow:rgba(110,61,126,.16);
}
html[data-theme=dark]{
  --bg:#17121B;--panel:#211A26;--panel2:#2C2233;--line:#3B2E44;
  --ink:#EDE2F0;--muted:#A08FA8;--accent:#B98FCB;--accent-soft:#33253C;
  --gold:#D6BA7C;--gold-soft:#3A3022;--ok:#8FA383;--red:#D4909F;--navbg:rgba(23,18,27,.95);
  --q1:#DE8A5F;--q2:#7BAAD1;--q3:#87B389;--q4:#A2ADCF;
  --q1s:#3A2A20;--q2s:#1E2C38;--q3s:#233022;--q4s:#262A38;
  --grid:#33273A;--shadow:rgba(0,0,0,.42);
}
html[data-skin=guld]{--accent:#A8802F;--accent-soft:#F2E7C9;--gold:#A8802F}
html[data-skin=guld][data-theme=dark]{--accent:#D9BC72;--accent-soft:#3A3018;--gold:#D9BC72}
html[data-skin=moonlight]{--accent:#4C5C93;--accent-soft:#DDE1F0}
html[data-skin=moonlight][data-theme=dark]{--accent:#8B9AD8;--accent-soft:#232842}
html[data-skin=smaragd]{--accent:#2E7A63;--accent-soft:#D6EAE2}
html[data-skin=smaragd][data-theme=dark]{--accent:#5FB79A;--accent-soft:#183028}
html[data-skin=rosenkvarts]{--accent:#B3607F;--accent-soft:#F3DCE5}
html[data-skin=rosenkvarts][data-theme=dark]{--accent:#DB93AF;--accent-soft:#3C2230}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;transition:background .4s,color .4s}
.app{max-width:480px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 14px calc(88px + env(safe-area-inset-bottom));position:relative}
.icon-btns{display:flex;justify-content:space-between;align-items:center;height:30px}
.icon-btn{background:none;border:none;color:var(--muted);font-size:19px;cursor:pointer;padding:2px 6px;font-family:inherit}
h1.brand{font-family:Georgia,serif;font-weight:400;font-size:23px;color:var(--ink);letter-spacing:.06em;text-align:center;margin:0 0 3px}
.brand-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.16em;text-transform:uppercase}
.crest{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 16px}
.page-h{font-family:Georgia,serif;font-size:23px;margin:2px 0 3px;letter-spacing:.02em}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6}
.section-title{font-family:Georgia,serif;font-size:15px;color:var(--ink);margin:20px 0 8px;letter-spacing:.02em;display:flex;justify-content:space-between;align-items:baseline}
.lnk{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:600;font-family:inherit}
.card-panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 1px 3px var(--shadow)}
.card-panel.tight{padding:12px}
.btn{border:1px solid var(--accent);background:var(--panel);color:var(--accent);border-radius:14px;padding:11px 14px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .3s}
.btn:active{background:var(--accent-soft)}
.btn.fill{background:var(--accent);color:#fff}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#fff}
.btn.ghost{border-color:var(--line);color:var(--muted);font-size:12px;padding:7px 10px}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.wide{width:100%}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-row .btn{flex:1}
label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin:12px 0 5px}
input,textarea,select{background:var(--panel2);border:1px solid var(--line);border-radius:11px;color:var(--ink);font-size:14px;padding:10px;font-family:inherit;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;line-height:1.6}
input[type=range]{padding:0;background:none;border:none;accent-color:var(--accent)}
.soft{font-size:12px;color:var(--muted);line-height:1.65}
.empty-msg{font-size:12px;color:var(--muted);padding:18px 0;text-align:center;font-style:italic}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1.5px solid var(--line);background:var(--panel2);border-radius:11px;padding:8px 12px;font-size:12px;color:var(--ink);cursor:pointer;font-family:inherit}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{font-size:11px;padding:4px 9px;border-radius:10px;background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.sub-h{font-family:Georgia,serif;font-size:14px;color:var(--accent);margin:16px 0 6px}

/* Krona / hovpanel */
.throne{background:linear-gradient(160deg,var(--accent-soft),var(--panel) 68%);border:1px solid var(--line);border-radius:22px;padding:18px;position:relative;overflow:hidden;box-shadow:0 2px 10px var(--shadow)}
.throne:after{content:'\1F451';position:absolute;right:-6px;top:-10px;font-size:74px;opacity:.10;transform:rotate(9deg)}
.throne .lvl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700}
.throne .nm{font-family:Georgia,serif;font-size:26px;margin:4px 0 2px}
.throne .mt{font-size:12px;color:var(--muted);font-style:italic}
.xpbar{height:7px;background:var(--panel2);border-radius:6px;margin-top:14px;overflow:hidden;border:1px solid var(--line)}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:6px}
.xprow{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}

/* Drottningkort */
.qcard{border-radius:18px;padding:15px;border:1px solid var(--line);background:var(--panel);position:relative;overflow:hidden;cursor:pointer;box-shadow:0 1px 3px var(--shadow)}
.qcard .ic{font-size:26px}
.qcard .t{font-family:Georgia,serif;font-size:16px;margin-top:6px}
.qcard .s{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px}
.qcard .p{font-size:11px;color:var(--muted);margin-top:8px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qcard[data-q=stavar]{background:linear-gradient(150deg,var(--q1s),var(--panel) 70%)}
.qcard[data-q=bagare]{background:linear-gradient(150deg,var(--q2s),var(--panel) 70%)}
.qcard[data-q=mynt]{background:linear-gradient(150deg,var(--q3s),var(--panel) 70%)}
.qcard[data-q=svard]{background:linear-gradient(150deg,var(--q4s),var(--panel) 70%)}
.qbar{height:4px;border-radius:4px;background:var(--panel2);margin-top:9px;overflow:hidden}
.qbar i{display:block;height:100%}
.q-stavar{color:var(--q1)}.q-bagare{color:var(--q2)}.q-mynt{color:var(--q3)}.q-svard{color:var(--q4)}
.bg-stavar{background:var(--q1)}.bg-bagare{background:var(--q2)}.bg-mynt{background:var(--q3)}.bg-svard{background:var(--q4)}

/* Tarotkort-dragning */
.deck{display:flex;gap:10px;justify-content:center;margin:10px 0 4px}
.tcard{width:88px;height:140px;border-radius:12px;border:1.5px solid var(--gold);background:linear-gradient(150deg,var(--accent),var(--accent-soft));display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;cursor:pointer;box-shadow:0 3px 12px var(--shadow);transition:transform .25s}
.tcard:active{transform:translateY(-5px) rotate(-2deg)}
.reveal{border-radius:18px;border:1.5px solid var(--gold);padding:18px;text-align:center;background:var(--panel);position:relative;overflow:hidden}
.reveal .ic{font-size:44px}
.reveal .nm{font-family:Georgia,serif;font-size:20px;margin-top:6px}
.reveal .mt{font-size:12px;font-style:italic;color:var(--muted);margin-top:3px}
.reveal .msg{font-size:14px;line-height:1.7;margin-top:14px}
.reveal .task{margin-top:14px;padding:11px;border-radius:12px;background:var(--gold-soft);color:var(--ink);font-size:13px;line-height:1.6}
.orn{text-align:center;color:var(--gold);letter-spacing:.5em;font-size:11px;margin:12px 0}

/* Listor */
.row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .g{flex:1;min-width:0}
.row .ti{font-size:14px}
.row .su{font-size:11px;color:var(--muted);margin-top:2px}
.dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
.x{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 5px}
.check{width:26px;height:26px;border-radius:9px;border:1.6px solid var(--line);background:var(--panel2);cursor:pointer;flex:0 0 26px;font-size:14px;color:#fff;line-height:1}
.check.on{background:var(--accent);border-color:var(--accent)}
.streak{font-size:11px;color:var(--gold);font-weight:700}
.strip{display:flex;gap:4px}
.strip i{width:13px;height:13px;border-radius:4px;background:var(--panel2);border:1px solid var(--line)}
.strip i.on{background:var(--accent);border-color:var(--accent)}

/* Stat/mätare */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:12px 8px;text-align:center}
.stat .v{font-family:Georgia,serif;font-size:21px;color:var(--accent)}
.stat .l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.legend{display:flex;flex-direction:column;gap:8px;font-size:12px}
.legend div{display:flex;align-items:center;gap:8px}
.balrow{display:flex;gap:14px;align-items:center}

/* Slott */
.rooms{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.room{border:1px solid var(--line);border-radius:16px;padding:13px;background:var(--panel2);text-align:center;opacity:.5}
.room.on{opacity:1;background:linear-gradient(160deg,var(--gold-soft),var(--panel) 75%);border-color:var(--gold)}
.room .ic{font-size:24px}
.room .t{font-family:Georgia,serif;font-size:13px;margin-top:5px}
.room .s{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.5}
.ladder{display:flex;flex-direction:column;gap:0}
.step{display:flex;gap:11px;align-items:flex-start;padding:10px 0}
.step .bul{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);flex:0 0 24px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--panel2)}
.step.on .bul{background:var(--accent);border-color:var(--accent);color:#fff}
.step.now .bul{border-color:var(--gold);background:var(--gold);color:#fff}
.step .t{font-family:Georgia,serif;font-size:15px}
.step .s{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}

/* Coach */
.chat{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.msg{max-width:86%;padding:11px 13px;border-radius:15px;font-size:13.5px;line-height:1.65;white-space:pre-wrap}
.msg.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:5px}
.msg.ai{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
.msg.ai b{color:var(--accent)}

/* Meditation */
.breath{width:150px;height:150px;border-radius:50%;margin:14px auto;background:radial-gradient(circle,var(--accent-soft),var(--panel));border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--accent);transition:transform 4s ease-in-out;font-family:Georgia,serif}
.breath.big{transform:scale(1.28)}

/* Synk / footer */
.sp-badge{font-size:11px;padding:3px 9px;border-radius:9px;background:var(--accent-soft);color:var(--accent);font-weight:600}
.sp-badge.offline{background:var(--panel2);color:var(--muted)}
.sp-badge.err{background:#F4DAD9;color:#A2685B}
.foot{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.foot button{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:inherit}
.privacy{text-align:center;font-size:10px;color:var(--muted);opacity:.85;margin-top:10px;line-height:1.6}

/* Nav / FAB / vyer */
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(28px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;border:1.5px solid var(--gold);background:var(--accent);color:#fff;font-size:24px;line-height:1;cursor:pointer;z-index:43;box-shadow:0 4px 18px var(--shadow)}
.nav{position:fixed;left:0;right:0;bottom:0;background:var(--navbg);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;max-width:480px;margin:0 auto;padding:0 0 env(safe-area-inset-bottom);z-index:40}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-size:10px;padding:9px 2px;cursor:pointer;font-family:inherit}
.nav button.active{color:var(--accent);font-weight:600}
.nav button span{display:block;font-size:16px;margin-bottom:2px}
.nav button[data-v=journal],.nav button[data-v=coach],.nav button[data-v=installningar]{display:none}
.nav button.navspacer{flex:0 0 56px;pointer-events:none}
.view{display:none}
.view.active{display:block}

/* Sheets */
.sheet-bg{position:fixed;inset:0;background:rgba(23,18,27,.55);display:none;z-index:50}
.sheet-bg.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--panel);border-radius:22px 22px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));z-index:51;transform:translateY(102%);transition:transform .25s ease;max-height:92vh;max-height:92dvh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;box-shadow:0 -8px 30px rgba(0,0,0,.22);border-top:1.5px solid var(--gold)}
.sheet.open{transform:translateY(0)}
.sheet h3{font-family:Georgia,serif;font-size:18px;margin-bottom:8px}
.sheet-close{width:100%;padding:12px;border-radius:13px;border:none;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;position:sticky;bottom:0;margin-top:14px;font-family:inherit}
.action-list{display:flex;flex-direction:column;gap:8px}
.action-list button{text-align:left;padding:13px;border-radius:13px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:14px;cursor:pointer;font-family:inherit}
.action-list button:active{background:var(--accent-soft)}

/* Matris */
.matris{width:100%;border-collapse:collapse;font-size:12px}
.matris th,.matris td{border:1px solid var(--line);padding:6px;text-align:center}
.matris th{background:var(--panel2);font-weight:600;font-size:11px}
.matris td.nm{text-align:left}
.matris input{padding:5px;border-radius:7px;font-size:12px;text-align:center}
.win{background:var(--gold-soft);font-weight:700}
.scroll-x{overflow-x:auto}
</style>
</head>

var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};

// ── Queen Balance ──────────────────────────────────────
function balanceCounts(days){
  var cut=Date.now()-days*86400000;var c={stavar:0,bagare:0,mynt:0,svard:0},tot=0;
  state.logs.forEach(function(l){var t=new Date((l.date||'')+'T00:00:00').getTime();if(t>=cut&&c[l.queen]!=null){c[l.queen]++;tot++;}});

function suggestQueen(){
  var b=balanceCounts(30);
  if(!b.tot)return QUEENS[Math.floor(Math.random()*4)];
  var least=QUEENS[0],lv=Infinity;QUEENS.forEach(function(q){if(b.c[q.id]<lv){lv=b.c[q.id];least=q;}});

}

var draMode='dag';
function drawSeed(){
  if(draMode==='dag')return seedFromStr(todayKey());
  if(draMode==='vecka')return seedFromStr(weekKey());
  if(draMode==='manad')return seedFromStr(new Date().getFullYear()+'-'+new Date().getMonth());
  return Date.now()+Math.floor(Math.random()*9999);
}
function doDraw(){
  var q=pick(QUEENS,drawSeed());
  var isNew=true;
  if(draMode!=='challenge'){
    var last=state.draws.filter(function(d){return d.mode===draMode&&d.date===todayKey();}).slice(-1)[0];
    if(last){q=Q(last.queen);isNew=false;}
  }
  var chal=pick(q.challenges,draMode==='challenge'?Date.now():seedFromStr(todayKey()+q.id));
  var el=document.getElementById('dra-result');
  var label={dag:'Dagens drottning',vecka:'Veckans drottning',manad:'Månadens energi',challenge:'Queen Challenge'}[draMode];
  var h='<div class="reveal"><div class="ic">'+q.ikon+'</div><div class="nm">'+esc(q.namn)+'</div><div class="mt">'+esc(q.motto)+'</div>';
  h+='<div class="orn">&#10086; &#10087; &#10086;</div>';
  h+='<div class="msg">'+esc(q.coach)+'</div>';
  h+='<div class="task"><b>'+(draMode==='challenge'?'Din utmaning':'Idag')+':</b> '+esc(chal)+'</div>';
  h+='<div class="btn-row"><button class="btn ghost" onclick="go(\'ovningar\');openQueen(\''+q.id+'\')">Öppna '+esc(q.tema)+'</button><button class="btn fill" onclick="acceptDraw(\''+q.id+'\')">Ta emot &#128081;</button></div></div>';
  el.innerHTML=h;
  if(isNew&&draMode!=='challenge'){state.draws.push({id:uid(),queen:q.id,mode:label,date:todayKey()});save();}
}

function setBalDays(d){balDays=d;renderBalans();}
function countDone(){var n=0;for(var k in state.done)if(state.done[k])n++;return n;}
function donut(b){
  var order=['stavar','bagare','mynt','svard'],cols={stavar:'var(--q1)',bagare:'var(--q2)',mynt:'var(--q3)',svard:'var(--q4)'};
  var cx=52,cy=52,r=40,C=2*Math.PI*r,off=0,seg='';
  if(!b.tot){seg='<circle cx="52" cy="52" r="40" fill="none" stroke="var(--panel2)" stroke-width="18"/>';}
  else{order.forEach(function(id){var frac=b.c[id]/b.tot;var len=frac*C;seg+='<circle cx="52" cy="52" r="40" fill="none" stroke="'+cols[id]+'" stroke-width="18" stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 52 52)"/>';off+=len;});}
  return '<svg width="104" height="104" viewBox="0 0 104 104" aria-hidden="true">'+seg+'<circle cx="52" cy="52" r="26" fill="var(--panel)"/><text x="52" y="49" text-anchor="middle" font-size="10" fill="var(--muted)">Levt som</text><text x="52" y="63" text-anchor="middle" font-family="Georgia" font-size="13" fill="var(--accent)">'+(b.tot||0)+' st</text></svg>';
}
function balanceAdvice(b){
  if(!b.tot)return 'Ingen data än. Gör en check-in eller logga en stund så börjar din balans ta form.';
  var most=QUEENS[0],mv=-1,least=QUEENS[0],lv=Infinity;
  QUEENS.forEach(function(q){if(b.c[q.id]>mv){mv=b.c[q.id];most=q;}if(b.c[q.id]<lv){lv=b.c[q.id];least=q;}});
  return 'Du har vårdat '+most.tema.toLowerCase()+' mycket, men gett minst till '+least.tema.toLowerCase()+'. Testa '+least.namn+' den här veckan.';
}

  h+='<div class="privacy">Be The Queen v<span id="app-ver"></span> &middot; All data lagras i din webbläsare. Symbolisk utveckling, inte medicinsk rådgivning.</div>';
  el.innerHTML=h;
  renderAppearance();renderProv();
  document.getElementById('ai-key-in').value=getAiKey()||'';
  document.getElementById('oai-key-in').value=getOaiKey()||'';
  document.getElementById('sy-owner').value=sync.owner;document.getElementById('sy-repo').value=sync.repo;document.getElementById('sy-token').value=sync.token;
  var av=document.getElementById('app-ver');if(av)av.textContent=APPINFO.version;
  bindSettings();
}
function renderAppearance(){
  var mp=document.getElementById('mode-pick');
  if(mp){var md=[['auto','Auto'],['light','Ljust'],['dark','Mörkt']];var h='';for(var i=0;i<md.length;i++)h+='<button type="button" class="chip'+((state.theme||'auto')===md[i][0]?' sel':'')+'" data-m="'+md[i][0]+'">'+md[i][1]+'</button>';mp.innerHTML=h;mp.querySelectorAll('button').forEach(function(b){b.onclick=function(){state.theme=b.dataset.m;save();applyTheme();renderAppearance();};});}
  var sp=document.getElementById('skin-pick');
  if(sp){var sk=[['guld','Royal Gold'],['moonlight','Moonlight'],['smaragd','Emerald'],['rosenkvarts','Rose Quartz'],['plommon','Plommon']];var h2='';for(var j=0;j<sk.length;j++)h2+='<button type="button" class="chip'+((state.skin||'guld')===sk[j][0]?' sel':'')+'" data-s="'+sk[j][0]+'">'+sk[j][1]+'</button>';sp.innerHTML=h2;sp.querySelectorAll('button').forEach(function(b){b.onclick=function(){state.skin=b.dataset.s;save();applyTheme();renderAppearance();};});}
}
function renderProv(){
  var pp=document.getElementById('prov-pick');if(!pp)return;
  var pv=[['claude','Claude'],['chatgpt','ChatGPT']];var h='';for(var i=0;i<pv.length;i++)h+='<button type="button" class="chip'+(aiProvider===pv[i][0]?' sel':'')+'" data-p="'+pv[i][0]+'">'+pv[i][1]+'</button>';pp.innerHTML=h;
  pp.querySelectorAll('button').forEach(function(b){b.onclick=function(){aiProvider=b.dataset.p;try{localStorage.setItem(AI_PROV,aiProvider);}catch(e){}renderProv();};});
}
function bindSettings(){
  document.getElementById('ai-key-save').onclick=function(){var k=document.getElementById('ai-key-in').value.trim(),ok=document.getElementById('oai-key-in').value.trim();try{if(k)localStorage.setItem(AI_KEY,k);else localStorage.removeItem(AI_KEY);if(ok)localStorage.setItem(OAI_KEY,ok);else localStorage.removeItem(OAI_KEY);localStorage.setItem(AI_PROV,aiProvider);}catch(e){}document.getElementById('ai-key-status').textContent='\u2713 Sparat lokalt. Aktiv tjänst: '+(aiProvider==='chatgpt'?'ChatGPT':'Claude')+'.';};
  document.getElementById('sy-connect').onclick=async function(){sync.owner=document.getElementById('sy-owner').value.trim();sync.repo=document.getElementById('sy-repo').value.trim();sync.token=document.getElementById('sy-token').value.trim();if(!syncOn()){document.getElementById('sy-status').textContent='Fyll i alla tre fält.';return;}saveSync();sync.sha=null;document.getElementById('sy-status').textContent='Ansluter…';try{await ghPull();await ghPush();document.getElementById('sy-status').textContent='\u2713 Ansluten och synkad.';}catch(e){document.getElementById('sy-status').textContent='Fel: '+e.message;}};
  document.getElementById('sy-push').onclick=async function(){if(!syncOn()){document.getElementById('sy-status').textContent='Anslut först.';return;}try{await ghPush();document.getElementById('sy-status').textContent='\u2713 Sparat upp.';}catch(e){document.getElementById('sy-status').textContent='Fel: '+e.message;}};
  document.getElementById('export-btn').onclick=function(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bethequeen-'+todayKey()+'.json';a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},1000);};
  document.getElementById('import-btn').onclick=function(){document.getElementById('import-file').click();};
  document.getElementById('import-file').onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var d=JSON.parse(r.result);if(d&&typeof d==='object'){if(confirm('Slå ihop importerad data med din?')){['checkins','draws','logs','journal'].forEach(function(k){if(Array.isArray(d[k]))state[k]=mergeById(state[k],d[k]);});if(d.done)state.done=Object.assign({},d.done,state.done);if(typeof d.xp==='number')state.xp=Math.max(state.xp,d.xp);persist();renderActive();alert('Importerat.');}}else alert('Ogiltig fil.');}catch(err){alert('Kunde inte läsa filen.');}};r.readAsText(f);e.target.value='';};
  document.getElementById('reset-btn').onclick=function(){if(!confirm('Nollställa ALL data? Detta går inte att ångra.'))return;state={checkins:[],draws:[],logs:[],journal:[],done:{},affDate:'',affText:'',xp:0,theme:state.theme,skin:state.skin};persist();renderActive();alert('Nollställt.');};
  document.getElementById('open-cl2').onclick=function(){renderChangelog();openSheet('changelog-sheet');};
}

// ── AI ─────────────────────────────────────────────────
var AI_KEY='bethequeen_aikey',OAI_KEY='bethequeen_oaikey',AI_PROV='bethequeen_aiprov';
var aiProvider='claude';try{aiProvider=localStorage.getItem(AI_PROV)||'claude';}catch(e){}
function getAiKey(){try{return localStorage.getItem(AI_KEY)||'';}catch(e){return '';}}
function getOaiKey(){try{return localStorage.getItem(OAI_KEY)||'';}catch(e){return '';}}
async function aiCall(prompt){
  if(aiProvider==='chatgpt'){var ok=getOaiKey();if(!ok)throw new Error('NOKEY');var ro=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ok},body:JSON.stringify({model:'gpt-4o-mini',max_tokens:600,messages:[{role:'user',content:prompt}]})});if(!ro.ok)throw new Error(ro.status===401?'Ogiltig ChatGPT-nyckel':'HTTP '+ro.status);var jo=await ro.json();return ((jo.choices&&jo.choices[0]&&jo.choices[0].message&&jo.choices[0].message.content)||'').trim();}
  var key=getAiKey();if(!key)throw new Error('NOKEY');
  var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompt}]})});
  if(!r.ok)throw new Error(r.status===401?'Ogiltig Claude-nyckel':'HTTP '+r.status);
  var j=await r.json();return (j.content||[]).map(function(b){return b.text||'';}).join('').trim();
}

// ── Synk (appkollen-stil) ──────────────────────────────
var SYNC_KEY='bethequeensync_v1';
var sync={owner:'',repo:'',token:'',sha:null};
function loadSync(){try{var s=localStorage.getItem(SYNC_KEY);if(s){var d=JSON.parse(s);sync.owner=d.owner||'';sync.repo=d.repo||'';sync.token=d.token||'';}}catch(e){}}
function saveSync(){try{localStorage.setItem(SYNC_KEY,JSON.stringify({owner:sync.owner,repo:sync.repo,token:sync.token}));}catch(e){}}
var syncOn=function(){return !!(sync.owner&&sync.repo&&sync.token);};
var ghUrl=function(){return 'https://api.github.com/repos/'+sync.owner+'/'+sync.repo+'/contents/bethequeen.json';};
var ghHeaders=function(){return{'Authorization':'Bearer '+sync.token,'Accept':'application/vnd.github+json'};};
var b64enc=function(s){return btoa(unescape(encodeURIComponent(s)));};
var b64dec=function(s){return decodeURIComponent(escape(atob(s.replace(/\s/g,''))));};
function setBadge(st,msg){var b=document.getElementById('sync-badge');if(!b)return;b.textContent=msg;b.className='sp-badge'+(st==='ok'?'':st==='err'?' err':' offline');}
function mergeById(a,b){var m={};(a||[]).forEach(function(e){if(e&&e.id)m[e.id]=e;});(b||[]).forEach(function(e){if(e&&e.id&&!m[e.id])m[e.id]=e;});return Object.keys(m).map(function(k){return m[k];});}
async function ghGet(){var r=await fetch(ghUrl(),{headers:ghHeaders(),cache:'no-store'});if(r.status===404){sync.sha=null;return null;}if(!r.ok)throw new Error('HTTP '+r.status);var j=await r.json();sync.sha=j.sha;return JSON.parse(b64dec(j.content));}
async function ghPull(){if(!syncOn())return;try{setBadge('load','Hämtar…');var data=await ghGet();if(data){['checkins','draws','logs','journal'].forEach(function(k){if(Array.isArray(data[k]))state[k]=mergeById(state[k],data[k]);});if(data.done)state.done=Object.assign({},data.done,state.done);if(typeof data.xp==='number')state.xp=Math.max(state.xp||0,data.xp);save();renderActive();}setBadge('ok','Synkad');}catch(e){setBadge('err','Synkfel');}}
async function ghPush(){if(!syncOn())return;setBadge('load','Sparar…');var payload={checkins:state.checkins,draws:state.draws,logs:state.logs,journal:state.journal,done:state.done,xp:state.xp,updated:new Date().toISOString()};var content=b64enc(JSON.stringify(payload));var doPut=function(){return fetch(ghUrl(),{method:'PUT',headers:Object.assign({},ghHeaders(),{'Content-Type':'application/json'}),body:JSON.stringify(Object.assign({message:'Uppdatering via Be The Queen',content:content},sync.sha?{sha:sync.sha}:{}))});};var r=await doPut();if(r.status===409||r.status===422){try{await ghGet();}catch(e){}r=await doPut();}if(!r.ok){setBadge('err','Synkfel');throw new Error('HTTP '+r.status);}var j=await r.json();if(j.content&&j.content.sha)sync.sha=j.content.sha;setBadge('ok','Synkad');}

// ── Tema ───────────────────────────────────────────────
function applyTheme(){
  var m=state.theme||'auto';var h=new Date().getHours();var dark=m==='dark'||(m==='auto'&&(h>=20||h<7));
  document.documentElement.dataset.theme=dark?'dark':'light';document.documentElement.dataset.skin=state.skin||'guld';
  var meta=document.querySelector('meta[name="theme-color"]');if(meta)meta.content=dark?'#17121B':'#F7F2F7';
  var b=document.getElementById('theme-btn');if(b)b.textContent=m==='auto'?'\u25D0':(m==='dark'?'\u263E':'\u2600');
}

// ── Changelog-vy ───────────────────────────────────────
function renderChangelog(){
  var el=document.getElementById('changelog-body');if(!el)return;
  var h='<div class="soft" style="margin-bottom:10px">'+esc(APPINFO.tagline)+'<br>Målgrupp: '+esc(APPINFO.audience)+'</div>';
  h+='<div class="sub-h">Funktioner</div><div class="tags">';for(var f=0;f<APPINFO.functions.length;f++)h+='<span class="tag">'+esc(APPINFO.functions[f])+'</span>';h+='</div>';
  h+='<div class="sub-h">Ändringslogg</div>';
  for(var i=0;i<APPINFO.changelog.length;i++){var c=APPINFO.changelog[i];h+='<div class="card-panel" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><b>v'+esc(c.v)+'</b><span class="soft">'+esc(c.d)+'</span></div><ul style="margin:8px 0 0 18px;font-size:13px;line-height:1.6">';for(var j=0;j<c.items.length;j++)h+='<li>'+esc(c.items[j])+'</li>';h+='</ul></div>';}
  el.innerHTML=h;
}

// ── Toast ──────────────────────────────────────────────
var toastT=null;
function toast(msg){var t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--accent);color:#fff;padding:9px 16px;border-radius:20px;font-size:13px;z-index:60;box-shadow:0 4px 14px var(--shadow);opacity:0;transition:opacity .25s;pointer-events:none';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(toastT);toastT=setTimeout(function(){t.style.opacity='0';},1600);}

// ── Router ─────────────────────────────────────────────
function renderView(v){
  if(v==='oversikt')renderOversikt();
  else if(v==='dra')renderDra();
  else if(v==='ovningar')renderOvningar();
  else if(v==='balans')renderBalans();
  else if(v==='slott')renderSlott();
  else if(v==='journal')renderJournal();
  else if(v==='coach')renderCoach();
  else if(v==='installningar')renderInstallningar();
}
function renderActive(){var cur=document.querySelector('.view.active');if(cur)renderView(cur.id.replace('view-',''));}
var HIDDEN_NAV=['dra','journal','coach','installningar'];
function go(v){
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  var view=document.getElementById('view-'+v);if(view)view.classList.add('active');
  document.querySelectorAll('.nav button').forEach(function(x){x.classList.toggle('active',x.dataset.v===v);});
  var mb=document.getElementById('more-btn');if(mb)mb.classList.toggle('active',HIDDEN_NAV.indexOf(v)>=0);
  window.scrollTo(0,0);renderView(v);
}
document.querySelectorAll('.nav button[data-v]').forEach(function(b){b.onclick=function(){go(b.dataset.v);};});
document.querySelectorAll('[data-goto]').forEach(function(b){b.onclick=function(){closeSheets();go(b.dataset.goto);};});
document.getElementById('more-btn').onclick=function(){openSheet('more-sheet');};
document.getElementById('more-close').onclick=closeSheets;
document.getElementById('theme-btn').onclick=function(){var order=['auto','light','dark'];var i=order.indexOf(state.theme||'auto');state.theme=order[(i+1)%3];save();applyTheme();renderActive();};
document.getElementById('open-cl').onclick=function(){closeSheets();renderChangelog();openSheet('changelog-sheet');};
document.getElementById('cl-close').onclick=closeSheets;

// FAB → dra
document.getElementById('fab').onclick=function(){go('dra');};

// ── Check-in sheet ─────────────────────────────────────
var ciState={mood:'',queen:''};
function buildCheckin(){
  var mm=document.getElementById('ci-mood');var h='';MOODS.forEach(function(m){h+='<button type="button" class="chip'+(ciState.mood===m?' sel':'')+'" data-m="'+esc(m)+'">'+esc(m)+'</button>';});mm.innerHTML=h;
  mm.querySelectorAll('button').forEach(function(b){b.onclick=function(){ciState.mood=b.dataset.m;buildCheckin();};});
  var qq=document.getElementById('ci-queen');var h2='';QUEENS.forEach(function(q){h2+='<button type="button" class="chip'+(ciState.queen===q.id?' sel':'')+'" data-q="'+q.id+'">'+q.ikon+' '+esc(q.tema)+'</button>';});qq.innerHTML=h2;
  qq.querySelectorAll('button').forEach(function(b){b.onclick=function(){ciState.queen=b.dataset.q;buildCheckin();};});
}
document.getElementById('ci-close').onclick=closeSheets;
document.getElementById('ci-ai').onclick=function(){
  var sg=document.getElementById('ci-suggest');sg.innerHTML='<div class="soft">&#10024; Frågar coachen…</div>';
  var prompt='Du är AI Queen Coach i en svensk tarot-utvecklingsapp med fyra drottningar: Stavar (självförtroende), Bägare (känslor), Mynt (livsbalans), Svärd (klarhet). Användaren känner sig "'+(ciState.mood||'oklart')+'" och behöver "'+(document.getElementById('ci-need').value||'vet inte')+'". Föreslå i 2-3 meningar på svenska vilken drottning som bör leda idag och en liten första handling. Börja med "Idag behöver du Drottning i …".';
  aiCall(prompt).then(function(r){sg.innerHTML='<div class="card-panel tight"><div class="soft" style="white-space:pre-wrap">'+esc(r)+'</div></div>';}).catch(function(e){sg.innerHTML='<div class="soft">'+(e.message==='NOKEY'?'Lägg in en AI-nyckel under Inställningar först.':'Fel: '+esc(e.message))+'</div>';});
};
document.getElementById('ci-save').onclick=function(){
  var need=document.getElementById('ci-need').value.trim();
  var q=ciState.queen||suggestQueen().id;
  state.checkins.push({id:uid(),date:todayKey(),mood:ciState.mood,need:need,queen:q});
  addXP(8);persist();closeSheets();ciState={mood:'',queen:''};document.getElementById('ci-need').value='';document.getElementById('ci-suggest').innerHTML='';
  toast('Check-in sparad +8');renderOversikt();
};

// ── Log sheet ──────────────────────────────────────────
var logState={queen:'stavar'};
function buildLog(){var lq=document.getElementById('log-queen');var h='';QUEENS.forEach(function(q){h+='<button type="button" class="chip'+(logState.queen===q.id?' sel':'')+'" data-q="'+q.id+'">'+q.ikon+' '+esc(q.tema)+'</button>';});lq.innerHTML=h;lq.querySelectorAll('button').forEach(function(b){b.onclick=function(){logState.queen=b.dataset.q;buildLog();};});}
document.getElementById('log-close').onclick=closeSheets;
document.getElementById('log-save').onclick=function(){var note=document.getElementById('log-note').value.trim();state.logs.push({id:uid(),date:todayKey(),queen:logState.queen,note:note});addXP(3);persist();closeSheets();document.getElementById('log-note').value='';toast('Loggat +3');renderActive();};

// ── Journal sheet ──────────────────────────────────────
var jrState={queen:''};
function buildJr(){var jq=document.getElementById('jr-queen');var h='';QUEENS.forEach(function(q){h+='<button type="button" class="chip'+(jrState.queen===q.id?' sel':'')+'" data-q="'+q.id+'">'+q.ikon+' '+esc(q.tema)+'</button>';});jq.innerHTML=h;jq.querySelectorAll('button').forEach(function(b){b.onclick=function(){jrState.queen=b.dataset.q;buildJr();};});}
document.getElementById('jr-close').onclick=closeSheets;
document.getElementById('jr-save').onclick=function(){
  var good=document.getElementById('jr-good').value.trim(),bad=document.getElementById('jr-bad').value.trim(),next=document.getElementById('jr-next').value.trim();
  if(!good&&!bad&&!next){alert('Skriv något först.');return;}
  state.journal.push({id:uid(),date:todayKey(),good:good,bad:bad,next:next,queen:jrState.queen});
  addXP(8);persist();closeSheets();
  document.getElementById('jr-good').value='';document.getElementById('jr-bad').value='';document.getElementById('jr-next').value='';jrState={queen:''};
  toast('Journalpost sparad +8');renderJournal();
};

// ── Init ───────────────────────────────────────────────
function boot(){
  loadSync();
  buildCheckin();buildLog();buildJr();
  go('oversikt');
  applyTheme();
  if(syncOn())ghPull();
}
applyTheme();
setInterval(applyTheme,60000);
document.addEventListener('visibilitychange',function(){if(!document.hidden&&syncOn())ghPull();});
boot();
</script>
