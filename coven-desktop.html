<style>
  :root{
    --ink:#14101C; --ink-2:#1A1525; --velvet:#231C31; --velvet-hi:#2E2640;
    --line:#3A3050; --gold:#CBA75E; --gold-soft:#E8D6A8; --gold-deep:#9A7C3F;
    --moon:#C3CBE0; --sage:#93A57E; --rose:#C089A0; --ember:#CE8159;
    --parchment:#ECE4D4; --mist:#9C90AE; --mist-2:#6F6584;
    --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
    --sans:'Inter',-apple-system,system-ui,sans-serif;
    --shadow:0 20px 50px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{background:var(--ink)}
  body{font-family:var(--sans);color:var(--parchment);background:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;
    background-image:
      radial-gradient(900px 700px at 85% -10%, rgba(203,167,94,.10), transparent 60%),
      radial-gradient(700px 600px at -10% 110%, rgba(192,137,160,.08), transparent 55%);}
  #stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;border-radius:50%;background:var(--moon);opacity:.5}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}
  @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(203,167,94,0)}50%{box-shadow:0 0 18px 2px rgba(203,167,94,.18)}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  .app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom))}
  .brand{display:flex;align-items:center;justify-content:center;gap:11px;margin:2px 0 2px}
  .brand .moon{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 34% 32%,var(--gold-soft),var(--gold) 55%,var(--gold-deep));box-shadow:0 0 22px rgba(203,167,94,.45)}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:.04em;color:var(--gold-soft)}
  .brand-sub{text-align:center;font-size:11px;color:var(--mist-2);letter-spacing:.16em;text-transform:uppercase;margin-bottom:18px}

  .view{display:none;animation:rise .35s ease both}
  .view.active{display:block}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist-2);margin-bottom:6px}
  .view h2{font-family:var(--serif);font-weight:500;font-size:32px;color:var(--parchment);line-height:1.08;margin-bottom:4px}
  .view .sub{color:var(--mist);font-size:14px;margin-bottom:22px}

  /* Orbital circle */
  .orbit-wrap{display:flex;flex-direction:column;align-items:center}
  .orbit{position:relative;width:min(88vw,420px);aspect-ratio:1;margin:6px auto 8px}
  .ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(195,203,224,.10);margin:auto}
  .core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70px;height:70px;border-radius:50%;
    background:radial-gradient(circle at 36% 30%,#fff7e6,var(--gold) 52%,var(--gold-deep));
    box-shadow:0 0 46px rgba(203,167,94,.5),inset -6px -8px 16px rgba(120,90,40,.5);
    display:flex;align-items:center;justify-content:center;animation:pulseGlow 5s ease-in-out infinite}
  .core span{font-family:var(--serif);font-size:12px;color:#3a2c12;letter-spacing:.16em;font-weight:600}
  .orb{position:absolute;transform:translate(-50%,-50%);cursor:pointer;border:none;background:none;padding:0;transition:filter .2s}
  .orb:hover{filter:brightness(1.12)}
  .orb .disc{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;color:var(--ink);overflow:hidden;border:1.5px solid rgba(232,214,168,.55);box-shadow:0 4px 14px rgba(0,0,0,.45)}
  .orb .disc img{width:100%;height:100%;object-fit:cover}
  .orb .nm{display:block;text-align:center;margin-top:5px;font-size:10.5px;color:var(--mist);max-width:68px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .orb .stat{position:absolute;right:-1px;top:-1px;width:13px;height:13px;border-radius:50%;border:2px solid var(--ink)}
  .legend{display:flex;flex-wrap:wrap;gap:7px 15px;justify-content:center;margin-top:6px}
  .legend span{font-size:11px;color:var(--mist);display:flex;align-items:center;gap:6px}
  .legend i{width:8px;height:8px;border-radius:50%;display:inline-block}

  .group{margin-top:28px}
  .group h3{font-family:var(--serif);font-size:21px;color:var(--gold-soft);font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .group h3 .ct{font-family:var(--sans);font-size:11px;color:var(--mist-2);background:var(--velvet);padding:2px 9px;border-radius:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
  .fcard{background:linear-gradient(180deg,var(--velvet),var(--ink-2));border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;transition:.2s}
  .fcard:hover{border-color:var(--gold-deep);transform:translateY(-3px);box-shadow:var(--shadow)}
  .fcard .av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:22px;color:var(--ink);overflow:hidden;margin-bottom:11px;border:1.5px solid rgba(232,214,168,.4)}
  .fcard .av img{width:100%;height:100%;object-fit:cover}
  .fcard .fn{font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.15}
  .fcard .meta{font-size:12px;color:var(--mist);margin-top:2px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 9px;border-radius:20px;margin-top:11px;border:1px solid transparent}
  .pill i{width:7px;height:7px;border-radius:50%}

  .empty{border:1px dashed var(--line);border-radius:18px;padding:42px 24px;text-align:center;color:var(--mist)}
  .empty .gly{font-family:var(--serif);font-size:40px;color:var(--gold);opacity:.7;margin-bottom:8px}
  .empty button{margin-top:16px}

  .btn{font-family:var(--sans);font-size:13.5px;border-radius:11px;padding:10px 16px;cursor:pointer;border:1px solid var(--line);background:var(--velvet);color:var(--parchment);transition:.18s}
  .btn:hover{background:var(--velvet-hi);border-color:var(--gold-deep)}
  .btn.gold{border-color:var(--gold-deep);background:linear-gradient(180deg,rgba(203,167,94,.18),rgba(203,167,94,.07));color:var(--gold-soft);font-weight:600}
  .btn.gold:hover{background:rgba(203,167,94,.26)}
  .btn.ghost{background:none}
  .chip{font-size:12px;padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:var(--ink-2);color:var(--mist);cursor:pointer;transition:.15s;font-family:var(--sans)}
  .chip:hover{border-color:var(--gold-deep);color:var(--parchment)}
  .chip.on{background:rgba(203,167,94,.16);border-color:var(--gold);color:var(--gold-soft)}

  /* Sheets */
  .sheet-bg{position:fixed;inset:0;background:rgba(8,6,14,.72);backdrop-filter:blur(4px);z-index:40;display:none}
  .sheet-bg.open{display:block;animation:fade .25s ease}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;max-width:480px;margin:0 auto;max-height:90dvh;overflow-y:auto;background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);border-radius:22px 22px 0 0;box-shadow:var(--shadow);transform:translateY(100%);transition:transform .3s;padding:22px 22px calc(28px + env(safe-area-inset-bottom));scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .sheet.open{transform:translateY(0)}
  .sheet-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:4px}
  .x{background:var(--velvet);border:1px solid var(--line);color:var(--mist);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:17px;flex:none;transition:.15s}
  .x:hover{color:var(--parchment);border-color:var(--gold-deep)}
  .sheet h3.sh{font-family:var(--serif);font-size:26px;font-weight:500}

  .det-top{display:flex;gap:16px;align-items:center;margin-bottom:18px}
  .det-av{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:32px;color:var(--ink);overflow:hidden;flex:none;border:2px solid rgba(232,214,168,.5)}
  .det-av img{width:100%;height:100%;object-fit:cover}
  .det-top h3{font-family:var(--serif);font-size:30px;font-weight:500;line-height:1.05}
  .det-top .cat{font-size:12px;color:var(--mist);letter-spacing:.04em}
  .facts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0 18px}
  .fact{background:var(--velvet);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .fact .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist-2)}
  .fact .v{font-size:14px;color:var(--parchment);margin-top:3px;word-break:break-word}
  .blk{margin:16px 0}
  .blk .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
  .blk p{font-size:14px;color:var(--parchment);white-space:pre-wrap;line-height:1.55}
  .blk .muted{color:var(--mist-2);font-style:italic}

  .tarot{width:124px;flex:none}
  .tarot .card{aspect-ratio:.62;border-radius:11px;background:linear-gradient(160deg,#241b33,#171120);border:1.5px solid var(--gold-deep);box-shadow:0 10px 26px -8px rgba(0,0,0,.7),inset 0 0 0 3px rgba(203,167,94,.12);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:11px 8px;text-align:center;position:relative;overflow:hidden}
  .tarot .card::before{content:'';position:absolute;inset:5px;border:1px solid rgba(203,167,94,.28);border-radius:7px;pointer-events:none}
  .tarot .rn{font-family:var(--serif);font-size:13px;letter-spacing:.1em;color:var(--gold)}
  .tarot .gl{font-size:30px;line-height:1;color:var(--gold-soft);text-shadow:0 0 16px rgba(203,167,94,.5)}
  .tarot .tn{font-family:var(--serif);font-size:15px;color:var(--gold-soft);line-height:1.05}
  .tarot .mn{font-size:10px;color:var(--mist);margin-top:1px}
  .det-tarot{display:flex;gap:16px;align-items:center;background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:6px}
  .det-tarot .meaning .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mist-2)}
  .det-tarot .meaning h4{font-family:var(--serif);font-weight:500;font-size:22px;color:var(--gold-soft);margin:2px 0}
  .det-tarot .meaning p{font-size:13px;color:var(--mist)}
  .statrow,.rit-quick{display:flex;flex-wrap:wrap;gap:8px}

  .ai-box{background:linear-gradient(180deg,rgba(192,137,160,.10),rgba(203,167,94,.05));border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:6px}
  .ai-box .hd{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .ai-box .hd .o{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 32%,var(--rose),#7d4f63);display:flex;align-items:center;justify-content:center;font-size:14px}
  .ai-box .hd h4{font-family:var(--serif);font-size:19px;font-weight:500;color:var(--gold-soft)}
  .ai-opts{display:flex;flex-wrap:wrap;gap:8px}
  .ai-out{margin-top:14px;background:var(--ink);border:1px solid var(--line);border-radius:12px;padding:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;color:var(--parchment);animation:fade .3s}
  .ai-out.load{color:var(--mist);font-style:italic}
  .dots::after{content:'';animation:dots 1.4s steps(4,end) infinite}
  @keyframes dots{0%{content:''}25%{content:'·'}50%{content:'· ·'}75%{content:'· · ·'}}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mist-2);margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--parchment);font-family:var(--sans);font-size:14px;transition:.15s}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(203,167,94,.14)}
  .field textarea{resize:vertical;min-height:64px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .selgrid{display:flex;flex-wrap:wrap;gap:8px}
  .photo-pick{display:flex;align-items:center;gap:14px}
  .photo-prev{width:62px;height:62px;border-radius:50%;background:var(--velvet);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:var(--serif);font-size:24px;color:var(--mist)}
  .photo-prev img{width:100%;height:100%;object-fit:cover}
  .form-actions{display:flex;gap:10px;margin-top:22px}
  .form-actions .btn{flex:1}
  .del-link{background:none;border:none;color:var(--ember);font-size:12.5px;cursor:pointer;margin-top:14px;font-family:var(--sans);opacity:.85}
  .del-link:hover{opacity:1;text-decoration:underline}

  .rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
  .rit{background:linear-gradient(180deg,var(--velvet),var(--ink-2));border:1px solid var(--line);border-radius:16px;padding:18px 16px;text-align:center}
  .rit .g{font-size:26px;margin-bottom:8px}
  .rit h4{font-family:var(--serif);font-size:18px;font-weight:500;margin-bottom:10px}
  .rit .btn{width:100%;font-size:12.5px;padding:8px}
  .mem{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}
  .mem .when{font-size:11px;color:var(--mist-2);flex:none;width:74px;padding-top:2px}
  .mem .body .who{font-family:var(--serif);font-size:16px;color:var(--gold-soft);cursor:pointer}
  .mem .body p{font-size:14px;color:var(--parchment);margin-top:2px;white-space:pre-wrap}

  /* Changelog / news */
  .news-tabs{display:flex;gap:8px;margin:8px 0 16px}
  .cl-entry{margin-bottom:16px}
  .cl-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .cl-head .v{font-size:11px;font-weight:600;color:var(--gold-soft);background:var(--velvet);padding:2px 9px;border-radius:20px}
  .cl-head time{font-size:11px;color:var(--mist-2);margin-left:auto}
  .cl-item{font-size:13.5px;color:var(--parchment);padding:5px 0 5px 18px;position:relative;line-height:1.5}
  .cl-item::before{content:'✦';position:absolute;left:0;top:6px;color:var(--gold);font-size:10px}
  .fn-area{font-family:var(--serif);font-size:18px;color:var(--gold-soft);margin:14px 0 6px}
  .news-link{display:inline-block;margin-top:8px;font-size:12px;color:var(--gold);text-decoration:underline;text-underline-offset:3px}

  /* Footer + sync */
  .foot{display:flex;flex-wrap:wrap;gap:10px 16px;justify-content:center;align-items:center;margin-top:28px;padding-top:18px;border-top:1px solid var(--line)}
  .foot button{font-size:12px;color:var(--mist);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:var(--sans)}
  .foot button:hover{color:var(--parchment)}
  .sp-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;background:var(--velvet);color:var(--mist);border:1px solid var(--line);cursor:pointer}
  .sp-badge.ok{color:var(--sage);border-color:var(--sage)}
  .sp-badge.err{color:var(--ember);border-color:var(--ember)}
  .sp-badge.load{color:var(--gold-soft);border-color:var(--gold-deep)}
  .ver-line{text-align:center;font-size:10.5px;color:var(--mist-2);margin-top:12px}
  .sync-status{display:none;margin-top:12px;font-size:13px;border-radius:11px;padding:11px 13px;line-height:1.5}

  /* Bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-around;background:rgba(20,16,28,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:9px 6px calc(9px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto}
  .nav button{background:none;border:none;color:var(--mist-2);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-family:var(--sans);cursor:pointer;flex:1;padding:4px 0;transition:.15s}
  .nav button .ic{font-size:18px}
  .nav button.on{color:var(--gold-soft)}
  .nav .fab .ic{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:var(--ink);font-size:24px;margin-top:-24px;box-shadow:0 8px 22px rgba(203,167,94,.4);border:3px solid var(--ink)}
  .nav .fab .lab{display:none}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:60;background:var(--velvet-hi);border:1px solid var(--gold-deep);color:var(--gold-soft);padding:11px 20px;border-radius:30px;font-size:13.5px;box-shadow:var(--shadow);animation:rise .25s ease;white-space:nowrap}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ── DESKTOP-LAGER (endast CSS, JS oförändrad) ─────────────────── */
  @media (min-width:900px){
    .app{max-width:1000px;margin:0 0 0 212px;padding:34px 44px 64px}
    .brand,.brand-sub{display:none}
    .orbit{width:min(46vw,520px)}

    /* Bottennav → fast vänstersidebar med alla vyer synliga */
    .nav{flex-direction:column;align-items:stretch;justify-content:flex-start;
         top:0;bottom:0;left:0;right:auto;width:212px;max-width:212px;height:auto;margin:0;
         border-top:none;border-right:1px solid var(--line);background:var(--ink-2);
         backdrop-filter:none;padding:22px 12px 24px;gap:4px}
    .nav::before{content:'🌙  Coven';font-family:var(--serif);font-size:20px;
         color:var(--gold-soft);letter-spacing:.04em;padding:6px 12px 18px;display:block}
    .nav button{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:12px;width:100%;
         font-size:14.5px;color:var(--mist);padding:11px 14px;border-radius:12px}
    .nav button:hover{background:var(--velvet);color:var(--parchment)}
    .nav button.on{background:var(--velvet-hi);color:var(--gold-soft)}
    .nav button .ic{font-size:17px;margin:0;width:20px;text-align:center}

    /* FAB blir en vanlig knapp i innehållet (sidofältet) */
    .nav .fab{order:9;margin-top:8px;border:1px solid var(--gold-deep);
         background:linear-gradient(180deg,rgba(203,167,94,.16),rgba(203,167,94,.06));
         color:var(--gold-soft);font-weight:600}
    .nav .fab .ic{width:auto;height:auto;margin:0;border:none;box-shadow:none;background:none;
         border-radius:0;color:var(--gold-soft);font-size:18px}
    .nav .fab .lab{display:inline}

    .toast{bottom:30px}
  }
</style>
</head>
<body>
<div id="stars"></div>

<div class="app">
  <div class="brand"><span class="moon"></span><h1>Coven</h1></div>
  <div class="brand-sub">Din digitala vänskapsbok</div>

  <div class="view active" data-view="circle" id="v-circle"></div>
  <div class="view" data-view="energy" id="v-energy"></div>
  <div class="view" data-view="rituals" id="v-rituals"></div>
  <div class="view" data-view="memories" id="v-memories"></div>

  <div class="foot">
    <span id="sync-badge" class="sp-badge" style="display:none">Lokal</span>
    <button id="sync-now" style="display:none">↻ Synka</button>
    <button id="open-sync">Synk & inställningar</button>
    <button id="export-btn">Säkerhetskopiera</button>
    <button id="import-btn">Importera</button>
    <button id="news-btn">Nyheter &amp; funktioner</button>
  </div>
  <div class="ver-line" id="ver-line"></div>
</div>

<nav class="nav">
  <button class="on" data-v="circle"><span class="ic">☾</span>Cirkeln</button>
  <button data-v="energy"><span class="ic">◐</span>Energi</button>
  <button class="fab" data-add><span class="ic">＋</span><span class="lab">Lägg till vän</span></button>
  <button data-v="rituals"><span class="ic">✶</span>Ritualer</button>
  <button data-v="memories"><span class="ic">❧</span>Minnen</button>
</nav>

<input type="file" id="import-file" accept="application/json" style="display:none">

<!-- Generic dynamic sheet -->
<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="modal-sheet"><div id="modal-body"></div></div>

<!-- News sheet -->
<div class="sheet" id="news-sheet">
  <div class="sheet-hd"><div><div class="eyebrow" id="news-ver"></div><h3 class="sh">Nyheter &amp; funktioner</h3></div><button class="x" data-close>✕</button></div>
  <div class="news-tabs">
    <button class="chip on" data-news="changelog">Nyheter</button>
    <button class="chip" data-news="functions">Funktioner</button>
  </div>
  <div id="news-body"></div>
  <a class="news-link" href="coven-changelog.json" target="_blank" rel="noopener">Changelog-fil (.json) ↗</a>
</div>

<!-- Sync sheet -->
<div class="sheet" id="sync-sheet">
  <div class="sheet-hd"><div><div class="eyebrow">Synk mellan enheter</div><h3 class="sh">GitHub-synk</h3></div><button class="x" data-close>✕</button></div>
  <p style="color:var(--mist);font-size:13.5px;margin:6px 0 16px">Samma coven på alla enheter via ditt privata GitHub-repo. Din token sparas bara lokalt på den här enheten.</p>
  <div class="field"><label>GitHub-användarnamn</label><input id="gh-owner" placeholder="t.ex. Miracuel"></div>
  <div class="field"><label>Repo (privat)</label><input id="gh-repo" placeholder="t.ex. my-planers-data"></div>
  <div class="field"><label>Fine-grained token (Contents: read/write)</label><input id="gh-token" type="password" placeholder="github_pat_…"></div>
  <div id="gh-status" class="sync-status"></div>
  <div class="form-actions"><button class="btn" id="gh-off">Koppla från</button><button class="btn gold" id="gh-save">Spara &amp; anslut</button></div>
</div>

<div id="toast"></div>

<script>
/* ============================ APP-INFO & CENTRALEN-METADATA ============================ */
const APPINFO={
  version:'1.1.0',
  tagline:'Din digitala vänskapsbok med häxig känsla.',
  audience:'För dig som vill vårda dina vänskaper medvetet — samla varje persons energi, behov och magiska profil på ett ställe.',
  functions:[
    'Coven-cirkel: vänner som lysande klot på ringar efter relation',
    'Vänkort med bild, födelsedag, stjärntecken, favoritfärg och -musik',

function initials(n){ return String(n||'?').trim().split(/\s+/).slice(0,2).map(function(w){ return w[0]||''; }).join('').toUpperCase(); }
function firstName(n){ return String(n||'').split(' ')[0]; }
function timeAgo(ts){ if(!ts) return null; const day=864e5, d=Date.now()-ts; if(d<day) return 'idag'; const days=Math.floor(d/day); if(days<7) return days+' d sedan'; if(days<31) return Math.floor(days/7)+' v sedan'; return Math.floor(days/30)+' mån sedan'; }

/* ============================ SYNK (GitHub Contents API) ============================ */
let sync={owner:'',repo:'',token:'',sha:null};
function syncOn(){ return !!(sync.owner&&sync.repo&&sync.token); }
function loadSync(){ try{ const raw=localStorage.getItem(SYNC_KEY); if(raw){ const d=JSON.parse(raw); sync.owner=d.owner||''; sync.repo=d.repo||''; sync.token=d.token||''; } }catch(e){} }
function saveSync(){ try{ localStorage.setItem(SYNC_KEY,JSON.stringify({owner:sync.owner,repo:sync.repo,token:sync.token})); }catch(e){} }
const ghUrl=function(){ return 'https://api.github.com/repos/'+sync.owner+'/'+sync.repo+'/contents/'+SYNC_FILE; };
const ghHeaders=function(){ return {'Authorization':'Bearer '+sync.token,'Accept':'application/vnd.github+json'}; };
const b64enc=function(s){ return btoa(unescape(encodeURIComponent(s))); };
const b64dec=function(s){ return decodeURIComponent(escape(atob(String(s).replace(/\s/g,'')))); };
function setBadge(kind,msg){
  const b=$('sync-badge'); if(!b) return;
  if(!syncOn()){ b.style.display='inline-block'; b.textContent='Lokal'; b.className='sp-badge'; return; }
  b.style.display='inline-block'; b.textContent=msg;
  b.className='sp-badge'+(kind==='ok'?' ok':kind==='err'?' err':kind==='load'?' load':'');
}
function mergeFriends(local,remote){
  const map={};
  (local||[]).forEach(function(f){ if(f&&f.id) map[f.id]=f; });
  (remote||[]).forEach(function(r){
    if(!r||!r.id) return;
    const ex=map[r.id];
    if(!ex){ map[r.id]=r; return; }
    const tn=function(x){ return x.updated||x.createdAt||0; };
    if(tn(r)>=tn(ex)) map[r.id]=r;
  });
  return Object.keys(map).map(function(k){ return map[k]; });
}
async function ghGet(){
  const r=await fetch(ghUrl(),{headers:ghHeaders(),cache:'no-store'});
  if(r.status===404){ sync.sha=null; return null; }
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j=await r.json();
  sync.sha=j.sha;
  return JSON.parse(b64dec(j.content));
}
async function ghPull(){
  if(!syncOn()) return;
  try{
    setBadge('load','Hämtar…');
    const data=await ghGet();
    if(data&&Array.isArray(data.friends)){
      state.friends=mergeFriends(state.friends,data.friends);
      save(); renderAll();
    }
    setBadge('ok','Synkad');
  }catch(e){ setBadge('err','Synkfel'); }
}
async function ghPush(){
  if(!syncOn()) return;
  setBadge('load','Sparar…');
  const payload={friends:state.friends,updated:new Date().toISOString()};
  const content=b64enc(JSON.stringify(payload));
  const doPut=function(){
    return fetch(ghUrl(),{method:'PUT',headers:Object.assign({},ghHeaders(),{'Content-Type':'application/json'}),
      body:JSON.stringify(Object.assign({message:'Uppdatering via Coven',content:content},sync.sha?{sha:sync.sha}:{}))});
  };
  let r=await doPut();
  if(r.status===409||r.status===422){ try{ await ghGet(); }catch(e){} r=await doPut(); }
  if(!r.ok){ setBadge('err','Synkfel'); throw new Error('HTTP '+r.status); }
  const j=await r.json();
  if(j.content&&j.content.sha) sync.sha=j.content.sha;
  setBadge('ok','Synkad');
}

  f.lastContact=Date.now(); if(f.energy==='reach'||f.energy==='soft') f.energy='ok';
  f.memories=f.memories||[]; f.memories.push({id:uid(),text:'Ritual · '+r.label,date:Date.now()});
  f.updated=Date.now(); persist(); toast('Ritual utförd ✦'); openDetail(id);
}
function addMemory(id){
  const f=state.friends.find(function(x){ return x.id===id; }); if(!f) return;
  const v=$('mem-in').value.trim(); if(!v) return;
  f.memories=f.memories||[]; f.memories.push({id:uid(),text:v,date:Date.now()});
  f.updated=Date.now(); persist(); openDetail(id);
}

/* ============================ RITUAL PICKER ============================ */
function openRitual(rk){
  const r=RITUALS.find(function(x){ return x.key===rk; });
  if(!state.friends.length){ toast('Lägg till en vän först'); return; }
  let opts='';
  state.friends.forEach(function(f){ opts+='<button class="chip" onclick="logRitual(\''+f.id+'\',\''+rk+'\');toast(\''+esc(r.label)+' med '+esc(firstName(f.name))+' ✦\')">'+esc(f.name)+'</button>'; });
  openModal('<div class="sheet-hd"><div><div class="eyebrow">Ritual</div><h3 class="sh">'+r.g+' '+esc(r.label)+'</h3></div><button class="x" onclick="closeSheets()">✕</button></div>'+
    '<p style="color:var(--mist);font-size:14px;margin:8px 0 16px">Med vem vill du utföra denna ritual?</p><div class="selgrid">'+opts+'</div>');
}

/* ============================ AI HÄXHJÄLP ============================ */
function aiPrompt(type,f){
  const parts=['Namn: '+f.name];
  if(f.sign) parts.push('Stjärntecken: '+f.sign);
  if(f.color) parts.push('Favoritfärg: '+f.color);
  if(f.music) parts.push('Favoritmusik: '+f.music);
  if(f.comfort) parts.push('Trygghetsbehov: '+f.comfort);
  if(f.jokes) parts.push('Inside jokes: '+f.jokes);
  if(f.notes) parts.push('Anteckningar: '+f.notes);
  const cat=CATEGORIES.find(function(c){ return c.key===f.category; });
  parts.push('Relation: '+(cat?cat.label:''));
  parts.push('Nuvarande energi: '+((ENERGY[f.energy]||{}).label||''));
  parts.push(f.lastContact?('Senaste kontakt: '+timeAgo(f.lastContact)):'Vet ej när vi sågs senast');
  if(f.tarot&&TAROT[f.tarot]) parts.push('Tilldelat tarotkort: '+TAROT[f.tarot].name+' ('+TAROT[f.tarot].meaning+')');
  const tasks={
    message:'Föreslå 3 korta, varma meddelanden jag kan skicka för att höra av mig. Träffa rätt ton för just den här personen.',
    gift:'Föreslå 3 omtänksamma presentidéer som passar den här personen, kort motiverade.',
    activity:'Föreslå 3 aktiviteter vi kan göra tillsammans som passar relationen och personens energi.',
    reconnect:'Hjälp mig återuppta kontakten på ett mjukt, ärligt sätt. Ge ett konkret förslag på vad jag kan skriva.',
    needs:'Utifrån anteckningarna och tonen — vad verkar den här personen behöva från mig just nu? Svara empatiskt och konkret.'
  };
  return 'Här är min vän:\n'+parts.join('\n')+'\n\nUppgift: '+tasks[type];
}
async function askAI(id,type){
  const f=state.friends.find(function(x){ return x.id===id; }); if(!f) return;
  const out=$('ai-out'); if(!out) return;
  out.innerHTML='<div class="ai-out load">Häxan rådfrågar korten<span class="dots"></span></div>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        system:'Du är en varm, intuitiv häx-assistent i appen Coven som hjälper användaren vårda sina vänskaper. Svara alltid på svenska, kort och hjärtligt. Var konkret och personlig utifrån informationen. Skriv inga förklaringar om att du är en AI och inga rubriker — bara förslagen, gärna som en kort punktlista.',
        messages:[{role:'user',content:aiPrompt(type,f)}]
      })
    });
    const data=await res.json();
    let text='';
    (data.content||[]).forEach(function(b){ if(b.type==='text') text+=(text?'\n':'')+b.text; });
    text=text.trim();
    if(!text) throw new Error('tomt');
    out.innerHTML='<div class="ai-out">'+esc(text)+'<div style="margin-top:12px"><button class="chip" onclick="copyAI(this)">Kopiera</button></div></div>';
    out._last=text;
  }catch(e){
    out.innerHTML='<div class="ai-out">Häxhjälpen kunde inte nå korten just nu. Försök igen om en stund.</div>';
  }
}
function copyAI(btn){ const t=$('ai-out')._last||''; if(navigator.clipboard) navigator.clipboard.writeText(t); btn.textContent='Kopierat ✦'; setTimeout(function(){ btn.textContent='Kopiera'; },1500); }

/* ============================ FORM ============================ */
let formPhoto=null;
function openForm(id){
  const f=id?state.friends.find(function(x){ return x.id===id; }):null;
  formPhoto=f?f.photo:null;
  let catOpts='';
  CATEGORIES.forEach(function(c){ catOpts+='<button type="button" class="chip '+((f?f.category:'nara')===c.key?'on':'')+'" data-cat="'+c.key+'" onclick="pickCat(this)">'+c.label+'</button>'; });
  let tarotOpts='';
  Object.keys(TAROT).forEach(function(k){ const t=TAROT[k]; tarotOpts+='<button type="button" class="chip '+((f&&f.tarot)===k?'on':'')+'" data-tarot="'+k+'" onclick="pickTarot(this)">'+t.gl+' '+t.name+'</button>'; });
  let energyOpts='';
  Object.keys(ENERGY).forEach(function(k){ const v=ENERGY[k]; energyOpts+='<button type="button" class="chip '+((f?f.energy:'ok')===k?'on':'')+'" data-energy="'+k+'" onclick="pickEnergy(this)"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+v.color+';margin-right:5px"></span>'+v.label+'</button>'; });
  const val=function(k){ return f&&f[k]?esc(f[k]):''; };
  openModal(
    '<div class="sheet-hd"><div><div class="eyebrow">'+(f?'Redigera':'Ny medlem i covenet')+'</div><h3 class="sh">'+(f?esc(f.name):'Lägg till vän')+'</h3></div>'+
      '<button class="x" onclick="'+(f?'openDetail(\''+f.id+'\')':'closeSheets()')+'">✕</button></div>'+
    '<div class="field"><label>Namn</label><input id="i-name" value="'+val('name')+'" placeholder="Vännens namn"></div>'+
    '<div class="field"><label>Bild</label><div class="photo-pick"><div class="photo-prev" id="ph-prev">'+(formPhoto?'<img src="'+formPhoto+'">':'☾')+'</div>'+
      '<div style="display:flex;gap:8px"><label class="btn" style="cursor:pointer">Välj bild<input type="file" accept="image/*" style="display:none" onchange="onPhoto(event)"></label>'+(formPhoto?'<button type="button" class="btn ghost" onclick="clearPhoto()">Ta bort</button>':'')+'</div></div></div>'+
    '<div class="field-row"><div class="field"><label>Födelsedag</label><input id="i-birthday" type="date" value="'+val('birthday')+'"></div><div class="field"><label>Stjärntecken</label><input id="i-sign" value="'+val('sign')+'" placeholder="t.ex. Skorpionen"></div></div>'+
    '<div class="field-row"><div class="field"><label>Favoritfärg</label><input id="i-color" value="'+val('color')+'" placeholder="t.ex. salviagrön"></div><div class="field"><label>Favoritmusik</label><input id="i-music" value="'+val('music')+'" placeholder="artist / genre"></div></div>'+
    '<div class="field"><label>Relation</label><div class="selgrid" id="sel-cat">'+catOpts+'</div></div>'+
    '<div class="field"><label>Energi just nu</label><div class="selgrid" id="sel-energy">'+energyOpts+'</div></div>'+
    '<div class="field"><label>Tarotkort</label><div class="selgrid" id="sel-tarot">'+tarotOpts+'</div></div>'+
    '<div class="field"><label>Trygghetsbehov</label><textarea id="i-comfort" placeholder="Vad får den här personen att känna sig trygg?">'+val('comfort')+'</textarea></div>'+
    '<div class="field"><label>Inside jokes</label><textarea id="i-jokes" placeholder="Era egna skämt och referenser">'+val('jokes')+'</textarea></div>'+
    '<div class="field"><label>Anteckningar</label><textarea id="i-notes" placeholder="Allt du vill minnas">'+val('notes')+'</textarea></div>'+
    '<div class="form-actions"><button class="btn" onclick="'+(f?'openDetail(\''+f.id+'\')':'closeSheets()')+'">Avbryt</button><button class="btn gold" onclick="saveForm(\''+(id||'')+'\')">Spara</button></div>'+
    (f?'<button class="del-link" onclick="confirmDelete(\''+f.id+'\')">Ta bort ur covenet</button>':'')
  );
  modalCtx={cat:(f?f.category:'nara'),energy:(f?f.energy:'ok'),tarot:(f&&f.tarot)||''};
}
function pickCat(b){ document.querySelectorAll('#sel-cat .chip').forEach(function(c){ c.classList.remove('on'); }); b.classList.add('on'); modalCtx.cat=b.dataset.cat; }
function pickEnergy(b){ document.querySelectorAll('#sel-energy .chip').forEach(function(c){ c.classList.remove('on'); }); b.classList.add('on'); modalCtx.energy=b.dataset.energy; }
function pickTarot(b){ const on=b.classList.contains('on'); document.querySelectorAll('#sel-tarot .chip').forEach(function(c){ c.classList.remove('on'); }); if(!on){ b.classList.add('on'); modalCtx.tarot=b.dataset.tarot; } else { modalCtx.tarot=''; } }
function onPhoto(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const max=260, sc=Math.min(1,max/Math.max(img.width,img.height));
      const c=document.createElement('canvas'); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      formPhoto=c.toDataURL('image/jpeg',0.82);
      $('ph-prev').innerHTML='<img src="'+formPhoto+'">';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearPhoto(){ formPhoto=null; $('ph-prev').innerHTML='☾'; }
function saveForm(id){
  const pick=modalCtx||{};
  const name=$('i-name').value.trim();
  if(!name){ $('i-name').focus(); $('i-name').style.borderColor='var(--ember)'; return; }
  let f=id?state.friends.find(function(x){ return x.id===id; }):null;
  const data={ name:name, photo:formPhoto||null, birthday:$('i-birthday').value, sign:$('i-sign').value.trim(),
    color:$('i-color').value.trim(), music:$('i-music').value.trim(), comfort:$('i-comfort').value.trim(),
    jokes:$('i-jokes').value.trim(), notes:$('i-notes').value.trim(),
    category:pick.cat||'nara', energy:pick.energy||'ok', tarot:pick.tarot||'' };
  if(f){ Object.assign(f,data); f.updated=Date.now(); }
  else { f=Object.assign({id:uid(),memories:[],lastContact:null,createdAt:Date.now(),updated:Date.now()},data); state.friends.push(f); }
  persist(); toast(id?'Sparat ✦':'Tillagd i covenet ✦'); openDetail(f.id); renderAll();
}
function confirmDelete(id){
  const f=state.friends.find(function(x){ return x.id===id; }); if(!f) return;
  openModal('<div class="sheet-hd"><h3 class="sh">Ta bort '+esc(f.name)+'?</h3><button class="x" onclick="openDetail(\''+id+'\')">✕</button></div>'+
    '<p style="color:var(--mist);font-size:14px;margin:6px 0 18px">Detta tar bort kortet och alla minnen kopplade till '+esc(firstName(f.name))+'. Det går inte att ångra.</p>'+
    '<div class="form-actions"><button class="btn" onclick="openDetail(\''+id+'\')">Behåll</button><button class="btn" style="border-color:var(--ember);color:var(--ember)" onclick="doDelete(\''+id+'\')">Ta bort</button></div>');
}
function doDelete(id){
  state.friends=state.friends.filter(function(x){ return x.id!==id; });
  persist(); closeSheets(); toast('Borttagen'); renderAll();
}

/* ============================ EXPORT / IMPORT ============================ */
function exportData(){
  const blob=new Blob([JSON.stringify({friends:state.friends,updated:new Date().toISOString()},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='coven-backup.json'; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); },1000);
  toast('Säkerhetskopia sparad ✦');
}
function importData(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(d&&Array.isArray(d.friends)){ state.friends=mergeFriends(state.friends,d.friends); persist(); renderAll(); toast('Importerat ✦'); }
      else toast('Filen saknar vänner');
    }catch(err){ toast('Kunde inte läsa filen'); }
  };
  reader.readAsText(file);
}
$('export-btn').onclick=exportData;
$('import-btn').onclick=function(){ $('import-file').click(); };
$('import-file').onchange=function(e){ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=''; };

/* ============================ NYHETER & FUNKTIONER ============================ */
let newsTab='changelog';
function renderNews(){
  $('news-ver').textContent='Version '+APPINFO.version+' · '+APPINFO.tagline;
  document.querySelectorAll('[data-news]').forEach(function(c){ c.classList.toggle('on',c.dataset.news===newsTab); });
  const el=$('news-body');
  if(newsTab==='changelog'){
    el.innerHTML=APPINFO.changelog.map(function(e){
      return '<div class="cl-entry"><div class="cl-head"><span class="v">v'+esc(e.v)+'</span><time>'+esc(e.d)+'</time></div>'+
        e.items.map(function(it){ return '<div class="cl-item">'+esc(it)+'</div>'; }).join('')+'</div>';
    }).join('');
  } else {
    el.innerHTML='<div class="fn-area">Vad Coven kan</div>'+APPINFO.functions.map(function(it){ return '<div class="cl-item">'+esc(it)+'</div>'; }).join('')+
      '<div class="fn-area">Målgrupp</div><div class="cl-item">'+esc(APPINFO.audience)+'</div>';
  }
}
$('news-btn').onclick=function(){ newsTab='changelog'; renderNews(); openSheet('news-sheet'); };
document.querySelectorAll('[data-news]').forEach(function(c){ c.onclick=function(){ newsTab=c.dataset.news; renderNews(); }; });

/* ============================ SYNK-UI ============================ */
function ghStatus(msg,type){
  const el=$('gh-status'); el.style.display='block';
  el.style.background=type==='ok'?'rgba(147,165,126,.14)':type==='err'?'rgba(206,129,89,.14)':'var(--velvet)';
  el.style.color=type==='ok'?'var(--sage)':type==='err'?'var(--ember)':'var(--mist)';
  el.textContent=msg;
}
function openSyncSheet(){
  $('gh-owner').value=sync.owner; $('gh-repo').value=sync.repo; $('gh-token').value=sync.token;
  $('gh-status').style.display='none'; openSheet('sync-sheet');
}
$('open-sync').onclick=openSyncSheet;
$('sync-badge').onclick=function(){ if(syncOn()) ghPull(); else openSyncSheet(); };
$('sync-now').onclick=function(){ ghPull(); };
$('gh-off').onclick=function(){
  sync={owner:'',repo:'',token:'',sha:null};
  try{ localStorage.removeItem(SYNC_KEY); }catch(e){}
  $('gh-owner').value=''; $('gh-repo').value=''; $('gh-token').value='';
  setBadge('','Lokal'); $('sync-now').style.display='none'; ghStatus('Frånkopplad. Datan finns kvar lokalt.','ok');
};
$('gh-save').onclick=async function(){
  sync.owner=$('gh-owner').value.trim(); sync.repo=$('gh-repo').value.trim(); sync.token=$('gh-token').value.trim();
  if(!syncOn()){ ghStatus('Fyll i alla tre fälten.','err'); return; }
  saveSync(); sync.sha=null; ghStatus('Testar anslutning…','info');
  try{
    const data=await ghGet();
    if(data){ ghStatus('✓ Ansluten! Hämtar ditt coven…','ok'); await ghPull(); }
    else { ghStatus('✓ Ansluten! Repot saknar coven.json — laddar upp din lokala data…','ok'); await ghPush(); }
    $('sync-now').style.display='inline-block';
    setTimeout(closeSheets,1200);
  }catch(e){ ghStatus('Fel: '+e.message+'. Kontrollera användarnamn, reponamn och att token har Contents-behörighet.','err'); }
};
document.addEventListener('visibilitychange',function(){ if(!document.hidden&&syncOn()) ghPull(); });

/* ============================ INIT ============================ */
load();
loadSync();
$('ver-line').textContent='Coven v'+APPINFO.version;
if(syncOn()){ setBadge('ok','Synkad'); $('sync-now').style.display='inline-block'; } else setBadge('','Lokal');
renderAll();
if(syncOn()) ghPull();
</script>
