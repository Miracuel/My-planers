<style>
:root{
  --bg:#F3F1EC;--panel:#FCFBF8;--panel2:#EDEAE2;--line:#DFDAD0;
  --ink:#2E2B3A;--muted:#847E96;--accent:#564CA8;--accent-soft:#E5E1F2;
  --gold:#B0883F;--red:#C0837E;--navbg:rgba(243,241,236,.95);
  --c1:#6E62C8;--c2:#C46A8C;--c3:#4E9BA8;--c4:#C2A36B;--c5:#7FA073;--c6:#C98A6F;
  --herobg1:#241F42;--herobg2:#3A3268;--heroink:#F2EFFC;--heromut:#B4ADD6;
}
html[data-theme=dark]{
  --bg:#14131E;--panel:#1E1C2C;--panel2:#282538;--line:#363248;
  --ink:#E8E5F2;--muted:#9B94B4;--accent:#8F86D9;--accent-soft:#2C2846;
  --gold:#D6BA7C;--red:#C98F8A;--navbg:rgba(20,19,30,.95);
  --c1:#9C90E8;--c2:#D687A0;--c3:#6FB6C2;--c4:#D6BA7C;--c5:#9CBB8F;--c6:#DBA184;
  --herobg1:#1B1830;--herobg2:#2C2650;--heroink:#F2EFFC;--heromut:#A69ECB;
}
html[data-skin=guld]{--accent:#B0883F;--accent-soft:#EFE5CC}
html[data-skin=guld][data-theme=dark]{--accent:#D6BA7C;--accent-soft:#332A18}
html[data-skin=ros]{--accent:#B4506E;--accent-soft:#F2DDE5}
html[data-skin=ros][data-theme=dark]{--accent:#D687A0;--accent-soft:#3A2430}
html[data-skin=hav]{--accent:#3F8C9B;--accent-soft:#D4E8EB}
html[data-skin=hav][data-theme=dark]{--accent:#5FB0C0;--accent-soft:#1E3036}
html[data-skin=skog]{--accent:#5C7A57;--accent-soft:#DEE8DB}
html[data-skin=skog][data-theme=dark]{--accent:#8FB585;--accent-soft:#243020}
html{background:var(--bg);color-scheme:light}
html[data-theme=dark]{color-scheme:dark}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;transition:background .4s,color .4s}
.app{max-width:480px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 14px calc(84px + env(safe-area-inset-bottom))}
h1.brand{font-family:Georgia,serif;font-weight:400;font-size:21px;letter-spacing:.04em;text-align:center;margin:2px 0 4px}
.brand-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:14px;letter-spacing:.03em}
.icon-btns{position:absolute;top:calc(12px + env(safe-area-inset-top));right:14px;display:flex;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:16px;cursor:pointer}
.page-h{font-family:Georgia,serif;font-size:22px;margin:2px 0 12px}
.section-title{font-family:Georgia,serif;font-size:15px;margin:18px 0 8px;letter-spacing:.02em}
.card-panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px}
.btn{border:1px solid var(--accent);background:var(--panel);color:var(--accent);border-radius:14px;padding:11px 14px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .3s}
.btn:active{background:var(--accent-soft)}
.btn.fill{background:var(--accent);color:#fff}
.btn.ghost{border-color:var(--line);color:var(--muted);font-size:12px;padding:7px 10px}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin:11px 0 4px}
input,textarea,select{background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:14px;padding:9px 10px;font-family:inherit;width:100%;outline:none}
textarea{resize:vertical}
.empty-msg{font-size:12px;color:var(--muted);padding:14px 0;text-align:center}
.soft{font-size:12px;color:var(--muted);line-height:1.6}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chip{border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.chip.sel{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:11px;color:var(--muted);margin:0 5px 6px 0}
.sub-h{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 7px}

/* ── Hjältekortet: stjärnhimmel ─────────────────────────── */
.hero{position:relative;overflow:hidden;border-radius:22px;padding:20px 18px 18px;
  background:linear-gradient(160deg,var(--herobg2),var(--herobg1));color:var(--heroink);
  border:1px solid var(--line);box-shadow:0 8px 26px rgba(30,24,60,.22)}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.9;
  background:
   radial-gradient(1.4px 1.4px at 12% 22%,#fff 55%,transparent 60%),
   radial-gradient(1.1px 1.1px at 30% 68%,#EADFA8 55%,transparent 60%),
   radial-gradient(1.6px 1.6px at 46% 14%,#fff 55%,transparent 60%),
   radial-gradient(1px 1px at 62% 52%,#CFC6F0 55%,transparent 60%),
   radial-gradient(1.5px 1.5px at 76% 24%,#fff 55%,transparent 60%),
   radial-gradient(1.1px 1.1px at 88% 62%,#EADFA8 55%,transparent 60%),
   radial-gradient(1px 1px at 22% 88%,#CFC6F0 55%,transparent 60%),
   radial-gradient(1.3px 1.3px at 70% 86%,#fff 55%,transparent 60%),
   radial-gradient(1px 1px at 94% 10%,#fff 55%,transparent 60%),
   radial-gradient(1.2px 1.2px at 6% 54%,#EADFA8 55%,transparent 60%)}
.hero .hlbl{position:relative;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--heromut)}
.hero .htop{position:relative;display:flex;align-items:center;gap:13px;margin-top:7px}
.hero .hem{font-size:38px;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.35))}
.hero .hname{font-family:Georgia,serif;font-size:22px;line-height:1.2;flex:1;min-width:0}
.hero .hdate{font-size:12px;color:var(--heromut);margin-top:3px}
.hero .hring{flex-shrink:0}
.hero .hring text{font-family:Georgia,serif;fill:var(--heroink)}
.digits{position:relative;display:flex;gap:8px;margin-top:16px}
.dig{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:11px 2px 9px;text-align:center;backdrop-filter:blur(2px)}
.dig b{font-family:Georgia,serif;font-weight:400;font-size:30px;display:block;line-height:1;font-variant-numeric:tabular-nums}
.dig i{font-style:normal;font-size:9px;color:var(--heromut);text-transform:uppercase;letter-spacing:.1em;display:block;margin-top:5px}
.hero.empty{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;padding:28px 18px}
.hero.empty .he{font-size:42px}
.hero.empty .btn{position:relative;border-color:rgba(255,255,255,.4);color:var(--heroink);background:transparent}

/* ── Händelserader ──────────────────────────────────────── */
.ev{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px 13px;margin-bottom:9px;cursor:pointer;border-left-width:4px}
.ev .ic{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--panel2)}
.ev .tx{flex:1;min-width:0}
.ev .en{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev .ed{font-size:11px;color:var(--muted);margin-top:2px}
.ev .cd-mini{font-family:Georgia,serif;font-size:15px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.ev .cd-since{font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.ev .pb{height:4px;background:var(--panel2);border-radius:3px;margin-top:7px;overflow:hidden}
.ev .pb i{display:block;height:100%;border-radius:3px}
.rc{font-size:10px;opacity:.8}

/* ── Vyer, nav, fab, sheet ──────────────────────────────── */
.view{display:none}
.view.active{display:block;animation:fadein .25s}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.nav{position:fixed;left:0;right:0;bottom:0;background:var(--navbg);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;max-width:480px;margin:0 auto;padding:0 0 env(safe-area-inset-bottom);z-index:40}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-size:10px;padding:9px 2px;cursor:pointer;font-family:inherit}
.nav button.active{color:var(--accent);font-weight:600}
.nav button span{display:block;font-size:16px;margin-bottom:2px}
.nav button.navspacer{flex:0 0 56px;pointer-events:none}
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(28px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:30px;line-height:1;cursor:pointer;z-index:43;box-shadow:0 4px 18px rgba(86,76,168,.45)}
.scrim{position:fixed;inset:0;background:rgba(20,16,40,.4);opacity:0;pointer-events:none;transition:opacity .25s;z-index:55}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:22px 22px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .28s ease;z-index:60;max-height:88vh;overflow-y:auto}
.sheet.open{transform:none}
.sheet h3{font-family:Georgia,serif;font-weight:400;font-size:18px;margin-bottom:2px}
.sheet-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer;font-size:14px}
.emochips{display:flex;flex-wrap:wrap;gap:6px}
.emochips button{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);font-size:19px;cursor:pointer}
.emochips button.sel{border-color:var(--accent);background:var(--accent-soft)}
.fargchips{display:flex;gap:8px}
.fargchips button{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.fargchips button.sel{border-color:var(--ink);box-shadow:0 0 0 2px var(--panel)}
.verline{text-align:center;font-size:11px;color:var(--muted);margin-top:22px}

/* ── DESKTOP-LAGER (endast CSS, JS oförändrad) ─────────── */
@media (min-width:0px){
  .app{max-width:1000px;margin:0 0 0 212px;padding:30px 38px 64px}
  .brand,.brand-sub{display:none}
  .icon-btns{right:34px;top:22px}

  /* Bottennav → fast vänstersidebar */
  .nav{flex-direction:column;align-items:stretch;justify-content:flex-start;
       top:0;bottom:0;left:0;right:auto;width:212px;max-width:212px;height:auto;margin:0;
       border-top:none;border-right:1px solid var(--line);background:var(--panel);
       backdrop-filter:none;padding:20px 12px 24px;gap:3px}
  .nav::before{content:'\23F3  Nedräknaren';font-family:Georgia,serif;font-size:18px;
       color:var(--ink);letter-spacing:.03em;padding:6px 12px 4px;display:block;order:-2}
  .nav::after{content:'Räkna ner till livets stora dagar';font-size:11px;color:var(--muted);
       padding:0 12px 16px;display:block;order:-1}
  .nav button{flex:0 0 auto;display:flex;align-items:center;gap:11px;text-align:left;
       font-size:14px;padding:11px 12px;border-radius:12px;color:var(--muted)}
  .nav button span{display:inline;margin:0;font-size:17px}
  .nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .nav button.navspacer{display:none}

  /* Lägg till-knappen nere till höger i innehållet */
  .fab{left:auto;right:34px;bottom:30px;transform:none}

  /* Större hjältesiffror och tvåkolumnslistor */
  .dig b{font-size:44px}
  .hero .hname{font-size:26px}
  #list-upcoming,#list-alla{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;align-items:start}
  #list-past{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;align-items:start}

  /* Bottom-sheet → centrerad modal i innehållsytan */
  .sheet{left:calc(50% + 106px);right:auto;top:50%;bottom:auto;
         width:480px;max-width:84vw;max-height:86vh;border-radius:20px;
         transform:translate(-50%,-46%);opacity:0;pointer-events:none;
         transition:transform .2s ease,opacity .2s ease;
         box-shadow:0 18px 50px rgba(0,0,0,.28)}
  .sheet.open{transform:translate(-50%,-50%);opacity:1;pointer-events:auto}
}
</style>
</head>
<body>
<div class="app" id="app-root">
<div class="icon-btns"><button class="icon-btn" id="theme-btn" aria-label="Tema">◐</button></div>
<h1 class="brand">⏳ Nedräknaren</h1>
<div class="brand-sub">Räkna ner till livets stora dagar</div>

<!-- ÖVERSIKT -->
<div class="view active" id="view-oversikt">
  <div id="hero"></div>
  <div class="section-title">Kommande</div>
  <div id="list-upcoming"></div>
  <div id="past-wrap">
    <div class="section-title">Passerade</div>
    <div id="list-past"></div>
  </div>
</div>

<!-- ALLA -->
<div class="view" id="view-alla">
  <div class="page-h">Alla nedräkningar</div>
  <div class="soft" style="margin-bottom:10px">Tryck på en händelse för att redigera. Upprepade händelser (↻) rullar automatiskt vidare till nästa tillfälle.</div>
  <div id="list-alla"></div>
</div>

<!-- INSTÄLLNINGAR -->
<div class="view" id="view-installningar">
  <div class="page-h">Inställningar</div>
  <div class="section-title">Utseende</div>
  <div class="card-panel">
    <label>Läge</label><div class="chips" id="mode-pick"></div>
    <label>Färgtema</label><div class="chips" id="skin-pick"></div>
  </div>
  <div class="section-title">Data</div>
  <div class="card-panel">
    <div class="btn-row">
      <button class="btn" id="exp-btn">Exportera</button>
      <button class="btn" id="imp-btn">Importera</button>
    </div>
    <button class="btn danger" id="clr-btn" style="width:100%;margin-top:8px">Rensa allt</button>
    <input type="file" id="imp-file" accept="application/json" style="display:none">
  </div>
  <div class="section-title">Nyheter &amp; funktioner</div>
  <div id="changelog-body"></div>
  <div class="verline" id="app-ver"></div>
</div>
</div>

<div class="nav" id="nav">
  <button class="active" data-v="oversikt"><span>⌂</span>Översikt</button>
  <button class="navspacer"></button>
  <button data-v="alla"><span>⏳</span>Alla</button>
  <button data-v="installningar"><span>⚙</span>Inställningar</button>
</div>
<button class="fab" id="fab" aria-label="Lägg till">+</button>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <button class="sheet-close" id="sheet-x">✕</button>
  <h3 id="sheet-h">Ny nedräkning</h3>
  <div class="soft" id="sheet-sub">Vad vill du räkna ner till?</div>
  <label>Titel</label>
  <input id="f-titel" placeholder="T.ex. Semester i Grekland" autocomplete="off">
  <label>Symbol</label>
  <div class="emochips" id="f-emochips"></div>
  <div class="grid2">
    <div><label>Datum</label><input type="date" id="f-datum"></div>
    <div><label>Tid (valfri)</label><input type="time" id="f-tid"></div>
  </div>
  <label>Upprepning</label>
  <select id="f-recur">
    <option value="ingen">Ingen – engångshändelse</option>
    <option value="arlig">Årlig (t.ex. födelsedag)</option>
    <option value="manadsvis">Månadsvis</option>
    <option value="veckovis">Veckovis</option>
  </select>
  <label>Färg</label>
  <div class="fargchips" id="f-fargchips"></div>
  <label>Anteckning (valfri)</label>
  <textarea id="f-note" rows="2" placeholder="Detaljer, plats, packlista …"></textarea>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn fill" id="f-save">Spara</button>
  </div>
  <button class="btn danger" id="f-del" style="width:100%;margin-top:8px;display:none">Ta bort händelsen</button>
</div>

<script>
/* ============================================================
   Nedräknaren – räkna ner till livets stora dagar
   ============================================================ */
var APPINFO={version:'1.0.0',tagline:'Räkna ner till livets stora dagar – i realtid.',audience:'Privat',functions:['Realtidsnedräkning i dagar, timmar, minuter, sekunder','Hjältekort med stjärnhimmel och förloppsring','Upprepning: årlig, månadsvis, veckovis','Passerade händelser visar tid sedan','Egen emoji och färg per händelse','Fem färgteman + auto/ljust/mörkt läge','Export/import av JSON, lokal lagring','Mobil- och desktopversion med identisk JS'],changelog:[{v:'1.0.0',d:'2026-07-11',items:['Första versionen: skapa nedräkningar med datum, valfri tid, emoji, färg och anteckning.','Hjältekort med stjärnhimmel, förloppsring och stora siffror som tickar varje sekund.','Upprepning (årlig, månadsvis, veckovis) som automatiskt rullar vidare till nästa tillfälle.','Passerade engångshändelser flyttas till "Passerade" och visar hur länge sedan det var.','Fem färgteman (Midnatt, Guld, Rosé, Hav, Skog) samt auto/ljust/mörkt läge.','Export och import av all data som JSON, allt sparas lokalt i webbläsaren.','Egen PNG-favicon: gyllene timglas under stjärnhimmel.']}]};
var CENTRALEN={id:'nedraknaren',namn:'Nedräknaren',ikon:'⏳',desc:'Räkna ner till livets stora dagar',mobil:'nedraknaren.html',desktop:'nedraknaren-desktop.html',farger:{bg:'#F3F1EC',line:'#DFDAD0',ink:'#2E2B3A',muted:'#847E96',accent:'#564CA8',iconbg:'#E5E1F2'}};

var KEY='nedraknaren_v1';
var state={items:[],theme:'auto',skin:'midnatt'};
function load(){try{var raw=localStorage.getItem(KEY);if(raw){var d=JSON.parse(raw);if(d&&typeof d==='object')Object.assign(state,d);}}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function uid(){return 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function pad2(n){return (n<10?'0':'')+n;}
function todayKey(){var d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}

var VDAG=['sön','mån','tis','ons','tors','fre','lör'];
var MAN=['jan','feb','mars','april','maj','juni','juli','aug','sep','okt','nov','dec'];
var EMOJIS=['⏳','🎂','🎄','🎁','✈️','💍','🎓','🌞','🎃','🐣','💜','⭐'];
var FARGER=['c1','c2','c3','c4','c5','c6'];
var RECURTXT={ingen:'',arlig:'årlig',manadsvis:'månadsvis',veckovis:'veckovis'};

/* ── Tidshjälpare ─────────────────────────────────────────── */
function baseDate(it){var t=it.tid&&/^\d{2}:\d{2}$/.test(it.tid)?it.tid:'00:00';return new Date(it.datum+'T'+t+':00');}
function target(it){
  var d=baseDate(it);if(isNaN(d))return null;
  if(it.recur&&it.recur!=='ingen'){
    var now=new Date(),guard=0;
    while(d<=now&&guard<1200){
      if(it.recur==='arlig')d.setFullYear(d.getFullYear()+1);
      else if(it.recur==='manadsvis')d.setMonth(d.getMonth()+1);
      else d=new Date(d.getTime()+7*86400000);
      guard++;
    }
  }
  return d;
}
function parts(ms){
  var s=Math.max(0,Math.floor(ms/1000));
  return {d:Math.floor(s/86400),h:Math.floor(s%86400/3600),m:Math.floor(s%3600/60),s:s%60};
}
function fmtCompact(ms){
  var p=parts(ms);
  if(p.d>0)return p.d+' d '+p.h+' h';
  if(p.h>0)return p.h+' h '+p.m+' min';
  if(p.m>0)return p.m+' min '+p.s+' s';
  return p.s+' s';
}
function fmtSince(ms){
  var p=parts(ms);
  if(p.d>0)return 'för '+p.d+(p.d===1?' dag':' dagar')+' sedan';
  if(p.h>0)return 'för '+p.h+' h sedan';
  if(p.m>0)return 'för '+p.m+' min sedan';
  return 'nyss 🎉';
}
function fmtDate(d,tid){
  var s=VDAG[d.getDay()]+' '+d.getDate()+' '+MAN[d.getMonth()]+' '+d.getFullYear();
  if(tid)s+=' · kl '+tid;
  return s;
}
function progress(it,t){
  var start=it.skapad||Date.now(),tot=t-start;
  if(tot<=0)return 1;
  return Math.min(1,Math.max(0,(Date.now()-start)/tot));
}

/* ── Tema ─────────────────────────────────────────────────── */
function applyTheme(){
  var m=state.theme||'auto',h=new Date().getHours();
  var dark=m==='dark'||(m==='auto'&&(h>=20||h<7));
  document.documentElement.dataset.theme=dark?'dark':'light';
  document.documentElement.dataset.skin=state.skin||'midnatt';
  var meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.content=dark?'#14131E':'#F3F1EC';
  var b=document.getElementById('theme-btn');
  if(b)b.textContent=m==='auto'?'◐':(m==='dark'?'☾':'☀');
}
document.getElementById('theme-btn').onclick=function(){state.theme=state.theme==='auto'?'dark':state.theme==='dark'?'light':'auto';save();applyTheme();renderInstallningar();};

/* ── Navigation ───────────────────────────────────────────── */
function go(v){
  document.querySelectorAll('.view').forEach(function(x){x.classList.toggle('active',x.id==='view-'+v);});
  document.querySelectorAll('.nav button[data-v]').forEach(function(x){x.classList.toggle('active',x.dataset.v===v);});
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav button[data-v]').forEach(function(b){b.onclick=function(){go(b.dataset.v);};});

/* ── Sortering / grupper ──────────────────────────────────── */
function splitItems(){
  var now=Date.now(),up=[],past=[];
  state.items.forEach(function(it){
    var t=target(it);if(!t)return;
    var e={it:it,t:t.getTime()};
    if(e.t>now)up.push(e);else past.push(e);
  });
  up.sort(function(a,b){return a.t-b.t;});
  past.sort(function(a,b){return b.t-a.t;});
  return {up:up,past:past};
}

/* ── Rendering ────────────────────────────────────────────── */
var heroId=null,upIds='';
function ringSVG(frac){
  var R=34,C=2*Math.PI*R,off=C*(1-frac);
  return '<svg class="hring" width="84" height="84" viewBox="0 0 84 84">'
    +'<circle cx="42" cy="42" r="'+R+'" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="6"/>'
    +'<circle id="ringf" cx="42" cy="42" r="'+R+'" fill="none" stroke="#E3C98B" stroke-width="6" stroke-linecap="round" transform="rotate(-90 42 42)" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/>'
    +'<text x="42" y="47" text-anchor="middle" font-size="15" id="ringtxt">'+Math.round(frac*100)+'%</text></svg>';
}
function renderHero(){
  var el=document.getElementById('hero'),g=splitItems();
  if(!g.up.length){
    heroId=null;
    el.innerHTML='<div class="hero empty"><div class="he">⏳</div><div class="hlbl">Inga kommande nedräkningar</div>'
      +'<div class="soft" style="color:var(--heromut)">Lägg till något att längta till.</div>'
      +'<button class="btn" id="hero-add">+ Lägg till</button></div>';
    var ha=document.getElementById('hero-add');if(ha)ha.onclick=function(){openSheet();};
    return;
  }
  var e=g.up[0],it=e.it,t=new Date(e.t),p=parts(e.t-Date.now()),fr=progress(it,e.t);
  heroId=it.id;
  el.innerHTML='<div class="hero"><div class="hlbl">Närmast '+(it.recur&&it.recur!=='ingen'?'· '+esc(RECURTXT[it.recur]):'')+'</div>'
    +'<div class="htop"><div class="hem">'+esc(it.emoji||'⏳')+'</div>'
    +'<div style="flex:1;min-width:0"><div class="hname">'+esc(it.titel)+'</div>'
    +'<div class="hdate">'+esc(fmtDate(t,it.tid))+'</div></div>'
    +ringSVG(fr)+'</div>'
    +'<div class="digits">'
    +'<div class="dig"><b id="hd">'+p.d+'</b><i>dagar</i></div>'
    +'<div class="dig"><b id="hh">'+pad2(p.h)+'</b><i>timmar</i></div>'
    +'<div class="dig"><b id="hm">'+pad2(p.m)+'</b><i>minuter</i></div>'
    +'<div class="dig"><b id="hs">'+pad2(p.s)+'</b><i>sekunder</i></div>'
    +'</div></div>';
}
function rowHTML(e,mode){
  var it=e.it,t=new Date(e.t),fr=progress(it,e.t);
  var rec=it.recur&&it.recur!=='ingen'?' <span class="rc">↻ '+esc(RECURTXT[it.recur])+'</span>':'';
  var right=mode==='past'
    ?'<div class="cd-since" data-id="'+it.id+'">'+esc(fmtSince(Date.now()-e.t))+'</div>'
    :'<div class="cd-mini" data-id="'+it.id+'">'+esc(fmtCompact(e.t-Date.now()))+'</div>';
  var bar=mode==='past'?'':'<div class="pb"><i data-pb="'+it.id+'" style="width:'+(fr*100).toFixed(1)+'%;background:var(--'+(it.farg||'c1')+')"></i></div>';
  return '<div class="ev" data-eid="'+it.id+'" style="border-left-color:var(--'+(it.farg||'c1')+')">'
    +'<div class="ic">'+esc(it.emoji||'⏳')+'</div>'
    +'<div class="tx"><div class="en">'+esc(it.titel)+rec+'</div>'
    +'<div class="ed">'+esc(fmtDate(t,it.tid))+'</div>'+bar+'</div>'+right+'</div>';
}
function bindRows(root){
  root.querySelectorAll('.ev').forEach(function(r){r.onclick=function(){openSheet(r.dataset.eid);};});
}
function renderLists(){
  var g=splitItems();
  upIds=g.up.map(function(e){return e.it.id;}).join(',');
  var lu=document.getElementById('list-upcoming');
  lu.innerHTML=g.up.length?g.up.map(function(e){return rowHTML(e,'up');}).join(''):'<div class="empty-msg">Inget på gång ännu.</div>';
  bindRows(lu);
  var pw=document.getElementById('past-wrap'),lp=document.getElementById('list-past');
  if(g.past.length){pw.style.display='block';lp.innerHTML=g.past.map(function(e){return rowHTML(e,'past');}).join('');bindRows(lp);}
  else{pw.style.display='none';lp.innerHTML='';}
  var la=document.getElementById('list-alla');
  var all=g.up.concat(g.past);
  la.innerHTML=all.length?all.map(function(e){return rowHTML(e,e.t>Date.now()?'up':'past');}).join(''):'<div class="empty-msg">Tryck på + för att skapa din första nedräkning.</div>';
  bindRows(la);
}
function renderChangelog(){
  var el=document.getElementById('changelog-body');if(!el)return;
  var h='<div class="soft" style="margin-bottom:10px">'+esc(APPINFO.tagline)+'<br>Målgrupp: '+esc(APPINFO.audience)+'</div>';
  h+='<div class="sub-h">Funktioner</div><div>';
  APPINFO.functions.forEach(function(f){h+='<span class="tag">'+esc(f)+'</span>';});
  h+='</div><div class="sub-h">Ändringslogg</div>';
  APPINFO.changelog.forEach(function(c){
    h+='<div class="card-panel" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><b>v'+esc(c.v)+'</b><span class="soft">'+esc(c.d)+'</span></div><ul style="margin:8px 0 0 18px;font-size:13px;line-height:1.6">';
    c.items.forEach(function(i){h+='<li>'+esc(i)+'</li>';});
    h+='</ul></div>';
  });
  el.innerHTML=h;
}
function renderInstallningar(){
  var mp=document.getElementById('mode-pick');
  if(mp){var md=[['auto','Auto'],['light','Ljust'],['dark','Mörkt']],h='';
    md.forEach(function(m){h+='<button type="button" class="chip'+((state.theme||'auto')===m[0]?' sel':'')+'" data-m="'+m[0]+'">'+m[1]+'</button>';});
    mp.innerHTML=h;
    mp.querySelectorAll('button').forEach(function(b){b.onclick=function(){state.theme=b.dataset.m;save();applyTheme();renderInstallningar();};});}
  var sp=document.getElementById('skin-pick');
  if(sp){var sk=[['midnatt','Midnatt'],['guld','Guld'],['ros','Rosé'],['hav','Hav'],['skog','Skog']],h2='';
    sk.forEach(function(s){h2+='<button type="button" class="chip'+((state.skin||'midnatt')===s[0]?' sel':'')+'" data-s="'+s[0]+'">'+s[1]+'</button>';});
    sp.innerHTML=h2;
    sp.querySelectorAll('button').forEach(function(b){b.onclick=function(){state.skin=b.dataset.s;save();applyTheme();renderInstallningar();};});}
}
function renderAll(){renderHero();renderLists();renderInstallningar();}

/* ── Tick (varje sekund) ──────────────────────────────────── */
function tick(){
  var g=splitItems();
  var ids=g.up.map(function(e){return e.it.id;}).join(',');
  var hid=g.up.length?g.up[0].it.id:null;
  if(ids!==upIds||hid!==heroId){renderAll();return;}
  if(hid){
    var e=g.up[0],p=parts(e.t-Date.now());
    var hd=document.getElementById('hd');if(hd)hd.textContent=p.d;
    var hh=document.getElementById('hh');if(hh)hh.textContent=pad2(p.h);
    var hm=document.getElementById('hm');if(hm)hm.textContent=pad2(p.m);
    var hs=document.getElementById('hs');if(hs)hs.textContent=pad2(p.s);
    var fr=progress(e.it,e.t),R=34,C=2*Math.PI*R;
    var rf=document.getElementById('ringf');if(rf)rf.setAttribute('stroke-dashoffset',(C*(1-fr)).toFixed(1));
    var rt=document.getElementById('ringtxt');if(rt)rt.textContent=Math.round(fr*100)+'%';
  }
  g.up.forEach(function(e){
    document.querySelectorAll('.cd-mini[data-id="'+e.it.id+'"]').forEach(function(n){n.textContent=fmtCompact(e.t-Date.now());});
    var fr=progress(e.it,e.t);
    document.querySelectorAll('[data-pb="'+e.it.id+'"]').forEach(function(n){n.style.width=(fr*100).toFixed(1)+'%';});
  });
  g.past.forEach(function(e){
    document.querySelectorAll('.cd-since[data-id="'+e.it.id+'"]').forEach(function(n){n.textContent=fmtSince(Date.now()-e.t);});
  });
}

/* ── Formulär / sheet ─────────────────────────────────────── */
var editId=null,fEmoji='⏳',fFarg='c1';
function renderEmoChips(){
  var el=document.getElementById('f-emochips'),h='';
  EMOJIS.forEach(function(e){h+='<button type="button" class="'+(e===fEmoji?'sel':'')+'" data-e="'+e+'">'+e+'</button>';});
  el.innerHTML=h;
  el.querySelectorAll('button').forEach(function(b){b.onclick=function(){fEmoji=b.dataset.e;renderEmoChips();};});
}
function renderFargChips(){
  var el=document.getElementById('f-fargchips'),h='';
  FARGER.forEach(function(c){h+='<button type="button" class="'+(c===fFarg?'sel':'')+'" data-c="'+c+'" style="background:var(--'+c+')"></button>';});
  el.innerHTML=h;
  el.querySelectorAll('button').forEach(function(b){b.onclick=function(){fFarg=b.dataset.c;renderFargChips();};});
}
function openSheet(id){
  editId=id||null;
  var it=editId?state.items.find(function(x){return x.id===editId;}):null;
  document.getElementById('sheet-h').textContent=it?'Redigera nedräkning':'Ny nedräkning';
  document.getElementById('sheet-sub').textContent=it?'Uppdatera eller ta bort händelsen.':'Vad vill du räkna ner till?';
  document.getElementById('f-titel').value=it?it.titel:'';
  document.getElementById('f-datum').value=it?it.datum:todayKey();
  document.getElementById('f-tid').value=it&&it.tid?it.tid:'';
  document.getElementById('f-recur').value=it&&it.recur?it.recur:'ingen';
  document.getElementById('f-note').value=it&&it.note?it.note:'';
  fEmoji=it&&it.emoji?it.emoji:'⏳';fFarg=it&&it.farg?it.farg:'c1';
  renderEmoChips();renderFargChips();
  document.getElementById('f-del').style.display=it?'block':'none';
  document.getElementById('sheet').classList.add('open');
  document.getElementById('scrim').classList.add('show');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
  editId=null;
}
document.getElementById('fab').onclick=function(){openSheet();};
document.getElementById('sheet-x').onclick=closeSheet;
document.getElementById('scrim').onclick=closeSheet;
document.getElementById('f-save').onclick=function(){
  var titel=document.getElementById('f-titel').value.trim();
  var datum=document.getElementById('f-datum').value;
  if(!titel){alert('Ange en titel.');return;}
  if(!datum){alert('Välj ett datum.');return;}
  var tid=document.getElementById('f-tid').value||'';
  var recur=document.getElementById('f-recur').value;
  var note=document.getElementById('f-note').value.trim();
  if(editId){
    var it=state.items.find(function(x){return x.id===editId;});
    if(it){it.titel=titel;it.datum=datum;it.tid=tid;it.recur=recur;it.note=note;it.emoji=fEmoji;it.farg=fFarg;}
  }else{
    state.items.push({id:uid(),titel:titel,datum:datum,tid:tid,recur:recur,note:note,emoji:fEmoji,farg:fFarg,skapad:Date.now()});
  }
  save();closeSheet();renderAll();
};
document.getElementById('f-del').onclick=function(){
  if(!editId)return;
  if(!confirm('Ta bort den här nedräkningen?'))return;
  state.items=state.items.filter(function(x){return x.id!==editId;});
  save();closeSheet();renderAll();
};

/* ── Export / import / rensa ──────────────────────────────── */
document.getElementById('exp-btn').onclick=function(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='nedraknaren-export-'+todayKey()+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(url);},600);
};
document.getElementById('imp-btn').onclick=function(){document.getElementById('imp-file').click();};
document.getElementById('imp-file').onchange=function(ev){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(!d||!Array.isArray(d.items))throw new Error('fel format');
      Object.assign(state,d);save();applyTheme();renderAll();
      alert('Import klar: '+state.items.length+' händelser.');
    }catch(e){alert('Kunde inte läsa filen.');}
  };
  r.readAsText(f);ev.target.value='';
};
document.getElementById('clr-btn').onclick=function(){
  if(!confirm('Rensa alla nedräkningar och inställningar?'))return;
  state={items:[],theme:'auto',skin:'midnatt'};save();applyTheme();renderAll();
};

/* ── Init ─────────────────────────────────────────────────── */
load();
applyTheme();
renderAll();
renderChangelog();
var av=document.getElementById('app-ver');if(av)av.textContent='Nedräknaren v'+APPINFO.version;
go('oversikt');
setInterval(tick,1000);
document.addEventListener('visibilitychange',function(){if(!document.hidden){applyTheme();renderAll();}});
</script>
