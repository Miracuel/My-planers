<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sufflören — IT-stöd för Kungliga Operan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --garnet:#7C1D2E; --garnet-dark:#5E1622; --brass:#A9854F; --ink:#1A1A22;
  --paper:#fff; --canvas:#F1F0EC; --slate:#6B6A73; --line:#E3E1DA;
  --faint:#F7F6F2; --sage:#6F8F5E; --cream:#F6EEE6; --cream-2:#EAD3C6; --cream-3:#E7C9B8;
  --display:"Fraunces",Georgia,"Times New Roman",serif;
  --body:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{background:var(--canvas);font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto}
.masthead{background:var(--garnet);color:var(--cream)}
.masthead .inner{padding:22px 20px 18px}
.brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.brand h1{font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:-.4px}
.brand .sub{font-size:13px;color:var(--cream-3)}
.tagline{margin-top:6px;font-size:13.5px;color:var(--cream-2);max-width:380px;line-height:1.5}
.gilt{height:2px;background:var(--brass)}
.controls{padding:16px 20px 0;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
.seg{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:3px}
.seg button{display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;border-radius:8px;padding:8px 14px;font-family:var(--body);font-size:13.5px;font-weight:500;background:transparent;color:var(--slate);transition:background .15s}
.seg button.small{padding:7px 12px}
.seg button.active{background:var(--garnet);color:var(--cream)}
.seg button svg{width:15px;height:15px}
.syncrow{padding:10px 20px 0;display:flex;justify-content:flex-end}
.sync{display:inline-flex;align-items:center;gap:6px;border:none;background:transparent;cursor:pointer;color:var(--slate);font-family:var(--body);font-size:12px}
.sync svg{width:13px;height:13px}
.sync .ok{color:var(--sage)}
main{padding:12px 20px 60px}
.searchbar{display:flex;gap:10px;align-items:center;margin-bottom:18px}
.searchwrap{position:relative;flex:1}
.searchwrap svg{position:absolute;left:12px;top:11px;width:16px;height:16px;color:var(--slate)}
.input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:var(--body);background:var(--paper);color:var(--ink);outline:none}
.input.search{padding-left:36px}
textarea.input{resize:vertical;line-height:1.55}
select.input{appearance:none}
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:10px;font-family:var(--body);font-size:13.5px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--garnet);color:var(--cream);padding:10px 16px}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--slate);padding:6px 8px;border-radius:8px}
.btn-ghost svg{width:15px;height:15px}
.hint{font-size:12px;color:var(--slate);margin-bottom:16px;line-height:1.5}
.cards{display:grid;gap:12px}
.kbcard{text-align:left;cursor:pointer;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-family:var(--body)}
.kbcard .row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.kbcard h2{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink);line-height:1.3}
.kbcard .cat{font-size:12.5px;color:var(--slate);margin-top:6px}
.pill{font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--brass);border:1px solid var(--brass);border-radius:999px;padding:2px 9px;white-space:nowrap}
.empty{background:var(--paper);border:1px dashed var(--line);border-radius:12px;padding:28px 22px;text-align:center}
.empty .t{font-family:var(--display);font-size:18px;color:var(--ink);margin-bottom:4px}
.empty .d{color:var(--slate);font-size:13.5px;margin-bottom:16px}
.article{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:26px 24px 30px;margin-top:12px}
.article .meta{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.article h2{font-family:var(--display);font-size:24px;font-weight:600;line-height:1.2;color:var(--ink);margin-bottom:16px}
.rule{height:1px;background:var(--line)}
.body{font-size:14.5px}
.body h3{font-family:var(--display);font-size:17px;font-weight:600;color:var(--ink);margin:20px 0 6px}
.body p{margin:0 0 12px;line-height:1.65;color:#33323A}
.body ul{margin:8px 0 14px;padding-left:20px}
.body li{margin-bottom:6px;line-height:1.55;color:#33323A}
.body strong{color:var(--ink)}
.body code{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:.85em;background:var(--faint);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--garnet-dark)}
.article .actions{display:flex;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--line)}
.editor{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:24px;margin-top:12px;display:grid;gap:16px}
.field{display:grid;gap:6px}
.field>span{font-size:12.5px;font-weight:500;color:var(--slate)}
.frow{display:flex;gap:16px;flex-wrap:wrap}
.frow .field{flex:1;min-width:170px}
.subtle{font-size:11.5px;color:var(--slate)}
.chat{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;height:min(72vh,640px)}
.scroll{flex:1;overflow-y:auto;padding:20px 18px}
.welcome{text-align:center;padding:18px 6px}
.welcome .t{font-family:var(--display);font-size:20px;color:var(--ink);margin-bottom:6px}
.welcome .d{color:var(--slate);font-size:13.5px;margin-bottom:18px}
.sugg{display:grid;gap:8px;max-width:460px;margin:0 auto}
.sugg button{text-align:left;cursor:pointer;background:var(--faint);border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-family:var(--body);font-size:13.5px;color:var(--ink)}
.banner{background:#FBF3E6;border:1px solid var(--brass);color:#6b5326;border-radius:10px;padding:10px 13px;font-size:12.5px;line-height:1.5;margin-bottom:14px}
.msgs{display:grid;gap:14px}
.brow{display:flex}
.brow.user{justify-content:flex-end}
.bubble{max-width:84%;border-radius:14px;padding:11px 14px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.bubble.assistant{background:var(--faint);color:#33323A;border:1px solid var(--line);border-bottom-left-radius:4px}
.bubble.user{background:var(--garnet);color:var(--cream);border-bottom-right-radius:4px}
.bubble.typing{font-style:italic;color:var(--slate)}
.err{color:var(--garnet);font-size:13px;margin-top:14px;text-align:center}
.composer{border-top:1px solid var(--line);padding:12px;background:var(--faint)}
.composer .line{display:flex;gap:8px;align-items:flex-end}
.composer textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-family:var(--body);font-size:14px;color:var(--ink);background:var(--paper);outline:none;max-height:120px}
.composer .meta{margin:8px 2px 0;font-size:11px;color:var(--slate);display:flex;align-items:center;gap:5px}
.composer .meta svg{width:12px;height:12px}
.loading{color:var(--slate);padding:4px 0}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ── ikoner (inline SVG) ── */
const I = {
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',

  refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.8-3.4L23 10M1 14l4.7 4.4A9 9 0 0 0 20.5 15"/></svg>',
  enter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10l-5 5 5 5"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>',
};

/* ── lagring: Claude-miljöns lagring först, annars webbläsaren ── */
const IN_CLAUDE = !!(window.storage && window.storage.get);
const store = {
  async get(key, shared){
    if (IN_CLAUDE){ try { return await window.storage.get(key, shared); } catch(e){} }
    try { const v = localStorage.getItem(key); return v==null?null:{key,value:v,shared}; } catch(e){ return null; }
  },
  async set(key, value, shared){
    if (IN_CLAUDE){ try { return await window.storage.set(key, value, shared); } catch(e){} }
    try { localStorage.setItem(key, value); } catch(e){}
    return {key,value,shared};
  }
};

const KB_KEY="kb:articles:v1", PREFS_KEY="prefs:v1";
const CATS=["Konto & inloggning","Enheter","Nätverk","Programvara","Onboarding"];
const SEED=[
 {id:"kb-auth",title:"Flytta Microsoft Authenticator till ny telefon",category:"Konto & inloggning",audience:"both",tags:["authenticator","mfa","iphone","byte av telefon"],body:"När du byter telefon följer inte Authenticator-kontona med automatiskt. Gör så här innan du lämnar den gamla telefonen:\n\n## På den gamla telefonen\n- Öppna Authenticator och slå på molnsäkerhetskopiering under Inställningar.\n- Logga in med ditt personliga Microsoft-konto så att kopian sparas.\n\n## På den nya telefonen\n- Installera Authenticator och välj `Återställ från säkerhetskopia`.\n- Logga in med samma konto som du säkerhetskopierade till.\n\n## Om jobbkontot inte följer med\nVerksamhetskonton flyttas inte alltid via säkerhetskopian. Då behöver kontot registreras på nytt — kontakta IT-teamet så nollställer vi MFA och skickar en ny registreringslänk."},
 {id:"kb-pwd",title:"Återställ lösenord eller lås upp konto",category:"Konto & inloggning",audience:"both",tags:["lösenord","kontolåsning","inloggning"],body:"Är kontot låst efter för många försök släpper låsningen oftast av sig själv inom 30 minuter.\n\n## Återställ själv\n- Gå till lösenordsportalen och välj `Glömt lösenord`.\n- Bekräfta med din MFA-metod.\n\n## Kommer du inte vidare\nSaknar du fungerande MFA kan du inte återställa själv. Kontakta IT-teamet med ditt användarnamn så hjälper vi dig på plats."},
 {id:"kb-bsod",title:"Blåskärm på Dell: CRITICAL_PROCESS_DIED",category:"Enheter",audience:"it",tags:["bsod","dell","blåskärm","windows"],body:"Felet betyder att en process som Windows förlitar sig på avslutades oväntat. Vanliga orsaker är trasiga systemfiler eller en dålig drivrutin.\n\n## Snabb åtgärd\n- Starta i felsäkert läge.\n- Kör `sfc /scannow` och därefter `DISM /Online /Cleanup-Image /RestoreHealth`.\n- Rulla tillbaka senast installerade drivrutin om felet började efter en uppdatering.\n\n## Återkommer felet\nLogga felkoden i Tillförlitlighetsövervakaren och kontrollera lagringens hälsa innan du överväger ominstallation."},
 {id:"kb-wd",title:"Extern hårddisk syns inte eller nekar åtkomst",category:"Enheter",audience:"it",tags:["extern disk","wd","behörighet","chkdsk","icacls"],body:"Två problem brukar dölja sig bakom samma symptom: ett skadat filsystem eller fel ägarskap på enheten.\n\n## Reparera filsystemet\n- Kör `chkdsk X: /f` där X är diskens enhetsbokstav.\n\n## Återställ behörigheter\n- Ta ägarskap och återställ behörigheter med `icacls X:\\\\ /reset /T /C`.\n\nSäkerhetskopiera viktigt innehåll först om disken alls går att läsa."},
 {id:"kb-vpn",title:"Anslut till nätverk och VPN",category:"Nätverk",audience:"both",tags:["vpn","nätverk","wifi","distans"],body:"## På plats\n- Anslut till det interna nätverket med ditt vanliga konto.\n\n## På distans\n- Starta VPN-klienten och logga in med MFA.\n- Får du upprepade tidsutgångar, byt till ett stabilare nät och försök igen.\n\nNår du inte interna tjänster trots aktiv VPN — kontakta IT-teamet, det kan vara en behörighet som behöver läggas till."},
 {id:"kb-print",title:"Skrivaren skriver inte ut",category:"Enheter",audience:"user",tags:["skrivare","utskrift"],body:"## Gå igenom i tur och ordning\n- Kontrollera att rätt skrivare är vald, inte en gammal som inte finns kvar.\n- Se efter om kön har fastnat och rensa i så fall väntande utskrifter.\n- Stäng av och slå på skrivaren igen.\n\nSaknas skrivaren helt i listan, hör av dig till IT-teamet så lägger vi till den åt dig."},
 {id:"kb-onboarding",title:"Ny dator: så kommer du igång",category:"Onboarding",audience:"both",tags:["ny dator","onboarding","autopilot","intune"],body:"Din dator registreras automatiskt när du loggar in första gången.\n\n## Första inloggningen\n- Anslut till nätverket och logga in med ditt jobbkonto.\n- Datorn konfigureras i bakgrunden — det kan ta en stund, låt den vara ansluten.\n- Registrera MFA när du blir ombedd.\n\nNär installationen är klar finns dina program på plats. Saknas något kontaktar du IT-teamet."},
];

let S = { mode:"user", tab:"kb", articles:[], ready:false, query:"", selectedId:null, editing:null, messages:[], loading:false, error:null, lastSync:null };

/* ── hjälpare ── */
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function inlineMd(t){ // t är redan escapad
  return t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
}
function mdToHtml(text){
  const lines = esc(text).split("\n"); let out=""; let list=[];
  const flush=()=>{ if(list.length){ out+="<ul>"+list.map(li=>"<li>"+inlineMd(li)+"</li>").join("")+"</ul>"; list=[]; } };
  lines.forEach(raw=>{
    const line=raw.replace(/\s+$/,"");
    if(line.startsWith("## ")){ flush(); out+="<h3>"+inlineMd(line.slice(3))+"</h3>"; }
    else if(line.startsWith("- ")){ list.push(line.slice(2)); }
    else if(line===""){ flush(); }
    else { flush(); out+="<p>"+inlineMd(line)+"</p>"; }
  });
  flush(); return out;
}
function fmtTime(d){ return d ? d.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"}) : ""; }
function visibleArticles(){ return S.articles.filter(a=>S.mode==="it"?true:a.audience!=="it"); }
function filteredArticles(){
  const q=S.query.trim().toLowerCase();
  return visibleArticles().filter(a=> !q || a.title.toLowerCase().includes(q) || a.body.toLowerCase().includes(q) || a.category.toLowerCase().includes(q) || (a.tags||[]).some(t=>t.toLowerCase().includes(q)));
}

/* ── lagringsåtgärder ── */
async function loadArticles(){
  try{ const r=await store.get(KB_KEY,true); if(r&&r.value) return JSON.parse(r.value);}catch(e){}
  try{ await store.set(KB_KEY,JSON.stringify(SEED),true);}catch(e){}
  return SEED.slice();
}
async function persist(){ try{ await store.set(KB_KEY,JSON.stringify(S.articles),true);}catch(e){} }
async function refreshKB(){
  try{ const r=await store.get(KB_KEY,true); if(r&&r.value){ S.articles=JSON.parse(r.value); S.lastSync=new Date(); render(); } }catch(e){}
}

/* ── vyer ── */
function shellHtml(){
  return `
  <header class="masthead">
    <div class="inner">
      <div class="brand"><h1>Sufflören</h1><span class="sub">IT-stöd för Kungliga Operan</span></div>
      <p class="tagline">Som sufflören i operahuset — viskar rätt svar till den som kört fast.</p>
    </div>
    <div class="gilt"></div>
  </header>
  <div class="controls">
    <div class="seg">
      <button data-act="tab" data-val="kb" class="${S.tab==="kb"?"active":""}">${I.book}Kunskapsbas</button>
      <button data-act="tab" data-val="ai" class="${S.tab==="ai"?"active":""}">${I.spark}Fråga Sufflören</button>
    </div>
    <div class="seg">
      <button data-act="mode" data-val="user" class="small ${S.mode==="user"?"active":""}">${I.users}Användare</button>
      <button data-act="mode" data-val="it" class="small ${S.mode==="it"?"active":""}">${I.wrench}IT-personal</button>
    </div>
  </div>
  <div class="syncrow">
    <button class="sync" data-act="refresh">${S.lastSync?'<span class="ok">'+I.check+'</span>':I.refresh}<span>${S.lastSync?"Synkad "+fmtTime(S.lastSync):"Synkar…"}</span></button>
  </div>
  <main id="content">${contentHtml()}</main>`;
}

function contentHtml(){
  if(S.tab==="ai") return aiHtml();
  if(S.editing) return editorHtml();
  if(S.selectedId){ const a=S.articles.find(x=>x.id===S.selectedId); if(a) return articleHtml(a); }
  return listHtml();
}

function listHtml(){
  const arts=filteredArticles();
  let cards;
  if(!S.ready){ cards=`<p class="loading">Hämtar kunskapsbasen…</p>`; }
  else if(arts.length===0){
    cards=`<div class="empty"><div class="t">${S.query?"Inget träffar «"+esc(S.query)+"»":"Inga artiklar ännu"}</div><div class="d">Prova ett annat ord, eller låt Sufflören hjälpa dig direkt.</div><button class="btn btn-primary" data-act="tab" data-val="ai">${I.spark}Fråga Sufflören</button></div>`;
  } else {
    cards=`<div class="cards">`+arts.map(a=>`
      <button class="kbcard" data-act="open" data-val="${a.id}">
        <div class="row"><h2>${esc(a.title)}</h2>${a.audience==="it"?'<span class="pill">Endast IT</span>':""}</div>
        <div class="cat">${esc(a.category)}</div>
      </button>`).join("")+`</div>`;
  }
  return `
    <div class="searchbar">
      <div class="searchwrap">${I.search}<input id="search" class="input search" placeholder="Sök efter problem eller nyckelord…" value="${esc(S.query)}"></div>
      ${S.mode==="it"?`<button class="btn btn-primary" data-act="new">${I.plus}Ny artikel</button>`:""}
    </div>
    ${S.mode==="it"?`<p class="hint">Kunskapsbasen delas mellan alla som använder appen — det du sparar här blir synligt för hela teamet och för användarna.</p>`:""}
    ${cards}`;
}

function articleHtml(a){
  return `
    <button class="btn btn-ghost" data-act="back">${I.back}Tillbaka</button>
    <div class="article">
      <div class="meta"><span class="pill">${esc(a.category)}</span>${a.audience==="it"?'<span class="pill">Endast IT</span>':""}</div>
      <h2>${esc(a.title)}</h2>
      <div class="rule"></div>
      <div class="body" style="margin-top:18px">${mdToHtml(a.body)}</div>
      ${S.mode==="it"?`<div class="actions"><button class="btn btn-ghost" data-act="edit">${I.pencil}Redigera</button><button class="btn btn-ghost" style="color:var(--garnet)" data-act="delete" data-val="${a.id}">${I.trash}Ta bort</button></div>`:""}
    </div>`;
}

function editorHtml(){
  const e=S.editing;
  return `
    <button class="btn btn-ghost" data-act="cancel-edit">${I.x}Avbryt</button>
    <div class="editor">
      <label class="field"><span>Titel</span><input id="f-title" class="input" placeholder="t.ex. Skrivaren skriver inte ut" value="${esc(e.title)}"></label>
      <div class="frow">
        <label class="field"><span>Kategori</span><select id="f-cat" class="input">${CATS.map(c=>`<option ${c===e.category?"selected":""}>${esc(c)}</option>`).join("")}</select></label>
        <label class="field"><span>Synlig för</span><select id="f-aud" class="input">
          <option value="both" ${e.audience==="both"?"selected":""}>Alla</option>
          <option value="user" ${e.audience==="user"?"selected":""}>Främst användare</option>
          <option value="it" ${e.audience==="it"?"selected":""}>Endast IT-personal</option>
        </select></label>
      </div>
      <label class="field"><span>Nyckelord (kommaseparerade)</span><input id="f-tags" class="input" placeholder="vpn, distans, mfa" value="${esc((e.tags||[]).join(", "))}"></label>
      <label class="field"><span>Innehåll</span>
        <textarea id="f-body" class="input" rows="12" placeholder="Skriv lösningen.&#10;&#10;## Rubrik&#10;- listpunkt&#10;&#10;**fetstil** och \`kommando\`.">${esc(e.body)}</textarea>
        <span class="subtle">Tips: ## rubrik, - listpunkt, **fetstil**, \`kommando\`</span>
      </label>
      <div><button class="btn btn-primary" data-act="save">Spara artikel</button></div>
    </div>`;
}

function aiHtml(){
  const sugg = S.mode==="it"
    ? ["Dator får CRITICAL_PROCESS_DIED efter uppdatering","Extern WD-disk nekar åtkomst","Användare saknar VPN-åtkomst trots aktiv tunnel"]
    : ["Jag har bytt telefon och kommer inte in","Skrivaren skriver inte ut","Hur ansluter jag VPN hemifrån?"];
  let inner;
  if(S.messages.length===0 && !S.loading){
    inner=`<div class="welcome"><div class="t">Vad har kört fast?</div><div class="d">Beskriv problemet med egna ord. Sufflören känner till kunskapsbasen.</div>
      <div class="sugg">${sugg.map(s=>`<button data-act="ask" data-val="${esc(s)}">${esc(s)}</button>`).join("")}</div></div>`;
  } else {
    inner=`<div class="msgs">`+S.messages.map(m=>`<div class="brow ${m.role}"><div class="bubble ${m.role}">${esc(m.content)}</div></div>`).join("")
      +(S.loading?`<div class="brow assistant"><div class="bubble assistant typing">Sufflören skriver…</div></div>`:"")+`</div>`;
  }
  const banner = IN_CLAUDE ? "" : `<div class="banner">Assistenten svarar när appen körs i Claude-miljön (eller mot en egen backend). Kunskapsbasen fungerar ändå, även offline.</div>`;
  return `
    <div class="chat">
      <div class="scroll" id="scroll">${banner}${inner}${S.error?`<p class="err">${esc(S.error)}</p>`:""}</div>
      <div class="composer">
        <div class="line">
          <textarea id="chatin" rows="1" placeholder="Beskriv problemet…"></textarea>
          <button class="btn btn-primary" data-act="send" style="padding:11px 14px">${I.send}</button>
        </div>
        <p class="meta">${I.enter} Enter skickar · Shift+Enter ny rad · Sufflören kan ha fel — verifiera känsliga åtgärder.</p>
      </div>
    </div>`;
}

/* ── render + fokushantering ── */
function render(){
  const app=document.getElementById("app");
  app.innerHTML=shellHtml();
  const sc=document.getElementById("scroll"); if(sc) sc.scrollTop=sc.scrollHeight;
}
function renderContent(){
  const c=document.getElementById("content"); if(!c) return;
  c.innerHTML=contentHtml();
  const sc=document.getElementById("scroll"); if(sc) sc.scrollTop=sc.scrollHeight;
}

/* ── assistenten ── */
function buildSystem(){
  const kb=visibleArticles().map(a=>`• ${a.title} [${a.category}]: ${a.body.replace(/\n+/g," ").slice(0,260)}`).join("\n");
  const depth=S.mode==="it"
    ? "Du talar med IT-personal. Var teknisk och konkret, kommandon och felkoder är välkomna."
    : "Du talar med en medarbetare utan IT-bakgrund. Håll det enkelt, undvik jargong och förklara steg för steg.";
  return "Du är Sufflören, en IT-supportassistent för Kungliga Operan i Stockholm. Svara alltid på svenska, vänligt och rakt på sak. "+depth+" Använd kunskapsbasen nedan när den är relevant och nämn artikelns titel om du stödjer dig på den. Hittar du inte svaret, eller kräver åtgärden behörigheter, fysisk hjälp eller kontonollställning — föreslå att kontakta IT-teamet. Hitta aldrig på rutiner du är osäker på.\n\nKUNSKAPSBAS:\n"+(kb||"(tom)");
}
async function send(text){
  const content=(text!=null?text:"").trim();
  if(!content || S.loading) return;
  S.error=null; S.messages.push({role:"user",content}); S.loading=true; renderContent();
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:buildSystem(),messages:S.messages.slice(-10).map(m=>({role:m.role,content:m.content}))})
    });
    if(!res.ok) throw new Error("status "+res.status);
    const data=await res.json();
    const reply=(data.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n").trim();
    S.messages.push({role:"assistant",content:reply||"Jag fick inget svar den här gången. Försök igen."});
  }catch(e){
    S.error = IN_CLAUDE ? "Kunde inte nå Sufflören just nu. Försök igen om en stund." : "Assistenten kräver Claude-miljön eller en egen backend för att svara.";
  }finally{ S.loading=false; renderContent(); }
}

/* ── händelser (delegering) ── */
function init(){
  const app=document.getElementById("app");
  app.addEventListener("click",e=>{
    const b=e.target.closest("[data-act]"); if(!b) return;
    const act=b.dataset.act, val=b.dataset.val;
    if(act==="tab"){ S.tab=val; S.error=null; render(); }
    else if(act==="mode"){ S.mode=val; S.selectedId=null; S.editing=null; store.set(PREFS_KEY,JSON.stringify({mode:val}),false); render(); }
    else if(act==="refresh"){ refreshKB(); }
    else if(act==="open"){ S.selectedId=val; S.editing=null; renderContent(); }
    else if(act==="back"){ S.selectedId=null; renderContent(); }
    else if(act==="new"){ S.editing={id:"kb-"+Math.random().toString(36).slice(2,9),title:"",category:CATS[0],audience:"both",tags:[],body:""}; S.selectedId=null; renderContent(); }
    else if(act==="edit"){ S.editing=S.articles.find(x=>x.id===S.selectedId); renderContent(); }
    else if(act==="cancel-edit"){ S.editing=null; renderContent(); }
    else if(act==="save"){ saveFromForm(); }
    else if(act==="delete"){ deleteArticle(val); }
    else if(act==="ask"){ send(val); }
    else if(act==="send"){ const ta=document.getElementById("chatin"); if(ta){ const v=ta.value; ta.value=""; send(v); } }
  });
  app.addEventListener("input",e=>{
    if(e.target.id==="search"){
      S.query=e.target.value; const pos=e.target.selectionStart;
      renderContent();
      const ns=document.getElementById("search"); if(ns){ ns.focus(); try{ns.setSelectionRange(pos,pos);}catch(_){} }
    }
  });
  app.addEventListener("keydown",e=>{
    if(e.target.id==="chatin" && e.key==="Enter" && !e.shiftKey){ e.preventDefault(); const v=e.target.value; e.target.value=""; send(v); }
  });
  window.addEventListener("focus",()=>refreshKB());
}

function saveFromForm(){
  const title=document.getElementById("f-title").value.trim();
  const body=document.getElementById("f-body").value.trim();
  if(!title || !body) return;
  const art={ id:S.editing.id, title, category:document.getElementById("f-cat").value, audience:document.getElementById("f-aud").value,
    tags:document.getElementById("f-tags").value.split(",").map(t=>t.trim()).filter(Boolean), body };
  const exists=S.articles.some(p=>p.id===art.id);
  S.articles = exists ? S.articles.map(p=>p.id===art.id?art:p) : [art,...S.articles];
  persist(); S.lastSync=new Date(); S.editing=null; S.selectedId=art.id; render();
}
function deleteArticle(id){
  S.articles=S.articles.filter(p=>p.id!==id); persist(); S.lastSync=new Date(); S.selectedId=null; render();
}

/* ── start ── */
(async ()=>{
  init();
  try{ const p=await store.get(PREFS_KEY,false); if(p&&p.value){ const pr=JSON.parse(p.value); if(pr.mode) S.mode=pr.mode; } }catch(e){}
  S.articles=await loadArticles(); S.ready=true; S.lastSync=new Date(); render();
})();
</script>
</body>
</html>
