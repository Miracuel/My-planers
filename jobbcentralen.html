<title>Jobbcentralen</title>
<style>
:root{
  --paper:#EEF1F5; --ink:#2A3340; --ink-soft:#7C8694; --line:#DCE2EA;
  --card:#FFFFFF; --accent:#4E6E8E; --accent-soft:#E3EAF2;
}
html[data-theme="dark"]{
  --paper:#141A22; --ink:#E4EAF1; --ink-soft:#8A95A4; --line:#283341;
  --card:#1C242F; --accent:#8FB0D0; --accent-soft:#22303F;
}
html[data-skin="slate"]{}
html[data-skin="graphite"]{ --accent:#5E6B7A; --accent-soft:#E6E9ED; }
html[data-skin="forest"]{ --accent:#4E7C6B; --accent-soft:#E1EDE7; }
html[data-skin="amber"]{ --accent:#B6862F; --accent-soft:#F4EBD7; }
html[data-skin="graphite"][data-theme="dark"]{ --accent:#9AA6B4; --accent-soft:#2A313A; }
html[data-skin="forest"][data-theme="dark"]{ --accent:#7FB39E; --accent-soft:#1E2E28; }
html[data-skin="amber"][data-theme="dark"]{ --accent:#D9B25E; --accent-soft:#332912; }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--paper);color:var(--ink);
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  min-height:100vh;transition:background .25s ease,color .25s ease;
}
.app{max-width:540px;margin:0 auto;padding:22px 15px 48px}

/* Sidofält-container (blir sidebar i desktop-lagret) */
.side{margin-bottom:6px}

/* Sidhuvud */
.head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand .märke{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 4px 12px rgba(78,110,142,.28);
}
.greet{font-family:Georgia,'Times New Roman',serif;font-size:25px;font-weight:400;letter-spacing:.01em;line-height:1.1}
.datum{font-size:11px;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.topp-knappar{display:flex;gap:8px;flex-shrink:0}
.rund{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--line);background:var(--card);color:var(--ink);
  display:flex;align-items:center;justify-content:center;text-decoration:none;
  cursor:pointer;font-family:inherit;font-size:16px;
}
.rund:active{background:var(--accent-soft)}
.rund:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.rund svg{width:18px;height:18px;display:block}
.rund[hidden]{display:none}

/* Verktygsrad */
.toolrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:16px}
.mode{display:flex;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:3px;width:max-content}
.mode button{
  border:none;background:none;font-family:inherit;
  font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-soft);padding:7px 14px;border-radius:999px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:background .12s,color .12s;
}
.mode button.on{background:var(--accent);color:#fff}
.mode button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.pill{
  border:1px solid var(--line);background:var(--card);color:var(--ink);
  font-family:inherit;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  padding:9px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.pill:active{background:var(--accent-soft)}
.pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.pill b{color:var(--accent);font-weight:600}

/* Sökruta */
.sok-rad{position:relative;margin-top:14px}
.sok-rad input{
  width:100%;border:1px solid var(--line);border-radius:12px;
  padding:11px 38px 11px 14px;font-size:14px;background:var(--card);
  color:var(--ink);outline:none;font-family:inherit;
}
.sok-rad input:focus{border-color:var(--accent)}
.sok-rad input::placeholder{color:var(--ink-soft)}
.sok-rensa{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;border:none;background:none;
  color:var(--ink-soft);cursor:pointer;font-size:16px;font-family:inherit;
}
.sok-rensa[hidden]{display:none}

/* Sektioner & rutnät */
.sec-title{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin:20px 2px 11px;display:flex;align-items:center;gap:8px}
.sec-title .antal{margin-left:auto;font-size:10px;opacity:.7;text-transform:none;letter-spacing:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* Appkort */
.tile{
  display:flex;flex-direction:column;gap:8px;
  background:var(--t-bg,var(--card));
  border:1px solid var(--t-line,var(--line));
  border-radius:16px;padding:14px 13px 13px;
  text-decoration:none;color:var(--t-ink,var(--ink));
  position:relative;min-height:120px;
  transition:transform .12s ease,box-shadow .12s ease;
}
.tile:active{transform:scale(.97)}
@media(hover:hover){ .tile:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(42,51,64,.10)} }
.tile:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.tile .ikon{
  width:38px;height:38px;border-radius:50%;
  background:var(--t-iconbg,var(--accent-soft));
  border:1px solid var(--t-line,var(--line));
  display:flex;align-items:center;justify-content:center;
  font-size:19px;line-height:1;position:relative;
}
.tile .namn{font-family:Georgia,'Times New Roman',serif;font-size:16px;font-weight:400;color:var(--t-accent,var(--ink))}
.tile .desc{font-size:11px;line-height:1.45;color:var(--t-muted,var(--ink-soft))}
.tile .endast{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--t-muted,var(--ink-soft));margin-top:auto;opacity:.85}
.tile .grupp{
  position:absolute;top:11px;right:12px;
  font-size:9px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--t-muted,var(--ink-soft));
  border:1px solid var(--t-line,var(--line));border-radius:8px;padding:2px 7px;
}

/* Tomt läge */
.tomt{
  text-align:center;color:var(--ink-soft);font-size:13.5px;line-height:1.6;
  background:var(--card);border:1px dashed var(--line);border-radius:16px;
  padding:30px 22px;margin-top:8px;
}
.tomt .stor{font-size:30px;display:block;margin-bottom:10px;opacity:.7}
.tomt button{
  margin-top:14px;border:1px solid var(--accent);background:var(--accent);color:#fff;
  border-radius:999px;padding:10px 18px;font-size:13px;font-family:inherit;cursor:pointer;
}

/* Bottenark */
.skal{position:fixed;inset:0;background:rgba(20,26,34,.42);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.skal[hidden]{display:none}
.sheet{
  background:var(--paper);border:1px solid var(--line);border-bottom:none;
  border-radius:20px 20px 0 0;width:100%;max-width:540px;
  max-height:88vh;overflow-y:auto;
  padding:8px 16px calc(20px + env(safe-area-inset-bottom));
}
.sheet-grepp{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 12px}
.sheet h2{font-family:Georgia,'Times New Roman',serif;font-weight:400;font-size:21px;margin-bottom:2px}
.sheet .undertext{font-size:12px;color:var(--ink-soft);margin-bottom:14px;line-height:1.5}
.grupp-rubrik{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin:16px 2px 8px}
.val-rad{
  display:flex;align-items:center;gap:12px;padding:11px 12px;
  border:1px solid var(--line);border-radius:12px;background:var(--card);
  margin-bottom:8px;cursor:pointer;
}
.val-rad.vald{border-color:var(--accent);background:var(--accent-soft)}
.val-rad .vikon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.val-rad .vtext{flex:1;min-width:0}
.val-rad .vnamn{display:block;font-size:14.5px;font-weight:500}
.val-rad .vdesc{display:block;font-size:11px;color:var(--ink-soft);line-height:1.35;margin-top:2px}
.val-rad .kryss{
  width:24px;height:24px;border-radius:7px;flex-shrink:0;
  border:1.5px solid var(--line);background:var(--card);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;
}

/* Temaval */
.tema-rad{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}

  { id:"grimoire", namn:"Grimoire", ikon:"🌟", grupp:"Magiappar", desc:"Din digitala grimoire",
    mobil:"grimoire.html", desktop:"grimoire-desktop.html",
    farger:{bg:"#1B1635", line:"#332B5C", ink:"#E9E5F2", muted:"#948DB3", accent:"#D6C478", iconbg:"#241D45"} },
  { id:"liggcentralen", namn:"Liggcentralen", ikon:"🖤", grupp:"Övrigt", desc:"Privat relationsdagbok",
    mobil:"liggcentralen.html", desktop:"liggcentralen-desktop.html",
    farger:{bg:"#1A1A1E", line:"#2E2E36", ink:"#E8E6EC", muted:"#8C8A96", accent:"#B98BC9", iconbg:"#24242C"} },
  { id:"relationshjalp", namn:"Relationshjälp", ikon:"💬", grupp:"Övrigt", desc:"Stöd i relationer",
    mobil:"relationshjalp.html", desktop:"relationshjalp-desktop.html",
    farger:{bg:"#FCF4F2", line:"#EBD9D4", ink:"#46393A", muted:"#9C8580", accent:"#C0726E", iconbg:"#F4E1DC"} }
];
var GRUPPORDNING = ["Jobb", "IT-verktyg", "Vardag", "Magiappar", "Övrigt"];

/* ===== Hjälpare ===== */
function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
function $(id){ return document.getElementById(id); }
function save(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }
function load(key, fallback){ try{ var v = localStorage.getItem(key); return v == null ? fallback : JSON.parse(v); }catch(e){ return fallback; } }

var LS_VALDA = "jobbcentralen-valda";
var LS_LAGE  = "jobbcentralen-lage";
var LS_TEMA  = "jobbcentralen-tema";
var LS_SKIN  = "jobbcentralen-skin";

/* ===== Tillstånd ===== */
var DEFAULT_VALDA = ["jobb", "jeeves", "appkollen", "testkollen"];
var valda = load(LS_VALDA, null);
if(valda == null){ valda = DEFAULT_VALDA.slice(); save(LS_VALDA, valda); }
var lage = load(LS_LAGE, "mobil");
var sokText = "";

/* ===== Tema ===== */
function autoMork(){ var h = new Date().getHours(); return h >= 20 || h < 7; }
function applyTema(){
  var t = load(LS_TEMA, "auto");
  var skin = load(LS_SKIN, "slate");
  var mork = t === "dark" || (t === "auto" && autoMork());
  document.documentElement.setAttribute("data-theme", mork ? "dark" : "light");
  document.documentElement.setAttribute("data-skin", skin);
  var rad = $("tema-rad"); if(rad){ var bs = rad.querySelectorAll("button"); for(var i=0;i<bs.length;i++) bs[i].classList.toggle("on", bs[i].getAttribute("data-t") === t); }
  var sr = $("skin-rad"); if(sr){ var ss = sr.querySelectorAll("button"); for(var j=0;j<ss.length;j++) ss[j].classList.toggle("on", ss[j].getAttribute("data-s") === skin); }
}

/* ===== Hälsning & datum ===== */
(function(){
  var h = new Date().getHours(), g = "God dag";
  if(h < 5) g = "God natt"; else if(h < 10) g = "God morgon";
  else if(h < 12) g = "God förmiddag"; else if(h < 18) g = "God eftermiddag"; else g = "God kväll";
  $("greet").textContent = g;
  var str = new Date().toLocaleDateString("sv-SE", {weekday:"long", day:"numeric", month:"long"});
  $("datum").textContent = str.charAt(0).toUpperCase() + str.slice(1);
})();

/* ===== Kort ===== */
function tileFor(a){
  var annat = lage === "mobil" ? "desktop" : "mobil";
  var fil = a[lage] || a[annat];
  var el = document.createElement("a");
  el.className = "tile";
  el.href = fil;
  var f = a.farger;
  el.style.setProperty("--t-bg", f.bg);
  el.style.setProperty("--t-line", f.line);
  el.style.setProperty("--t-ink", f.ink);
  el.style.setProperty("--t-muted", f.muted);
  el.style.setProperty("--t-accent", f.accent);
  el.style.setProperty("--t-iconbg", f.iconbg);
  var fallback = a[lage] ? "" : '<span class="endast">' + (a.mobil ? "📱 endast mobil" : "🖥️ endast desktop") + '</span>';
  el.innerHTML =
    '<span class="grupp">' + esc(a.grupp) + '</span>' +
    '<span class="ikon">' + esc(a.ikon) + '</span>' +
    '<span class="namn">' + esc(a.namn) + '</span>' +
    '<span class="desc">' + esc(a.desc) + '</span>' +
    fallback;
  return el;
}

function valdaAppar(){
  return KATALOG.filter(function(a){ return valda.indexOf(a.id) >= 0; });
}

function rita(){
  $("antal-pill").textContent = String(valda.length);
  var wrap = $("innehall");
  wrap.innerHTML = "";
  var appar = valdaAppar();

  if(appar.length === 0){
    var tom = document.createElement("div");
    tom.className = "tomt";
    tom.innerHTML = '<span class="stor">💼</span>Inga jobbappar valda än.<br>Tryck nedan för att välja vilka appar som ska synas här.<br><button id="tom-valj" type="button">✚ Välj appar</button>';
    wrap.appendChild(tom);
    $("tom-valj").addEventListener("click", oppnaValj);
    return;
  }

  var q = sokText.trim().toLowerCase();
  if(q){
    var traff = appar.filter(function(a){
      return (a.namn || "").toLowerCase().indexOf(q) >= 0 ||
             (a.desc || "").toLowerCase().indexOf(q) >= 0 ||
             (a.grupp || "").toLowerCase().indexOf(q) >= 0;
    });
    var rub = document.createElement("div");
    rub.className = "sec-title";
    rub.innerHTML = '<span>' + (traff.length ? "Sökresultat" : "Inga träffar") + '</span><span class="antal">' + traff.length + " st</span>";
    wrap.appendChild(rub);
    if(traff.length){
      var g = document.createElement("div"); g.className = "grid";
      traff.forEach(function(a){ g.appendChild(tileFor(a)); });
      wrap.appendChild(g);
    } else {
      var t = document.createElement("div"); t.className = "tomt";
      t.innerHTML = "Ingen vald app matchar ”" + esc(sokText.trim()) + "”.";
      wrap.appendChild(t);
    }
    return;
  }

  GRUPPORDNING.forEach(function(grp){
    var del = appar.filter(function(a){ return a.grupp === grp; });
    if(!del.length) return;
    var rub = document.createElement("div");
    rub.className = "sec-title";
    rub.innerHTML = '<span>' + esc(grp) + '</span><span class="antal">' + del.length + " st</span>";
    wrap.appendChild(rub);
    var g = document.createElement("div"); g.className = "grid";
    del.forEach(function(a){ g.appendChild(tileFor(a)); });
    wrap.appendChild(g);
  });
}

/* ===== Lägesväljare ===== */
function setLage(l){
  lage = l; save(LS_LAGE, l);
  $("m-mobil").classList.toggle("on", l === "mobil");
  $("m-desktop").classList.toggle("on", l === "desktop");
  rita();
}
$("m-mobil").addEventListener("click", function(){ setLage("mobil"); });
$("m-desktop").addEventListener("click", function(){ setLage("desktop"); });

/* ===== Sök ===== */
(function(){
  var sok = $("sok"), rensa = $("sok-rensa");
  function uppd(){ sokText = sok.value; rensa.hidden = !sok.value; rita(); }
  sok.addEventListener("input", uppd);
  rensa.addEventListener("click", function(){ sok.value = ""; sokText = ""; rensa.hidden = true; sok.focus(); rita(); });
})();

/* ===== Välj appar ===== */
function oppnaValj(){
  var lista = $("valj-lista");
  lista.innerHTML = "";
  GRUPPORDNING.forEach(function(grp){
    var del = KATALOG.filter(function(a){ return a.grupp === grp; });
    if(!del.length) return;
    var rub = document.createElement("div");
    rub.className = "grupp-rubrik";
    rub.textContent = grp;
    lista.appendChild(rub);
    del.forEach(function(a){
      var vald = valda.indexOf(a.id) >= 0;
      var rad = document.createElement("div");
      rad.className = "val-rad" + (vald ? " vald" : "");
      rad.innerHTML =
        '<span class="vikon" style="background:' + a.farger.iconbg + '">' + esc(a.ikon) + '</span>' +
        '<span class="vtext"><span class="vnamn">' + esc(a.namn) + '</span><span class="vdesc">' + esc(a.desc) + '</span></span>' +
        '<span class="kryss">' + (vald ? "✓" : "") + '</span>';
      rad.addEventListener("click", function(){
        var i = valda.indexOf(a.id);
        if(i >= 0) valda.splice(i, 1); else valda.push(a.id);
        save(LS_VALDA, valda);
        var nu = valda.indexOf(a.id) >= 0;
        rad.classList.toggle("vald", nu);
        rad.querySelector(".kryss").textContent = nu ? "✓" : "";
        $("antal-pill").textContent = String(valda.length);
      });
      lista.appendChild(rad);
    });
  });
  $("skal-valj").hidden = false;
}
$("valj-btn").addEventListener("click", oppnaValj);
$("valj-klar").addEventListener("click", function(){ $("skal-valj").hidden = true; rita(); });
$("valj-rensa").addEventListener("click", function(){ valda = []; save(LS_VALDA, valda); oppnaValj(); });
$("skal-valj").addEventListener("click", function(e){ if(e.target.id === "skal-valj"){ $("skal-valj").hidden = true; rita(); } });

/* ===== Tema-ark ===== */
$("tema-btn").addEventListener("click", function(){ applyTema(); $("skal-tema").hidden = false; });
$("tema-klar").addEventListener("click", function(){ $("skal-tema").hidden = true; });
$("skal-tema").addEventListener("click", function(e){ if(e.target.id === "skal-tema") $("skal-tema").hidden = true; });
$("tema-rad").addEventListener("click", function(e){
  var b = e.target.closest("button[data-t]"); if(!b) return;
  save(LS_TEMA, b.getAttribute("data-t")); applyTema();
});
$("skin-rad").addEventListener("click", function(e){
  var b = e.target.closest("button[data-s]"); if(!b) return;
  save(LS_SKIN, b.getAttribute("data-s")); applyTema();
});

/* ===== Funktioner & changelog ===== */
function oppnaFunk(){
  $("funk-tagline").textContent = APPINFO.tagline;
  var body = $("funk-body");
  var html = "";
  APPINFO.functions.forEach(function(fn){
    html += '<div class="logg-block"><h3>' + esc(fn.area) + '</h3><ul>';
    fn.items.forEach(function(it){ html += '<li>' + esc(it) + '</li>'; });
    html += '</ul></div>';
  });
  html += '<div class="grupp-rubrik">Versionshistorik</div>';
  APPINFO.changelog.forEach(function(c){
    html += '<div class="cl-ver"><span class="v">v' + esc(c.v) + '</span><span class="d">' + esc(c.d) + '</span></div>';
    html += '<div class="logg-block"><ul>';
    c.items.forEach(function(it){ html += '<li>' + esc(it) + '</li>'; });
    html += '</ul></div>';
  });
  body.innerHTML = html;
  $("skal-funk").hidden = false;
}
$("funk-btn").addEventListener("click", oppnaFunk);
$("funk-klar").addEventListener("click", function(){ $("skal-funk").hidden = true; });
$("skal-funk").addEventListener("click", function(e){ if(e.target.id === "skal-funk") $("skal-funk").hidden = true; });

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){ $("skal-valj").hidden = true; $("skal-tema").hidden = true; $("skal-funk").hidden = true; rita(); }
});

/* ===== Start ===== */
$("ver").textContent = "v" + APPINFO.version;
applyTema();
setLage(lage);
rita();
</script>
</body>
</html>
