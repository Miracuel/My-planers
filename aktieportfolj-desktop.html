<title>Aktieportfölj</title>
<style>
:root{
  --bg:#F1F4EE;--panel:#FBFCFA;--panel2:#E7EEE2;--line:#D7E0CE;
  --ink:#26302A;--muted:#788474;--accent:#2E7D5B;--accent-soft:#DCEEE2;
  --gold:#BE9A52;--ok:#2E7D5B;--red:#C0705E;--navbg:rgba(241,244,238,.95);
  --c1:#2E7D5B;--c2:#5DAE86;--c3:#BE9A52;--c4:#3F7E9B;--c5:#9B6FA0;--c6:#C0705E;--c7:#7BA05B;--grid:#D7E0CE;
}
html[data-theme=dark]{
  --bg:#121712;--panel:#1A211A;--panel2:#232C22;--line:#2D372C;
  --ink:#E6EEE3;--muted:#90A08C;--accent:#5DAE86;--accent-soft:#23362B;
  --gold:#D6BE7E;--ok:#5DAE86;--red:#D49684;--navbg:rgba(18,23,18,.95);
  --c1:#5DAE86;--c2:#2E7D5B;--c3:#D6BE7E;--c4:#5FA0BC;--c5:#B58FBA;--c6:#D49684;--c7:#9BC07B;--grid:#2D372C;
}
html[data-skin=guld]{--accent:#B0883F;--accent-soft:#EFE5CC}
html[data-skin=guld][data-theme=dark]{--accent:#D6BE7E;--accent-soft:#33290F}
html[data-skin=hav]{--accent:#3F7E9B;--accent-soft:#D6E6EC}
html[data-skin=hav][data-theme=dark]{--accent:#5FA8C4;--accent-soft:#16303A}
html[data-skin=plommon]{--accent:#7C5C92;--accent-soft:#EBE0F0}
html[data-skin=plommon][data-theme=dark]{--accent:#B58FBA;--accent-soft:#2E2238}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;transition:background .4s,color .4s}
.app{max-width:480px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 16px calc(86px + env(safe-area-inset-bottom))}
.topbar{display:flex;align-items:center;gap:8px;margin:2px 0 4px}
.topbar .sp{flex:1}
.icon-btn{background:var(--panel);border:1px solid var(--line);color:var(--ink);width:36px;height:36px;border-radius:11px;font-size:16px;cursor:pointer}
.sp-badge{font-size:10px;color:var(--muted);background:var(--panel2);border-radius:8px;padding:5px 9px;align-self:center}
.sp-badge.err{color:var(--red)}.sp-badge.offline{color:var(--muted)}
h1.brand{font-family:Georgia,serif;font-weight:400;font-size:22px;letter-spacing:.04em;text-align:center;margin:0 0 3px}
.brand-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:.02em}
.page-h{font-family:Georgia,serif;font-size:22px;margin:2px 0 12px}
.section-title{font-family:Georgia,serif;font-size:15px;margin:20px 0 9px;letter-spacing:.02em}
.section-title:first-child{margin-top:4px}
.section-title .lnk{float:right;font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:600;margin-top:3px;font-family:-apple-system,sans-serif}
.sub-h{font-family:Georgia,serif;font-size:14px;color:var(--accent);margin:16px 0 7px}
.hero{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;text-align:center;margin-bottom:14px}
.hero .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.hero .val{font-family:Georgia,serif;font-size:36px;line-height:1.1;margin:5px 0 5px}
.hero .chg{font-size:12.5px;font-weight:600;color:var(--ok)}
.hero .chg.dn{color:var(--red)}
.hero .chg .g{color:var(--gold)}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.statbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px}
.statbox .ic{font-size:16px;margin-bottom:6px}
.statbox .slbl{font-size:11px;color:var(--muted)}
.statbox .big{font-family:Georgia,serif;font-size:22px;line-height:1.1;margin-top:2px}
.statbox .sub{font-size:11px;font-weight:600;color:var(--ok);margin-top:3px}
.statbox .sub.dn{color:var(--red)}.statbox .sub.gold{color:var(--gold)}
.card-panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:15px}
.card-panel.tight{padding:12px}
.chartcard h4{font-family:Georgia,serif;font-weight:400;font-size:15px;margin-bottom:3px}
.chartcard .rng{font-size:11px;color:var(--muted);margin-bottom:10px}
.chartcard .rng b{color:var(--accent)}
.donut-wrap{display:flex;gap:14px;align-items:center}
.legend{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.legend .lg{display:flex;align-items:center;gap:8px;font-size:12px}
.legend .sw{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend .lv{margin-left:auto;color:var(--muted)}
.hold{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:11px 13px;margin-bottom:9px;cursor:pointer}
.hold:active{background:var(--panel2)}
.hold .tk{width:42px;height:42px;border-radius:12px;background:var(--accent-soft);color:var(--accent);font-family:Georgia,serif;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-align:center;line-height:1}
.hold .nm{flex:1;min-width:0}
.hold .nm .n1{font-family:Georgia,serif;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hold .nm .n2{font-size:11px;color:var(--muted);margin-top:1px}
.hold .pr{text-align:right;flex-shrink:0}
.hold .pr .p1{font-size:14px;font-weight:600}
.hold .pr .p2{font-size:11px;font-weight:600;color:var(--ok);margin-top:2px}
.hold .pr .p2.dn{color:var(--red)}
.goalbar{margin:11px 0 4px}
.goalbar .gl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.goalbar .gl .gv{color:var(--muted)}
.goal-track{height:9px;background:var(--panel2);border-radius:6px;overflow:hidden}
.goal-fill{height:100%;background:linear-gradient(90deg,var(--c2),var(--accent));border-radius:6px;transition:width .4s}
.goal-fill.gold{background:linear-gradient(90deg,#D8BE7E,var(--gold))}
.ai{background:linear-gradient(135deg,#234A3A,#2E7D5B);border-radius:18px;padding:16px;color:#EAF3EC;position:relative;overflow:hidden}
.ai::after{content:'\1F9D9';position:absolute;right:-4px;bottom:-14px;font-size:74px;opacity:.13}
.ai .ai-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#A9D6BD;font-weight:700;margin-bottom:6px}
.ai .ai-h{font-family:Georgia,serif;font-size:18px;margin-bottom:7px}
.ai .ai-t{font-size:12.5px;line-height:1.6;color:#D6E8DC;position:relative;z-index:1}
.ai .ai-btn{margin-top:12px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.27);border-radius:11px;padding:9px 13px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;position:relative;z-index:1}
.btn{border:1px solid var(--accent);background:var(--panel);color:var(--accent);border-radius:13px;padding:11px 14px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .3s}
.btn:active{background:var(--accent-soft)}
.btn.fill{background:var(--accent);color:#fff}
.btn.ghost{border-color:var(--line);color:var(--muted);font-size:12px;padding:7px 10px}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}
label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin:11px 0 4px}
input,textarea,select{background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:14px;padding:9px 10px;font-family:inherit;width:100%;outline:none}
textarea{resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.empty-msg{font-size:12.5px;color:var(--muted);padding:22px 12px;text-align:center;line-height:1.6}
.soft{font-size:12px;color:var(--muted);line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;padding:7px 11px;border-radius:11px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;padding:5px 9px;border-radius:9px;background:var(--accent-soft);color:var(--accent)}
.badge{font-size:10px;padding:3px 8px;border-radius:9px;background:var(--accent-soft);color:var(--accent);font-weight:600;white-space:nowrap}
.badge.gold{background:#F1E6C9;color:#8A6A22}
.badge.red{background:#F4DED8;color:#A2685B}
.row-line{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-top:1px solid var(--line)}
.row-line:first-child{border-top:none}
.row-line .v{color:var(--muted)}
.metric{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 0;border-top:1px solid var(--line)}
.metric:first-child{border-top:none}
.metric .mk{color:var(--muted)}
.metric .mv{font-weight:600}
.stars{color:var(--gold);font-size:13px;letter-spacing:1px}
.evt{display:flex;gap:11px;padding:10px 0;border-top:1px solid var(--line)}
.evt:first-child{border-top:none}
.evt .ed{flex-shrink:0;width:46px;text-align:center}
.evt .ed .d1{font-family:Georgia,serif;font-size:18px;color:var(--accent);line-height:1}
.evt .ed .d2{font-size:9px;color:var(--muted);text-transform:uppercase}
.evt .et{flex:1;font-size:13px;line-height:1.4}
.evt .et .e2{font-size:11px;color:var(--muted);margin-top:2px}
.diary{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:10px}
.diary .dh{display:flex;justify-content:space-between;align-items:baseline}
.diary .dh b{font-family:Georgia,serif;font-weight:400;font-size:15px}
.diary .dh .dd{font-size:11px;color:var(--muted)}
.diary .db{font-size:12.5px;color:var(--ink);line-height:1.6;margin-top:6px}
.diary .meta{font-size:11px;color:var(--muted);margin-top:7px}
.bdg{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:8px}
.bdg.lock{opacity:.5}
.bdg .be{font-size:24px;flex-shrink:0}
.bdg .bt{flex:1}
.bdg .bt .b1{font-size:14px;font-weight:600}
.bdg .bt .b2{font-size:11px;color:var(--muted);margin-top:1px}
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(30px + env(safe-area-inset-bottom));width:54px;height:54px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:28px;line-height:1;cursor:pointer;z-index:43;box-shadow:0 4px 16px rgba(46,125,91,.45)}

.nav button span{display:block;font-size:17px;margin-bottom:2px}
.nav button.navspacer{flex:0 0 54px;pointer-events:none}
.nav button[data-v=analys],.nav button[data-v=bevakning],.nav button[data-v=haxan],.nav button[data-v=dagbok],.nav button[data-v=utmark],.nav button[data-v=vadom],.nav button[data-v=installningar]{display:none}
.view{display:none}.view.active{display:block;animation:fade .25s}

.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--panel);border-radius:20px 20px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));z-index:51;transform:translateY(102%);transition:transform .25s ease;max-height:92vh;max-height:92dvh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;box-shadow:0 -8px 30px rgba(0,0,0,.18)}

<body>

  </div>
  <h1 class="brand">Aktieportfölj</h1>

  <section class="view active" id="view-oversikt"><div id="oversikt-body"></div></section>
  <section class="view" id="view-innehav"><div id="innehav-body"></div></section>
  <section class="view" id="view-mal"><div id="mal-body"></div></section>

  <section class="view" id="view-bevakning"><div id="bevakning-body"></div></section>
  <section class="view" id="view-haxan"><div id="haxan-body"></div></section>
  <section class="view" id="view-dagbok"><div id="dagbok-body"></div></section>
  <section class="view" id="view-utmark"><div id="utmark-body"></div></section>
  <section class="view" id="view-vadom"><div id="vadom-body"></div></section>

</div>

<div class="nav" id="nav">

  <button data-v="analys"></button>
  <button data-v="bevakning"></button>
  <button data-v="haxan"></button>
  <button data-v="dagbok"></button>
  <button data-v="utmark"></button>
  <button data-v="vadom"></button>
  <button data-v="installningar"></button>
</div>

<div class="sheet-bg" id="sheet-bg"></div>

<div class="sheet" id="more-sheet">
  <h3>Mer</h3>
  <div class="action-list">
    <button data-goto="analys">🔬 Analyscenter</button>
    <button data-goto="bevakning">📰 Bevakning &amp; larm</button>
    <button data-goto="haxan">🧙 Aktiehäxan</button>
    <button data-goto="dagbok">📚 Investeringsdagbok</button>
    <button data-goto="utmark">🏆 Utmärkelser</button>
    <button data-goto="vadom">✦ Vad hade hänt om?</button>
    <button data-goto="installningar">⚙ Inställningar</button>
  </div>
  <button class="sheet-close" data-close>Stäng</button>
</div>

<div class="sheet" id="add-sheet">
  <h3>Lägg till</h3>
  <div class="action-list">
    <button id="add-holding">📈 Nytt innehav</button>
    <button id="add-diary">📚 Dagboksinlägg</button>
    <button id="add-event">📰 Bevakning / larm</button>
  </div>
  <button class="sheet-close" data-close>Stäng</button>
</div>

<div class="sheet" id="holding-sheet">
  <h3 id="hs-title">Nytt innehav</h3>
  <div class="grid2">
    <div><label>Kortnamn / ticker</label><input type="text" id="h-ticker" placeholder="INVE B" maxlength="12"></div>
    <div><label>Bolagsnamn</label><input type="text" id="h-name" placeholder="Investor B"></div>
  </div>
  <div class="grid2">
    <div><label>Sektor</label><input type="text" id="h-sektor" placeholder="Verkstad"></div>
    <div><label>Land</label><input type="text" id="h-land" placeholder="Sverige"></div>
  </div>
  <div class="grid2">
    <div><label>Tillgångstyp</label><select id="h-typ"></select></div>
    <div><label>Aktuell kurs</label><input type="number" id="h-cur" step="0.01" placeholder="0"></div>
  </div>
  <div class="grid3">
    <div><label>Gårdagens kurs</label><input type="number" id="h-prev" step="0.01" placeholder="0"></div>
    <div><label>Direktavk. %</label><input type="number" id="h-yield" step="0.01" placeholder="0"></div>
    <div><label>P/E-tal</label><input type="number" id="h-pe" step="0.1" placeholder="0"></div>
  </div>
  <div class="grid2">
    <div><label>Riktpris (larm)</label><input type="number" id="h-target" step="0.01" placeholder="0"></div>
    <div><label>Vinsttillväxt %</label><input type="number" id="h-eps" step="0.1" placeholder="0"></div>
  </div>
  <label>Eget betyg</label><div class="seg" id="h-rating"></div>
  <label>Anteckning</label><textarea id="h-note" rows="2" placeholder="Varför äger du den? Tankar…"></textarea>
  <button class="sheet-close" id="h-save">Spara innehav</button>
</div>

<div class="sheet" id="detail-sheet"><div id="detail-body"></div><button class="sheet-close" data-close>Stäng</button></div>

<div class="sheet" id="diary-sheet">
  <h3 id="ds-title">Dagboksinlägg</h3>
  <div class="grid2">
    <div><label>Datum</label><input type="date" id="d-date"></div>
    <div><label>Aktie (frivilligt)</label><input type="text" id="d-ticker" placeholder="INVE B"></div>
  </div>
  <label>Rubrik</label><input type="text" id="d-title" placeholder="T.ex. Köpte Investor B">
  <label>Varför? (beslut &amp; strategi)</label><textarea id="d-reason" rows="3" placeholder="Vad fick dig att agera?"></textarea>
  <label>Utvärdering i efterhand</label><textarea id="d-eval" rows="2" placeholder="Fyll i senare när du vet hur det gick"></textarea>
  <label>Hur kändes beslutet? (1–5)</label><div class="seg" id="d-mood"></div>
  <button class="sheet-close" id="d-save">Spara inlägg</button>
</div>

<div class="sheet" id="event-sheet">
  <h3>Bevakning / larm</h3>
  <div class="grid2">
    <div><label>Datum</label><input type="date" id="e-date"></div>
    <div><label>Typ</label><select id="e-type"><option value="rapport">📊 Rapport</option><option value="utdelning">💰 Utdelning</option><option value="larm">🔔 Kurslarm</option><option value="annat">📌 Annat</option></select></div>
  </div>
  <label>Aktie</label><input type="text" id="e-ticker" placeholder="VOLV B">
  <label>Notering</label><input type="text" id="e-note" placeholder="T.ex. Q2-rapport kl 07:30">
  <button class="sheet-close" id="e-save">Spara</button>
</div>

<div class="sheet" id="changelog-sheet">
  <h3>📈 Nyheter &amp; funktioner</h3>
  <div id="changelog-body"></div>
  <button class="sheet-close" data-close>Stäng</button>
</div>

<script>
var APPINFO={version:'1.0.0',tagline:'Din personliga investeringscentral – följ, analysera och utveckla din portfölj på ett ställe.',audience:'Nybörjare, utdelningsinvesterare, FIRE-intresserade och långsiktiga sparare',functions:[{area:'Portföljöversikt',items:['Totalt portföljvärde och daglig förändring','Total avkastning och orealiserad vinst/förlust','Fördelning per sektor, land och tillgångstyp','Graf över portföljvärdet över tid']},{area:'Innehav',items:['Lägg till köp och sälj per aktie','Genomsnittligt inköpspris (GAV)','Orealiserad vinst/förlust','Utdelningshistorik och anteckningar per aktie']},{area:'Investeringsmål',items:['Mål för portföljvärde och utdelningsinkomst','FIRE-kalkylator med 4 %-regeln','Prognoser baserade på sparande och avkastning']},{area:'Analyscenter',items:['P/E-tal, direktavkastning och vinsttillväxt','Egna betyg och analyser per aktie']},{area:'Aktiebevakning',items:['Rapportkalender och utdelningsdatum','Kurslarm mot ditt riktpris']},{area:'Aktiehäxan AI',items:['Förklarar rapporter på enkel svenska','Hittar risker och föreslår diversifiering','Fungerar med både Claude och ChatGPT']},{area:'Mer',items:['Investeringsdagbok','Gamification: streaks, badges, milstolpar','"Vad hade hänt om?"-kalkylator','Synk, export/import, teman, mobil &amp; desktop']}],changelog:[{v:'1.0.0',d:'2026-06-24',items:['Första versionen av Aktieportfölj.','Portföljöversikt med värde, daglig förändring, avkastning och utvecklingsgraf.','Innehav med köp/sälj, GAV, orealiserad vinst, utdelningshistorik och anteckningar.','Fördelningsdiagram per sektor, land och tillgångstyp.','Mål & FIRE-kalkylator med prognoser.','Analyscenter med P/E, direktavkastning, vinsttillväxt och egna betyg.','Bevakning med rapport-, utdelnings- och larmkalender.','Aktiehäxan AI-coach (Claude & ChatGPT).','Investeringsdagbok, utmärkelser och "Vad hade hänt om?"-kalkylator.','GitHub-synk, export/import, teman (auto/ljust/mörkt + skins) och egen PNG-favicon.']}]};

var CENTRALEN_META={id:'aktieportfolj',namn:'Aktieportfölj',ikon:'📈',desc:'Följ, analysera och utveckla din aktieportfölj med AI-coach',mobil:'aktieportfolj.html',desktop:'aktieportfolj-desktop.html',farger:{bg:'#F1F4EE',line:'#D7E0CE',ink:'#26302A',muted:'#788474',accent:'#2E7D5B',iconbg:'#DCEEE2'}};

var KEY='aktieportfolj_v1';
var SYNC_KEY='aktieportfoljsync_v1';
var AI_KEY='aktieportfolj_ai_key';
var OAI_KEY='aktieportfolj_oai_key';
var AI_PROV='aktieportfolj_ai_prov';

var state={holdings:[],diary:[],events:[],history:[],goals:{value:1000000,div:25000,monthly:6000,ret:7,expenses:240000},badges:{},streak:{last:'',count:0},theme:'auto',skin:'skog'};
try{var raw=localStorage.getItem(KEY);if(raw){var o=JSON.parse(raw);if(o)state=Object.assign(state,o);if(!state.goals)state.goals={value:1000000,div:25000,monthly:6000,ret:7,expenses:240000};}}catch(e){}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function num(n,d){d=d||0;return Number(n||0).toLocaleString('sv-SE',{minimumFractionDigits:d,maximumFractionDigits:d});}
function kr(n){return num(Math.round(n||0))+' kr';}
function pct(n){return (n>=0?'+':'−')+Math.abs(n).toFixed(1).replace('.',',')+' %';}
function plainPayload(){return {holdings:state.holdings,diary:state.diary,events:state.events,history:state.history,goals:state.goals,badges:state.badges,streak:state.streak,theme:state.theme,skin:state.skin};}
function save(){try{localStorage.setItem(KEY,JSON.stringify(plainPayload()));}catch(e){}}
function persist(){save();if(syncOn())ghPush().catch(function(){});}

function qty(h){var q=0;(h.txs||[]).forEach(function(t){q+=(t.t==='buy'?1:-1)*Number(t.qty||0);});return q;}
function gav(h){var c=0,q=0;(h.txs||[]).forEach(function(t){if(t.t==='buy'){c+=Number(t.qty||0)*Number(t.price||0)+Number(t.fee||0);q+=Number(t.qty||0);}});return q>0?c/q:0;}
function mval(h){return qty(h)*Number(h.cur||0);}
function mcost(h){return qty(h)*gav(h);}
function pl(h){return mval(h)-mcost(h);}
function plpct(h){var c=mcost(h);return c>0?pl(h)/c*100:0;}
function daychg(h){return Number(h.prev||0)>0?qty(h)*(Number(h.cur||0)-Number(h.prev||0)):0;}
function annDiv(h){return mval(h)*Number(h.yield||0)/100;}
function divReceived(h){var s=0;(h.divs||[]).forEach(function(x){s+=Number(x.amount||0);});return s;}
function totVal(){var s=0;state.holdings.forEach(function(h){s+=mval(h);});return s;}
function totCost(){var s=0;state.holdings.forEach(function(h){s+=mcost(h);});return s;}
function totDay(){var s=0;state.holdings.forEach(function(h){s+=daychg(h);});return s;}
function totDiv(){var s=0;state.holdings.forEach(function(h){s+=annDiv(h);});return s;}

function snapshot(){var v=totVal();if(v<=0)return;var k=todayKey();var last=state.history[state.history.length-1];if(last&&last.d===k){last.v=v;}else{state.history.push({d:k,v:v});if(state.history.length>400)state.history=state.history.slice(-400);}}
function bumpStreak(){var k=todayKey();if(state.streak.last===k)return;var y=new Date(Date.now()-86400000);var yk=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');state.streak.count=(state.streak.last===yk)?(state.streak.count+1):1;state.streak.last=k;}

var TYPER=['Aktie','Fond','ETF','Preferens','Obligation','Råvara','Krypto','Övrigt'];

function svgArea(pts,w,h){if(pts.length<2)return '';var min=Math.min.apply(null,pts),max=Math.max.apply(null,pts);if(max===min){max=min+1;}var pad=8;var step=(w)/(pts.length-1);var ys=pts.map(function(v){return h-pad-(v-min)/(max-min)*(h-pad*2);});var line='M0 '+ys[0].toFixed(1);for(var i=1;i<ys.length;i++)line+=' L'+(i*step).toFixed(1)+' '+ys[i].toFixed(1);var area=line+' L'+w+' '+h+' L0 '+h+' Z';var ex=(ys.length-1)*step,ey=ys[ys.length-1];var s='<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none">';s+='<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".26"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>';s+='<path d="'+area+'" fill="url(#ag)"/><path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>';s+='<circle cx="'+ex.toFixed(1)+'" cy="'+ey.toFixed(1)+'" r="3.4" fill="var(--accent)"/></svg>';return s;}

function donut(parts){var COL=['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)'];var tot=0;parts.forEach(function(p){tot+=p.v;});if(tot<=0)return '<div class="empty-msg">Ingen data ännu.</div>';var off=0,circ='';for(var i=0;i<parts.length;i++){var frac=parts[i].v/tot*100;circ+='<circle cx="21" cy="21" r="15.9" fill="none" stroke="'+COL[i%COL.length]+'" stroke-width="6" stroke-dasharray="'+frac.toFixed(2)+' '+(100-frac).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 21 21)"/>';off+=frac;}var leg='';for(var j=0;j<parts.length;j++){leg+='<div class="lg"><span class="sw" style="background:'+COL[j%COL.length]+'"></span>'+esc(parts[j].k)+' <span class="lv">'+Math.round(parts[j].v/tot*100)+' %</span></div>';}return '<div class="donut-wrap"><svg width="100" height="100" viewBox="0 0 42 42"><circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--panel2)" stroke-width="6"/>'+circ+'</svg><div class="legend">'+leg+'</div></div>';}

function groupBy(field){var m={};state.holdings.forEach(function(h){var v=mval(h);if(v<=0)return;var k=esc(h[field]||'Okänt')||'Okänt';m[k]=(m[k]||0)+v;});return Object.keys(m).map(function(k){return {k:k,v:m[k]};}).sort(function(a,b){return b.v-a.v;});}

function renderOversikt(){
  var el=document.getElementById('oversikt-body');
  var v=totVal(),c=totCost(),p=v-c,pp=c>0?p/c*100:0,day=totDay(),dpp=v-day>0?day/(v-day)*100:0,div=totDiv();
  var h='';

document.getElementById('h-save').onclick=function(){var tk=document.getElementById('h-ticker').value.trim();var nm=document.getElementById('h-name').value.trim();if(!tk&&!nm){alert('Fyll i åtminstone ticker eller namn.');return;}var h=editId?state.holdings.find(function(x){return x.id===editId;}):{id:uid(),txs:[],divs:[]};h.ticker=tk;h.name=nm||tk;h.sektor=document.getElementById('h-sektor').value.trim();h.land=document.getElementById('h-land').value.trim();h.typ=document.getElementById('h-typ').value;h.cur=parseFloat(document.getElementById('h-cur').value)||0;h.prev=parseFloat(document.getElementById('h-prev').value)||0;h.yield=parseFloat(document.getElementById('h-yield').value)||0;h.pe=parseFloat(document.getElementById('h-pe').value)||0;h.target=parseFloat(document.getElementById('h-target').value)||0;h.eps=document.getElementById('h-eps').value===''?'':(parseFloat(document.getElementById('h-eps').value)||0);h.rating=hRating;h.note=document.getElementById('h-note').value.trim();h.updated=new Date().toISOString();if(!editId)state.holdings.push(h);bumpStreak();snapshot();persist();closeSheets();go('innehav');};

var dEditId=null,dMood=0;
function openDiary(id){dEditId=id||null;var x=id?state.diary.find(function(d){return d.id===id;}):null;document.getElementById('ds-title').textContent=x?'Redigera inlägg':'Dagboksinlägg';document.getElementById('d-date').value=x?(x.date||todayKey()):todayKey();document.getElementById('d-ticker').value=x?(x.ticker||''):'';document.getElementById('d-title').value=x?(x.title||''):'';document.getElementById('d-reason').value=x?(x.reason||''):'';document.getElementById('d-eval').value=x?(x.eval||''):'';dMood=x?(x.mood||0):0;fillSeg('d-mood',dMood,function(n){dMood=n;});openSheet('diary-sheet');}
function editDiary(id){openDiary(id);}
document.getElementById('d-save').onclick=function(){var t=document.getElementById('d-title').value.trim();if(!t){alert('Skriv en rubrik.');return;}var x=dEditId?state.diary.find(function(d){return d.id===dEditId;}):{id:uid()};x.date=document.getElementById('d-date').value||todayKey();x.ticker=document.getElementById('d-ticker').value.trim();x.title=t;x.reason=document.getElementById('d-reason').value.trim();x.eval=document.getElementById('d-eval').value.trim();x.mood=dMood;x.updated=new Date().toISOString();if(!dEditId)state.diary.push(x);bumpStreak();persist();closeSheets();go('dagbok');};

function openEvent(){document.getElementById('e-date').value=todayKey();document.getElementById('e-ticker').value='';document.getElementById('e-note').value='';openSheet('event-sheet');}
document.getElementById('e-save').onclick=function(){var d=document.getElementById('e-date').value;if(!d){alert('Välj datum.');return;}state.events.push({id:uid(),date:d,type:document.getElementById('e-type').value,ticker:document.getElementById('e-ticker').value.trim(),note:document.getElementById('e-note').value.trim(),updated:new Date().toISOString()});persist();closeSheets();go('bevakning');};

function boot(){loadSync();applyTheme();snapshot();save();renderOversikt();if(syncOn()){setBadge('offline','Synkar…');ghPull();}else{setBadge('offline','Lokalt');}}
document.addEventListener('visibilitychange',function(){if(!document.hidden&&syncOn())ghPull();});
boot();
</script>
</body>
</html>
