<title>Månen</title>
<style>
:root{
  --bg:#0A0E1A;--panel:#131A2B;--panel2:#1B2438;--line:#283452;
  --ink:#E2E8F2;--muted:#8B96AD;--ice:#9FB8D8;--moonlight:#E8EDF5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:radial-gradient(1100px 560px at 50% -8%,#16203A 0%,var(--bg) 62%) fixed,var(--bg);color:var(--ink);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 14px calc(76px + env(safe-area-inset-bottom))}
h1.brand{font-family:Georgia,serif;font-weight:400;font-size:22px;color:var(--ice);letter-spacing:.06em;text-align:center;margin:6px 0 14px}
.section-title{font-family:Georgia,serif;font-size:16px;color:var(--ice);margin:16px 0 8px;letter-spacing:.03em}
.card-panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}
.btn{border:1px solid var(--ice);background:var(--panel2);color:var(--ice);border-radius:12px;padding:11px 14px;font-size:14px;cursor:pointer;font-family:inherit}
.btn.ghost{border-color:var(--line);color:var(--muted);font-size:12px;padding:7px 10px;background:transparent}
canvas{display:block;margin:0 auto;max-width:100%;height:auto}
.moon-stage{text-align:center;padding:6px 0}
.phase-name{font-family:Georgia,serif;font-size:22px;color:var(--moonlight);margin-top:10px}
.phase-sub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.6}
.sign-row{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:13px;color:var(--muted);line-height:1.6;text-align:left}
.sign-row b{font-family:Georgia,serif;font-weight:400;color:var(--ice);font-size:15px;display:block;margin-bottom:2px}
.next-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:13px}
.next-row:first-child{border-top:none}
.next-row .ic{font-size:20px;width:30px;text-align:center}
.next-row .nm{flex:1}
.next-row .nm small{display:block;color:var(--muted);font-size:11px}
.next-row .when{color:var(--ice);font-size:12px;white-space:nowrap;text-align:right}
.next-row .when small{display:block;color:var(--muted)}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-title{font-family:Georgia,serif;font-size:19px}
.nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--ice);font-size:17px;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-head{font-size:10px;color:var(--muted);text-align:center;padding-bottom:3px}
.dc{aspect-ratio:1;border-radius:10px;background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:11px;color:var(--muted);cursor:pointer;border:1px solid transparent;position:relative}
.dc.other{opacity:.25}
.dc.today{border-color:var(--ice);color:var(--ice)}
.dc .mi{font-size:15px;line-height:1}
.dc.special{background:var(--panel2)}
.dc .notedot{position:absolute;top:4px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--ice)}

.ev-month{font-family:Georgia,serif;color:var(--ice);font-size:14px;margin:12px 0 2px}
.ev-month:first-child{margin-top:0}

.j-item{padding:10px 0;border-top:1px solid var(--line)}
.j-item:first-child{border-top:none}
.j-date{font-size:11px;color:var(--muted)}
.j-txt{font-size:13px;line-height:1.55;margin-top:2px;white-space:pre-wrap}
.j-del{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;float:right}
.prompt-card{background:linear-gradient(160deg,#1B2438,#131A2B);border:1px solid var(--ice);border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.6;margin-top:12px}
.prompt-card b{font-family:Georgia,serif;color:var(--ice)}
textarea{background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:13px;padding:9px;font-family:inherit;width:100%;resize:none}

.nav{position:fixed;left:0;right:0;bottom:0;background:rgba(10,14,26,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);z-index:40}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-size:11px;padding:9px 2px 8px;cursor:pointer;font-family:inherit}
.nav button.active{color:var(--ice)}
.nav button span{display:block;font-size:15px;margin-bottom:1px}
.view{display:none}
.view.active{display:block}

.sheet-bg{position:fixed;inset:0;background:rgba(4,6,14,.65);display:none;z-index:50}
.sheet-bg.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-bottom:none;border-radius:18px 18px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));z-index:51;transform:translateY(102%);transition:transform .22s ease;max-height:86vh;max-height:86dvh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.sheet.open{transform:translateY(0)}
.sheet h3{font-family:Georgia,serif;font-size:17px;color:var(--ice);margin-bottom:8px}
.sheet-close{width:100%;padding:11px;border-radius:11px;border:1px solid var(--ice);background:var(--panel2);color:var(--ice);font-size:14px;cursor:pointer;position:sticky;bottom:0;margin-top:12px}
.foot{display:flex;gap:8px;justify-content:center;margin-top:16px}
.foot button{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.privacy{text-align:center;font-size:10px;color:var(--muted);opacity:.7;margin-top:8px}
</style>
</head>
<body>
<div class="app">
<h1 class="brand">☾ Månen</h1>

<!-- IDAG -->
<div class="view active" id="view-today">
  <div class="card-panel moon-stage">
    <canvas id="bigmoon" width="440" height="440"></canvas>
    <div class="phase-name" id="phase-name"></div>
    <div class="phase-sub" id="phase-sub"></div>
    <div class="sign-row" id="sign-row"></div>
  </div>
  <div id="prompt-slot"></div>
  <div class="section-title">Närmast i månens kalender</div>
  <div class="card-panel" id="next-events"></div>
  <div class="foot">
    <button id="export-btn">Säkerhetskopiera</button>
    <button id="import-btn">Importera</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>
  <div class="privacy">Beräknas lokalt i din telefon · tider med några minuters marginal ☾</div>
</div>

<!-- KALENDER -->
<div class="view" id="view-cal">
  <div class="cal-nav">
    <button class="nav-btn" id="cal-prev">‹</button>
    <div class="cal-title" id="cal-title"></div>
    <button class="nav-btn" id="cal-next">›</button>
  </div>
  <div class="card-panel">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<!-- HÄNDELSER -->
<div class="view" id="view-ev">
  <div class="section-title" style="margin-top:0">Ny- och fullmånar — 12 månader framåt</div>
  <div class="card-panel" id="ev-list"></div>
</div>

<!-- JOURNAL -->
<div class="view" id="view-journal">
  <div class="section-title" style="margin-top:0">Månjournal</div>
  <div class="card-panel">
    <textarea id="j-in" rows="3" placeholder="Intentioner vid nymåne, släppande vid fullmåne — eller bara tankar…"></textarea>
    <button class="btn" id="j-add" style="width:100%;margin-top:8px">Spara i journalen</button>
  </div>
  <div class="card-panel" id="j-list" style="margin-top:12px"></div>
</div>
</div>

<div class="nav">
  <button class="active" data-v="today"><span>☾</span>Idag</button>
  <button data-v="cal"><span>▦</span>Kalender</button>
  <button data-v="ev"><span>✶</span>Händelser</button>
  <button data-v="journal"><span>✎</span>Journal</button>
</div>

<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="day-sheet">
  <h3 id="ds-title"></h3>
  <canvas id="minimoon" width="200" height="200"></canvas>
  <div class="phase-sub" id="ds-info" style="text-align:center"></div>
  <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin:12px 0 4px">Anteckning</label>
  <textarea id="ds-note" rows="3" placeholder="Tankar, intentioner, drömmar…"></textarea>
  <button class="sheet-close" id="ds-close">Klar</button>
</div>

<script>
// ── Astronomi: sol & måne (Schlyter) ──────────────────
const RAD=Math.PI/180;
const sind=x=>Math.sin(x*RAD),cosd=x=>Math.cos(x*RAD);
const atan2d=(y,x)=>Math.atan2(y,x)/RAD;
const rev=x=>{x=x%360;return x<0?x+360:x;};
const EPOCH=Date.UTC(1999,11,31,0,0);
const dnum=ms=>(ms-EPOCH)/86400000;
function kepler(M,e){
  let E=M+e/RAD*sind(M)*(1+e*cosd(M));
  for(let i=0;i<8;i++){
    const dE=(E-e/RAD*sind(E)-M)/(1-e*cosd(E));E-=dE;
    if(Math.abs(dE)<1e-6)break;
  }
  return E;
}
function sunLon(d){
  const w=rev(282.9404+4.70935e-5*d),e=0.016709-1.151e-9*d,M=rev(356.0470+0.9856002585*d);
  const E=kepler(M,e);
  const xv=cosd(E)-e,yv=Math.sqrt(1-e*e)*sind(E);
  return rev(atan2d(yv,xv)+w);
}
function moonLon(d){
  const N=rev(125.1228-0.0529538083*d),i=5.1454,w=rev(318.0634+0.1643573223*d),
        a=60.2666,e=0.054900,M=rev(115.3654+13.0649929509*d);
  const E=kepler(M,e);
  const xv=a*(cosd(E)-e),yv=a*Math.sqrt(1-e*e)*sind(E);
  const v=atan2d(yv,xv),r=Math.sqrt(xv*xv+yv*yv),u=v+w;
  const xh=r*(cosd(N)*cosd(u)-sind(N)*sind(u)*cosd(i));
  const yh=r*(sind(N)*cosd(u)+cosd(N)*sind(u)*cosd(i));
  let lon=rev(atan2d(yh,xh));
  const ws=rev(282.9404+4.70935e-5*d),Ms=rev(356.0470+0.9856002585*d);
  const Ls=rev(Ms+ws),Lm=rev(M+w+N),D=rev(Lm-Ls),F=rev(Lm-N);
  lon += -1.274*sind(M-2*D)+0.658*sind(2*D)-0.186*sind(Ms)
        -0.059*sind(2*M-2*D)-0.057*sind(M-2*D+Ms)+0.053*sind(M+2*D)
        +0.046*sind(2*D-Ms)+0.041*sind(M-Ms)-0.035*sind(D)-0.031*sind(M+Ms)
        -0.015*sind(2*F-2*D)+0.011*sind(M-4*D);
  return rev(lon);
}
const phaseAngle=d=>rev(moonLon(d)-sunLon(d));
const illum=ang=>(1-cosd(ang))/2;

// ── Faser & namn ──────────────────────────────────────
const PHASE_NAMES=['Nymåne','Växande skära','Första kvarteret','Växande måne','Fullmåne','Avtagande måne','Sista kvarteret','Avtagande skära'];
const PHASE_ICONS=['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
function phaseIdx(ang){return Math.floor(((ang+22.5)%360)/45);}
const SIGNS=['Väduren','Oxen','Tvillingarna','Kräftan','Lejonet','Jungfrun','Vågen','Skorpionen','Skytten','Stenbocken','Vattumannen','Fiskarna'];
const SIGN_TXT=['Känslorna är snabba och otåliga — agera gärna, men räkna till tre först.','Lugn och sinnlighet — god mat, mjuka filtar, inga förhastade beslut.','Pratig och rastlös energi — ring någon, skriv av dig.','Månen är hemma — känslorna går på djupet. Håll de dina nära.','Generös, varm och lite dramatisk — låt hjärtat ta plats.','Ordningens dag — rensa, planera, gör klart. Det lugnar.','Harmoni söks — jämka, försköna, umgås mjukt.','Intensivt och avslöjande — gå till botten, men var varsam med dig själv.','Frihetslängtan — kom ut, byt perspektiv, skratta.','Fokuserat och sakligt — bra dag att beta av och bygga.','Distans och idéer — tänk nytt, umgås på dina egna villkor.','Drömskt och poröst — vila, skapa, sov middag utan skuld.'];
const FULLMOON_NAMES=['Vargmånen','Snömånen','Maskmånen','Rosa månen','Blomstermånen','Jordgubbsmånen','Bockmånen','Störmånen','Skördemånen','Jägarmånen','Bävermånen','Köldmånen'];
const SYNODIC=29.530588;

// ── Händelser (ny/full/kvarter) ───────────────────────
function findEvents(fromMs,days){
  const targets=[[0,'Nymåne','🌑'],[90,'Första kvarteret','🌓'],[180,'Fullmåne','🌕'],[270,'Sista kvarteret','🌗']];
  const ev=[];
  const step=0.25;
  let d0=dnum(fromMs);
  let prev=phaseAngle(d0);
  for(let t=step;t<=days;t+=step){
    const d=d0+t;
    const cur=phaseAngle(d);
    targets.forEach(([tg,name,icon])=>{
      const f=x=>{let v=rev(x-tg);if(v>180)v-=360;return v;};
      const f0=f(prev),f1=f(cur);
      if(f0<0&&f1>=0&&Math.abs(f0)<25){
        // förfina med bisektion
        let lo=d-step,hi=d;
        for(let k=0;k<22;k++){
          const mid=(lo+hi)/2;
          if(f(phaseAngle(mid))<0)lo=mid;else hi=mid;
        }
        const exact=(lo+hi)/2;
        ev.push({ms:EPOCH+exact*86400000,angle:tg,name,icon,moonSign:Math.floor(moonLon(exact)/30)});
      }
    });
    prev=cur;
  }
  ev.sort((a,b)=>a.ms-b.ms);
  return ev;
}
let EVENTS=[];

// ── Rita månen ────────────────────────────────────────
function drawMoon(cvId,ang){
  const cv=document.getElementById(cvId);
  const ctx=cv.getContext('2d');
  const W=cv.width,cx=W/2,cy=W/2,R=W*0.40;
  ctx.clearRect(0,0,W,W);
  const dark='#1B2438',light='#E8EDF5';
  // glow
  ctx.save();
  ctx.shadowColor='rgba(232,237,245,0.35)';
  ctx.shadowBlur=W*0.06;
  ctx.fillStyle=dark;
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.fill();
  ctx.restore();
  const k=illum(ang);
  const waxing=ang<=180;
  const cosP=cosd(ang);
  // ljus helcirkel
  ctx.fillStyle=light;
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.fill();
  // mörk halva på skuggsidan (vänster om växande)
  ctx.fillStyle=dark;
  ctx.beginPath();
  ctx.arc(cx,cy,R,Math.PI/2,Math.PI*1.5,waxing); // waxing: vänster halva mörk
  ctx.closePath();ctx.fill();
  // terminator-ellips
  ctx.fillStyle=k<0.5?dark:light;
  ctx.beginPath();
  ctx.ellipse(cx,cy,Math.abs(R*cosP),R,0,0,7);
  ctx.fill();
  // kratrar (bara på ljus yta, subtila)
  ctx.save();
  ctx.globalAlpha=0.10;
  ctx.fillStyle='#5A6B8C';
  [[0.18,-0.22,0.13],[-0.12,0.10,0.09],[0.05,0.30,0.07],[-0.28,-0.05,0.06],[0.30,0.15,0.05]].forEach(([dx,dy,r])=>{
    ctx.beginPath();ctx.arc(cx+dx*2*R,cy+dy*2*R,r*2*R,0,7);ctx.fill();
  });
  ctx.restore();
  // kant
  ctx.strokeStyle='rgba(159,184,216,0.35)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke();
}

// ── State ─────────────────────────────────────────────
const KEY='manen_v1';
let state={notes:{},journal:[]};
try{const s=localStorage.getItem(KEY);if(s)state=Object.assign(state,JSON.parse(s));}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const toISO=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const fmtDT=ms=>new Date(ms).toLocaleDateString('sv-SE',{weekday:'short',day:'numeric',month:'long'})+' kl '+new Date(ms).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
const dNoon=dateStr=>{const[y,m,da]=dateStr.split('-').map(Number);return dnum(Date.UTC(y,m-1,da,12,0));};

// ── Idag ──────────────────────────────────────────────
function moonAge(ang){return ang/360*SYNODIC;}
function renderToday(){
  const d=dnum(Date.now());
  const ang=phaseAngle(d);
  drawMoon('bigmoon',ang);
  const pi=phaseIdx(ang);
  document.getElementById('phase-name').textContent=PHASE_NAMES[pi];
  document.getElementById('phase-sub').innerHTML=Math.round(illum(ang)*100)+'% belyst · dag '+moonAge(ang).toFixed(1)+' av 29,5 i måncykeln';
  const sign=Math.floor(moonLon(d)/30);
  document.getElementById('sign-row').innerHTML='<b>☽ Månen i '+SIGNS[sign]+'</b>'+SIGN_TXT[sign];
  // närmaste händelser
  const next=EVENTS.filter(e=>e.ms>Date.now()).slice(0,4);
  document.getElementById('next-events').innerHTML=next.map(e=>{
    const days=Math.ceil((e.ms-Date.now())/86400000);
    const nm=e.angle===180?FULLMOON_NAMES[new Date(e.ms).getMonth()]+' i '+SIGNS[e.moonSign]:e.angle===0?'i '+SIGNS[e.moonSign]:'';
    return '<div class="next-row"><span class="ic">'+e.icon+'</span><span class="nm">'+e.name+(nm?'<small>'+nm+'</small>':'')+'</span><span class="when">om '+days+' d<small>'+fmtDT(e.ms)+'</small></span></div>';
  }).join('');
  // intention/släpp-prompt nära ny/fullmåne
  const near=EVENTS.find(e=>Math.abs(e.ms-Date.now())<36*3600000&&(e.angle===0||e.angle===180));
  const slot=document.getElementById('prompt-slot');
  if(near){
    slot.innerHTML='<div class="prompt-card"><b>'+near.icon+' '+(near.angle===0?'Nymåne — vad vill du så?':'Fullmåne — vad släpper du?')+'</b><br>Skriv det i journalen, så finns det kvar att återvända till.</div>';
  }else slot.innerHTML='';
}

// ── Kalender ──────────────────────────────────────────
let calY=new Date().getFullYear(),calM=new Date().getMonth();
const MN=['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
function renderCal(){
  document.getElementById('cal-title').textContent=MN[calM]+' '+calY;
  const grid=document.getElementById('cal-grid');
  let html='';
  ['M','T','O','T','F','L','S'].forEach(l=>html+='<div class="cal-head">'+l+'</div>');
  const first=new Date(calY,calM,1);
  const startDow=(first.getDay()+6)%7;
  const cur=new Date(first);cur.setDate(first.getDate()-startDow);
  const tk=toISO(new Date());
  // exakta händelsedagar denna vy
  const evDays={};
  EVENTS.forEach(e=>{
    if(e.angle===0||e.angle===180)evDays[toISO(new Date(e.ms))]=e.icon;
  });
  for(let i=0;i<42;i++){
    if(i>=35&&cur.getMonth()!==calM)break;
    const k=toISO(cur);
    const ang=phaseAngle(dNoon(k));
    const icon=evDays[k]||PHASE_ICONS[phaseIdx(ang)];
    html+='<div class="dc'+(cur.getMonth()!==calM?' other':'')+(k===tk?' today':'')+(evDays[k]?' special':'')+'" data-k="'+k+'">'+
      (state.notes[k]?'<span class="notedot"></span>':'')+
      '<span class="mi">'+icon+'</span>'+cur.getDate()+'</div>';
    cur.setDate(cur.getDate()+1);
  }
  grid.innerHTML=html;
  grid.querySelectorAll('.dc').forEach(c=>{c.onclick=()=>openDay(c.dataset.k);});
}
document.getElementById('cal-prev').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCal();};
document.getElementById('cal-next').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCal();};

const bg=document.getElementById('sheet-bg');
function closeSheets(){bg.classList.remove('open');document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('open'));}
bg.onclick=closeSheets;
let dayKey=null;
function openDay(k){
  dayKey=k;
  const d=dNoon(k);
  const ang=phaseAngle(d);
  document.getElementById('ds-title').textContent=new Date(k).toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long'});
  drawMoon('minimoon',ang);
  const sign=Math.floor(moonLon(d)/30);
  document.getElementById('ds-info').innerHTML=PHASE_NAMES[phaseIdx(ang)]+' · '+Math.round(illum(ang)*100)+'% · Månen i '+SIGNS[sign];
  document.getElementById('ds-note').value=state.notes[k]||'';
  bg.classList.add('open');
  document.getElementById('day-sheet').classList.add('open');
}
document.getElementById('ds-note').oninput=e=>{
  const v=e.target.value;
  if(v.trim())state.notes[dayKey]=v;else delete state.notes[dayKey];
  save();
};
document.getElementById('ds-close').onclick=()=>{closeSheets();renderCal();};

// ── Händelser 12 mån ──────────────────────────────────
function renderEvents(){
  const list=EVENTS.filter(e=>(e.angle===0||e.angle===180)&&e.ms>Date.now()-86400000);
  let html='',lastMonth='';
  list.forEach(e=>{
    const dt=new Date(e.ms);
    const mk=MN[dt.getMonth()]+' '+dt.getFullYear();
    if(mk!==lastMonth){lastMonth=mk;html+='<div class="ev-month">'+mk+'</div>';}
    const nm=e.angle===180?FULLMOON_NAMES[dt.getMonth()]+' · i '+SIGNS[e.moonSign]:'i '+SIGNS[e.moonSign];
    html+='<div class="next-row"><span class="ic">'+e.icon+'</span><span class="nm">'+e.name+'<small>'+nm+'</small></span><span class="when">'+fmtDT(e.ms)+'</span></div>';
  });
  document.getElementById('ev-list').innerHTML=html;
}

// ── Journal ───────────────────────────────────────────
function renderJournal(){
  const el=document.getElementById('j-list');
  if(!state.journal.length){el.innerHTML='<div class="empty-msg" style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0">Tom ännu — nästa nymåne är ett fint tillfälle ☾</div>';return;}
  el.innerHTML=state.journal.map((j,i)=>{
    const d=dNoon(j.date);
    const ang=phaseAngle(d);
    return '<div class="j-item"><button class="j-del" data-i="'+i+'">×</button><div class="j-date">'+PHASE_ICONS[phaseIdx(ang)]+' '+new Date(j.date).toLocaleDateString('sv-SE',{day:'numeric',month:'long',year:'numeric'})+' · '+PHASE_NAMES[phaseIdx(ang)]+'</div><div class="j-txt">'+esc(j.txt)+'</div></div>';
  }).join('');
  el.querySelectorAll('.j-del').forEach(b=>{b.onclick=()=>{state.journal.splice(+b.dataset.i,1);save();renderJournal();};});
}
document.getElementById('j-add').onclick=()=>{
  const v=document.getElementById('j-in').value.trim();if(!v)return;
  state.journal.unshift({date:toISO(new Date()),txt:v});
  save();document.getElementById('j-in').value='';renderJournal();
};

// ── Export/import ─────────────────────────────────────
document.getElementById('export-btn').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='manen-backup.json';a.click();
};
document.getElementById('import-btn').onclick=()=>document.getElementById('import-file').click();
document.getElementById('import-file').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(d&&(d.notes||d.journal)){state=Object.assign({notes:{},journal:[]},d);save();renderJournal();renderCal();}else alert('Ogiltig fil.');}catch(err){alert('Kunde inte läsa filen.');}};
  r.readAsText(f);
};

// ── Nav ───────────────────────────────────────────────
document.querySelectorAll('.nav button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+b.dataset.v).classList.add('active');
  };
});

EVENTS=findEvents(Date.now()-3*86400000,380);
renderToday();
renderCal();
renderEvents();
renderJournal();
setInterval(renderToday,60000);
</script>
