<style>
:root{
  --bg:#F7F2EA;--panel:#FFFCF6;--panel2:#F0E8DB;--line:#E4D9C6;
  --ink:#3A322A;--muted:#8C8170;--accent:#B07D3C;--accent-soft:#F0E2CB;
  --ok:#7A8B6F;--red:#C0785E;--gold:#C2A36B;--navbg:rgba(247,242,234,.95);
}
html[data-theme=dark]{
  --bg:#171310;--panel:#211C17;--panel2:#2B241D;--line:#3A3026;
  --ink:#EDE3D4;--muted:#A2937E;--accent:#D8A75C;--accent-soft:#3A2E1C;
  --ok:#9FB58F;--red:#D49C8C;--gold:#D6BA7C;--navbg:rgba(23,19,16,.95);
}
html[data-skin=plommon]{--accent:#7C5A93;--accent-soft:#EBE1F0}
html[data-skin=plommon][data-theme=dark]{--accent:#B295C9;--accent-soft:#2E2438}
html[data-skin=salvia]{--accent:#5E7B62;--accent-soft:#E0EADD}
html[data-skin=salvia][data-theme=dark]{--accent:#90B393;--accent-soft:#233022}
html[data-skin=natt]{--accent:#4F6CA0;--accent-soft:#DEE4F0}
html[data-skin=natt][data-theme=dark]{--accent:#8AA3D6;--accent-soft:#222A40}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;transition:background .4s,color .4s}
.app{max-width:480px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 14px calc(88px + env(safe-area-inset-bottom))}
h1.brand{font-family:Georgia,serif;font-weight:400;font-size:22px;letter-spacing:.06em;text-align:center;margin:2px 0 3px}
.brand-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:.04em}
.page-h{font-family:Georgia,serif;font-size:21px;margin:2px 0 4px}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.card-panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}
.section-title{font-family:Georgia,serif;font-size:15px;margin:18px 0 8px;letter-spacing:.02em}
.btn{border:1px solid var(--accent);background:var(--panel);color:var(--accent);border-radius:14px;padding:11px 14px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .25s}
.btn:active{background:var(--accent-soft)}
.btn.fill{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.ghost{border-color:var(--line);color:var(--muted);font-size:12px;padding:8px 11px}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.big{width:100%;padding:14px;font-size:15px;border-radius:16px}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin:11px 0 4px}
input,textarea,select{background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:14px;padding:10px;font-family:inherit;width:100%;outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
.soft{font-size:12px;color:var(--muted);line-height:1.6}
.empty-msg{font-size:12px;color:var(--muted);padding:18px 0;text-align:center}
.view{display:none}
.view.active{display:block}

/* Rutin-pills */
.rpills{display:flex;gap:7px;overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.rpill{flex-shrink:0;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.rpill.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* Progress-topp */
.prog{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.prog .pbig{font-family:Georgia,serif;font-size:34px;line-height:1}
.prog .plab{font-size:12px;color:var(--muted);margin-top:3px}
.ptrack{height:9px;background:var(--panel2);border-radius:6px;overflow:hidden;margin-top:12px}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent-soft),var(--accent));border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog.ready .pbig{color:var(--accent)}
.gostrip{margin-top:13px}

/* Tre saker */
.three .tt{font-family:Georgia,serif;font-size:15px}
.three .ts{font-size:11px;color:var(--muted);margin:2px 0 10px;line-height:1.5}
.trow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tnum{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
.trow input{background:var(--panel2)}
.tdone{font-size:11px;color:var(--ok);font-weight:600;margin-top:4px}

/* Stationer */
.station{margin-bottom:14px}
.sthead{display:flex;align-items:center;gap:8px;margin:0 2px 8px}
.sthead .si{font-size:17px}
.sthead .sn{font-family:Georgia,serif;font-size:16px;flex:1}
.sthead .sc{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.items{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-top:1px solid var(--line);cursor:pointer;transition:background .2s}
.item:first-child{border-top:none}
.item:active{background:var(--panel2)}
.chk{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;transition:.2s}
.item.on .chk{background:var(--accent);border-color:var(--accent)}
.item .itx{font-size:14px;line-height:1.4;transition:.2s}
.item.on .itx{color:var(--muted);text-decoration:line-through}
.item.auto{border-style:none}
.item.auto .chk{border-style:dashed}
.item.auto .ihint{font-size:10px;color:var(--muted);margin-top:2px}

/* Vilolaget (stängt) */
.rest{text-align:center;padding:26px 18px}
.rest .ri{font-size:40px}
.rest .rt{font-family:Georgia,serif;font-size:20px;margin-top:8px}
.rest .rs{font-size:12px;color:var(--muted);margin-top:6px}
.rest .rq{font-size:13px;line-height:1.6;margin:14px 0 16px;color:var(--ink)}

/* Stängningsscen */
.scene{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s}
.scene.on{opacity:1;pointer-events:auto}
.scene-inner{text-align:center;padding:30px;max-width:360px}
.lockwrap{position:relative;width:130px;height:150px;margin:0 auto 6px}
.glow{position:absolute;inset:-30px;border-radius:50%;background:radial-gradient(circle,var(--accent-soft),transparent 65%);opacity:0}
.scene.on .glow{animation:glowpulse 2.4s ease-in-out .2s infinite}
@keyframes glowpulse{0%,100%{opacity:.35;transform:scale(.92)}50%{opacity:.7;transform:scale(1.05)}}
.locksvg{position:relative}
.scene.on .locksvg{animation:lockpop .5s cubic-bezier(.2,1.3,.4,1) both}
@keyframes lockpop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.shackle{transform-origin:60px 60px}
.scene.on .shackle{animation:lockdrop .55s cubic-bezier(.5,0,.3,1.2) .25s both}
@keyframes lockdrop{from{transform:translateY(-15px)}to{transform:translateY(0)}}
.scene-title{font-family:Georgia,serif;font-size:24px;margin-top:8px}
.scene-sub{font-size:12px;color:var(--muted);margin-top:8px}
.scene-quote{font-size:13px;line-height:1.6;color:var(--ink);margin:14px 0 4px;min-height:1px;font-style:italic}
.scene-btns{margin-top:22px;display:flex;flex-direction:column;gap:9px}

/* Historik */
.streak{text-align:center;padding:22px}
.streak .se{font-size:34px}
.streak .sbig{font-family:Georgia,serif;font-size:40px;line-height:1;margin-top:4px}
.streak .slab{font-size:12px;color:var(--muted);margin-top:4px}
.mdots{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.mdc{font-size:9px;color:var(--muted);text-align:center}
.md{aspect-ratio:1;border-radius:7px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}
.md.done{background:var(--accent);color:#fff;font-weight:600}
.md.today{outline:2px solid var(--accent);outline-offset:-2px}
.md.empty{background:transparent}
.hrow{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
.hrow:first-child{border-top:none}
.hrow .hd{font-family:Georgia,serif;font-size:15px;width:54px;text-align:center;flex-shrink:0}
.hrow .hm{flex:1;font-size:13px}
.hrow .hm .hsub{font-size:11px;color:var(--muted);margin-top:1px}
.hrow .ht{font-size:12px;color:var(--accent);font-weight:600}

/* Redigerare */
.ed-st{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:11px}
.ed-sh{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ed-sh .ico{width:46px;text-align:center;padding:9px 4px}
.ed-sh .nm{flex:1}
.ed-it{display:flex;gap:7px;align-items:center;margin-bottom:6px}
.ed-it input{flex:1}
.xbtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:9px;width:34px;height:38px;flex-shrink:0;cursor:pointer;font-size:15px}
.mvbtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:9px;width:32px;height:30px;cursor:pointer;font-size:12px}
.ed-foot{display:flex;gap:8px;margin-top:8px;align-items:center}

/* Inställningar */
.seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.seg button{flex:1;background:none;border:none;padding:10px 4px;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit}
.seg button.on{background:var(--accent);color:#fff}
.skins{display:flex;gap:10px;margin-top:6px}
.skin{flex:1;height:42px;border-radius:12px;border:2px solid var(--line);cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.skin.on{border-color:var(--ink)}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.toggle .tl{font-size:14px}
.tg{width:46px;height:27px;border-radius:14px;background:var(--panel2);border:1px solid var(--line);position:relative;cursor:pointer;flex-shrink:0;transition:.25s}
.tg.on{background:var(--accent);border-color:var(--accent)}
.tg::after{content:'';position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.25s}
.tg.on::after{left:21px}
.sbadge{font-size:11px;padding:4px 9px;border-radius:9px;background:var(--panel2);color:var(--muted);font-weight:600}
.sbadge.ok{background:var(--accent-soft);color:var(--accent)}
.sbadge.err{background:#F4DEDA;color:#A2685B}

/* Info */
.fn-area{font-family:Georgia,serif;font-size:14px;margin:12px 0 6px;color:var(--accent)}
.fn-li{font-size:13px;line-height:1.6;padding-left:16px;position:relative}
.fn-li::before{content:'·';position:absolute;left:4px;color:var(--accent)}
.cl-v{font-family:Georgia,serif;font-size:15px;margin-top:14px}
.cl-d{font-size:11px;color:var(--muted);margin-bottom:4px}

/* Nav */
.nav{position:fixed;left:0;right:0;bottom:0;background:var(--navbg);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);z-index:40}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-size:10px;padding:9px 1px 8px;cursor:pointer;font-family:inherit;font-weight:600}
.nav button.active{color:var(--accent)}
.nav button span{display:block;font-size:18px;margin-bottom:2px}

/* Toast */
#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:12px;font-size:13px;opacity:0;pointer-events:none;transition:.3s;z-index:300;max-width:90%;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── DESKTOP-LAGER v2 (endast CSS, JS oörändrad) ─── */
@media (min-width:0px){
  .app{max-width:920px;margin:0 0 0 212px;padding:30px 38px 72px}
  .brand,.brand-sub{display:none}
  .nav{flex-direction:column;align-items:stretch;justify-content:flex-start;
       top:0;bottom:0;left:0;right:auto;width:212px;max-width:212px;height:auto;margin:0;
       border-top:none;border-right:1px solid var(--line);background:var(--panel);
       backdrop-filter:none;padding:20px 12px 24px;gap:3px}
  .nav::before{content:'🔑  Stängningen';order:-2;font-family:Georgia,serif;font-size:18px;
       color:var(--ink);letter-spacing:.03em;padding:6px 12px 4px;display:block}
  .nav::after{content:'Stäng nedervåningen för natten';order:-1;font-size:11px;color:var(--muted);
       padding:0 12px 16px;display:block;line-height:1.4}
  .nav button{flex:0 0 auto;display:flex;align-items:center;gap:11px;text-align:left;
       font-size:14px;padding:11px 12px;border-radius:12px;color:var(--muted)}
  .nav button span{display:inline;margin:0;font-size:17px}
  .nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .scene{left:212px}
  .scene-inner{max-width:420px}
}
</style>
</head>
<body>
<div class="app">
  <h1 class="brand">Stängningen</h1>
  <div class="brand-sub">Stäng nedervåningen för natten</div>

  <!-- STÄNG -->
  <div class="view active" id="view-close">
    <div id="rpills"></div>
    <div id="close-body"></div>
  </div>

  <!-- HISTORIK -->
  <div class="view" id="view-hist">
    <div class="page-h">Historik</div>
    <div class="page-sub">Varje kväll du stänger ner räknas.</div>
    <div id="hist-body"></div>
  </div>

  <!-- STATIONER -->
  <div class="view" id="view-edit">
    <div class="page-h">Stationer</div>
    <div class="page-sub">Bygg ditt eget stängningsschema. Lägg till stationer och punkter precis som du vill ha dem.</div>
    <div id="edit-body"></div>
  </div>

  <!-- INSTÄLLNINGAR -->
  <div class="view" id="view-set">
    <div class="page-h">Inställningar</div>
    <div class="page-sub"></div>
    <div id="set-body"></div>
  </div>

  <!-- INFO -->
  <div class="view" id="view-info">
    <div class="page-h">Nyheter & funktioner</div>
    <div class="page-sub" id="info-tag"></div>
    <div id="info-body"></div>
  </div>
</div>

<div class="nav">
  <button class="active" data-v="close"><span>🔑</span>Stäng</button>
  <button data-v="hist"><span>📅</span>Historik</button>
  <button data-v="edit"><span>🧰</span>Stationer</button>
  <button data-v="set"><span>⚙️</span>Inställn.</button>
  <button data-v="info"><span>✨</span>Info</button>
</div>

<div class="scene" id="scene">
  <div class="scene-inner">
    <div class="lockwrap">
      <div class="glow"></div>
      <svg class="locksvg" viewBox="0 0 120 150" width="130" height="150">
        <g class="shackle"><path d="M36 66 V46 a24 24 0 0 1 48 0 V66" fill="none" stroke="var(--accent)" stroke-width="12" stroke-linecap="round"/></g>
        <rect x="26" y="62" width="68" height="64" rx="15" fill="var(--accent)"/>
        <circle cx="60" cy="88" r="8" fill="var(--bg)"/>
        <path d="M56 94 h8 l3 20 h-14 z" fill="var(--bg)"/>
      </svg>
    </div>
    <div class="scene-title">Nedervåningen är stängd</div>
    <div class="scene-sub" id="scene-sub"></div>
    <div class="scene-quote" id="scene-quote"></div>
    <div class="scene-btns">
      <button class="btn fill big" onclick="goUp()">Gå upp ↑</button>
      <button class="btn ghost" onclick="reopen()">Öppna igen</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ============ Stängningen v1.0.0 ============ */
var APPINFO={
  version:'1.0.0',
  tagline:'Stäng nedervåningen för natten – som att stänga en restaurang.',
  audience:'Du som vill avsluta arbetsdagen på nedervåningen i lugn och ro innan du går upp till ledigheten.',
  functions:[
    {area:'Kvällsstängning',items:['Bocka av stationer som ett stängningsschema','Egna stationer och punkter','Progress och stängningsritual när allt är klart','Nollställs automatiskt varje ny dag']},
    {area:'Imorgon',items:['De tre viktigaste sakerna att ta tag i','Kopplas automatiskt till checklistan']},
    {area:'Historik',items:['Antal kvällar i rad','Månadsöversikt med prickar','Logg över stängningar med tid']},
    {area:'Övrigt',items:['Flera rutiner (t.ex. över- och nedervåningen)','Teman och färgskinn','Valfri AI-hjälp som putsar dina anteckningar','Molnsynk via GitHub']}
  ],
  changelog:[
    {v:'1.0.0',d:'2026-06-28',items:['Första version','Kvällsstängning för nedervåningen med stationer','Tre-saker-till-imorgon kopplat till checklistan','Stängningsritual med låsanimation','Historik, kvällar-i-rad och månadsprickar','Stationsredigerare och stöd för flera rutiner','Teman, skinn, valfri AI-hjälp och GitHub-synk']}
  ]
};
var CENTRALEN_META={
  id:'stangningen', namn:'Stängningen', ikon:'🔑',
  desc:'Kvällsstängning för nedervåningen – som att stänga en restaurang',
  mobil:'stangningen.html',
  desktop:'stangningen-desktop.html',
  farger:{bg:'#F7F2EA',line:'#E4D9C6',ink:'#3A322A',muted:'#8C8170',accent:'#B07D3C',iconbg:'#F0E2CB'}
};

var KEY='stangningen_v1';
var SYNC_KEY='stangningen_sync_v1';
var SYNC_FILE='stangningen.json';
var AIKEYS={claude:'stangningen_ai_claude',openai:'stangningen_ai_openai'};

/* ---- hjälp ---- */
function uid(){return 'id'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pad2(n){return (n<10?'0':'')+n;}
function todayKey(d){d=d||new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function clockOf(iso){if(!iso)return '';var d=new Date(iso);return pad2(d.getHours())+':'+pad2(d.getMinutes());}
var MONTHS=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
var WD=['M','T','O','T','F','L','S'];
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('on');},2000);}

/* ---- seed ---- */
function seedRoutine(){
  return {id:'r_ned',namn:'Nedervåningen',ikon:'🔑',stations:[
    {id:uid(),namn:'Köket',ikon:'🍳',items:[
      {id:uid(),txt:'Disken tagen, bänken tom'},
      {id:uid(),txt:'Matlåda klar till imorgon'},
      {id:uid(),txt:'Diskmaskinen igång eller tömd'},
      {id:uid(),txt:'Soporna utslängda'}]},
    {id:uid(),namn:'Katterna',ikon:'🐈',items:[
      {id:uid(),txt:'Kattlådorna rena'},
      {id:uid(),txt:'Mat & vatten påfyllt'}]},
    {id:uid(),namn:'Ytor & ordning',ikon:'🧹',items:[
      {id:uid(),txt:'Bänkar avtorkade'},
      {id:uid(),txt:'Allt på sin plats'}]},
    {id:uid(),namn:'Imorgon',ikon:'📝',items:[
      {id:uid(),txt:'De tre viktigaste sakerna nedskrivna',auto:'three'},
      {id:uid(),txt:'Väska & kläder framplockade'}]},
    {id:uid(),namn:'Lås & ljus',ikon:'🔑',items:[
      {id:uid(),txt:'Ytterdörren låst'},
      {id:uid(),txt:'Lamporna släckta'}]}
  ]};
}

/* ---- state ---- */
var state={routines:[],active:'',days:{},set:{theme:'auto',skin:'amber',sound:true,ai:false,aiProvider:'claude'}};
function load(){
  try{var s=localStorage.getItem(KEY);if(s){var p=JSON.parse(s);
    state.routines=p.routines||[];state.active=p.active||'';state.days=p.days||{};
    state.set=Object.assign({theme:'auto',skin:'amber',sound:true,ai:false,aiProvider:'claude'},p.set||{});}}catch(e){}
  if(!state.routines.length)state.routines=[seedRoutine()];
  if(!state.active||!routineById(state.active))state.active=state.routines[0].id;
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}schedulePush();}

function routineById(id){for(var i=0;i<state.routines.length;i++)if(state.routines[i].id===id)return state.routines[i];return null;}
function activeRoutine(){return routineById(state.active)||state.routines[0];}
function dayRec(dk,rid){dk=dk||todayKey();rid=rid||state.active;
  if(!state.days[dk])state.days[dk]={};
  if(!state.days[dk][rid])state.days[dk][rid]={checks:{},three:['','',''],done:false,closedAt:''};
  return state.days[dk][rid];}
function flatItems(r){var a=[];(r.stations||[]).forEach(function(st){(st.items||[]).forEach(function(it){a.push(it);});});return a;}
function threeFilled(rec){return (rec.three||[]).some(function(t){return t&&t.trim();});}
function itemDone(it,rec){if(it.auto==='three')return threeFilled(rec);return !!rec.checks[it.id];}
function progress(r,rec){var all=flatItems(r),done=0;all.forEach(function(it){if(itemDone(it,rec))done++;});return {done:done,total:all.length};}
function streak(rid){var n=0,d=new Date();for(var i=0;i<400;i++){var dk=todayKey(d);var r=state.days[dk]&&state.days[dk][rid];if(r&&r.done){n++;}else{if(i===0){/* idag ej klar – fortsätt bakåt */}else break;}d.setDate(d.getDate()-1);}return n;}

/* ============ STÄNG-vy ============ */
function renderPills(){
  var el=document.getElementById('rpills');
  if(state.routines.length<2){el.innerHTML='';return;}
  el.className='rpills';
  el.innerHTML=state.routines.map(function(r){
    return '<div class="rpill'+(r.id===state.active?' on':'')+'" onclick="setActive(\''+r.id+'\')">'+esc(r.ikon)+' '+esc(r.namn)+'</div>';
  }).join('');
}
function setActive(id){state.active=id;save();renderClose();renderPills();}

function renderClose(){
  var r=activeRoutine(),rec=dayRec(),body=document.getElementById('close-body');
  var p=progress(r,rec);
  if(rec.done){
    var st=streak(state.active);
    body.innerHTML='<div class="card-panel rest">'
      +'<div class="ri">'+esc(r.ikon)+'</div>'
      +'<div class="rt">'+esc(r.namn)+' är stängd</div>'
      +'<div class="rs">Stängt '+clockOf(rec.closedAt)+(st>1?' · '+st+' kvällar i rad':'')+'</div>'
      +'<div class="rq">Allt är gjort för ikväll. Gå upp och var ledig – jobbet väntar imorgon.</div>'
      +'<button class="btn ghost" onclick="reopen()">Öppna igen</button>'
      +'</div>';
    return;
  }
  var html='';
  var ready=p.total>0&&p.done>=p.total;
  html+='<div class="prog'+(ready?' ready':'')+'">'
    +'<div class="pbig">'+p.done+' / '+p.total+'</div>'
    +'<div class="plab">'+(ready?'allt klart – dags att stänga':'avbockat')+'</div>'
    +'<div class="ptrack"><div class="pfill" style="width:'+(p.total?Math.round(p.done/p.total*100):0)+'%"></div></div>'
    +(ready?'<div class="gostrip"><button class="btn fill big" onclick="closeDown()">Stäng nedervåningen 🔑</button></div>':'')
    +'</div>';
  /* tre saker */
  html+='<div class="card-panel three" id="threecard">'
    +'<div class="tt">Tre saker till imorgon</div>'
    +'<div class="ts">Det viktigaste att ta tag i på nedervåningen imorgon. Skriv av dig så slipper du bära det med dig upp.</div>';
  for(var i=0;i<3;i++){
    html+='<div class="trow"><div class="tnum">'+(i+1)+'</div>'
      +'<input id="three'+i+'" value="'+esc(rec.three[i]||'')+'" placeholder="…" oninput="setThree('+i+',this.value)"></div>';
  }
  if(threeFilled(rec))html+='<div class="tdone">✓ Noterat</div>';
  if(state.set.ai&&getAiKey())html+='<div style="margin-top:10px"><button class="btn ghost" onclick="aiTidy()">✦ Putsa till med AI</button></div>';
  html+='</div>';
  /* stationer */
  (r.stations||[]).forEach(function(st){
    var sc=0;(st.items||[]).forEach(function(it){if(itemDone(it,rec))sc++;});
    html+='<div class="station"><div class="sthead"><span class="si">'+esc(st.ikon||'•')+'</span>'
      +'<span class="sn">'+esc(st.namn)+'</span><span class="sc">'+sc+'/'+st.items.length+'</span></div>'
      +'<div class="items">';
    (st.items||[]).forEach(function(it){
      var on=itemDone(it,rec);
      if(it.auto==='three'){
        html+='<div class="item auto'+(on?' on':'')+'" onclick="focusThree()">'
          +'<div class="chk">'+(on?'✓':'')+'</div>'
          +'<div><div class="itx">'+esc(it.txt)+'</div><div class="ihint">fylls i automatiskt ovan</div></div></div>';
      }else{
        html+='<div class="item'+(on?' on':'')+'" onclick="toggleItem(\''+it.id+'\')">'
          +'<div class="chk">'+(on?'✓':'')+'</div><div class="itx">'+esc(it.txt)+'</div></div>';
      }
    });
    html+='</div></div>';
  });
  body.innerHTML=html;
}
function setThree(i,v){var rec=dayRec();rec.three[i]=v;save();
  /* uppdatera kopplad bock & progress utan att tappa fokus */
  refreshProgressLive();}
function refreshProgressLive(){
  var r=activeRoutine(),rec=dayRec(),p=progress(r,rec),ready=p.total>0&&p.done>=p.total;
  var prog=document.querySelector('#close-body .prog');
  if(prog){prog.querySelector('.pbig').textContent=p.done+' / '+p.total;
    prog.querySelector('.pfill').style.width=(p.total?Math.round(p.done/p.total*100):0)+'%';
    prog.querySelector('.plab').textContent=ready?'allt klart – dags att stänga':'avbockat';
    prog.classList.toggle('ready',ready);
    var strip=prog.querySelector('.gostrip');
    if(ready&&!strip){var dv=document.createElement('div');dv.className='gostrip';dv.innerHTML='<button class="btn fill big" onclick="closeDown()">Stäng nedervåningen 🔑</button>';prog.appendChild(dv);}
    if(!ready&&strip)strip.remove();
  }
  /* uppdatera auto-item bock i Imorgon-stationen */
  document.querySelectorAll('#close-body .item.auto').forEach(function(el){
    var on=threeFilled(rec);el.classList.toggle('on',on);el.querySelector('.chk').textContent=on?'✓':'';
  });
  /* uppdatera stationsräknare */
  syncStationCounts();
}
function toggleItem(id){var rec=dayRec();rec.checks[id]=!rec.checks[id];save();
  var r=activeRoutine(),p=progress(r,rec);
  /* visuell uppdatering */
  var el=document.querySelector('#close-body .item[onclick*="'+id+'"]');
  if(el){var on=!!rec.checks[id];el.classList.toggle('on',on);el.querySelector('.chk').textContent=on?'✓':'';}
  refreshProgressLive();
}
function syncStationCounts(){
  var r=activeRoutine(),rec=dayRec();
  var stations=document.querySelectorAll('#close-body .station');
  (r.stations||[]).forEach(function(st,idx){
    if(!stations[idx])return;var sc=0;(st.items||[]).forEach(function(it){if(itemDone(it,rec))sc++;});
    var c=stations[idx].querySelector('.sc');if(c)c.textContent=sc+'/'+st.items.length;
  });
}
function focusThree(){var c=document.getElementById('threecard');if(c)c.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(function(){for(var i=0;i<3;i++){var inp=document.getElementById('three'+i);if(inp&&!inp.value){inp.focus();break;}}},350);}

/* ---- stängningsritual ---- */
function closeDown(){
  var rec=dayRec();rec.done=true;rec.closedAt=new Date().toISOString();save();
  var st=streak(state.active);
  var sub='Stängt '+clockOf(rec.closedAt);
  if(st>1)sub+=' · '+st+' kvällar i rad';
  else sub+=' · första kvällen';
  document.getElementById('scene-sub').textContent=sub;
  document.getElementById('scene-quote').textContent='';
  document.getElementById('scene').classList.add('on');
  chime();
  if(state.set.ai&&getAiKey())aiGoodnight();
}
function reopen(){var rec=dayRec();rec.done=false;rec.closedAt='';save();document.getElementById('scene').classList.remove('on');switchView('close');renderClose();}
function goUp(){document.getElementById('scene').classList.remove('on');renderClose();toast('God kväll – övervåningen väntar 🌙');}

function chime(){
  if(!state.set.sound)return;
  try{var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;var ac=new AC();
    [0,0.16].forEach(function(t,k){var o=ac.createOscillator(),g=ac.createGain();o.type='sine';
      o.frequency.value=k===0?523.25:392;o.connect(g);g.connect(ac.destination);
      var s=ac.currentTime+t;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.18,s+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,s+0.5);o.start(s);o.stop(s+0.5);});
  }catch(e){}
}

/* ============ HISTORIK ============ */
function renderHist(){
  var rid=state.active,body=document.getElementById('hist-body');
  var st=streak(rid);
  var total=0;for(var dk in state.days){if(state.days[dk][rid]&&state.days[dk][rid].done)total++;}
  var html='<div class="card-panel streak"><div class="se">'+(st>0?'🔥':'🌙')+'</div>'
    +'<div class="sbig">'+st+'</div><div class="slab">'+(st===1?'kväll i rad':'kvällar i rad')+'</div></div>';
  /* månad */
  var now=new Date(),y=now.getFullYear(),m=now.getMonth();
  var first=new Date(y,m,1),start=(first.getDay()+6)%7,dim=new Date(y,m+1,0).getDate();
  html+='<div class="section-title">'+monthName(m)+' '+y+'</div><div class="card-panel">';
  html+='<div class="mdots">'+WD.map(function(d){return '<div class="mdc">'+d+'</div>';}).join('');
  for(var b=0;b<start;b++)html+='<div class="md empty"></div>';
  var tk=todayKey();
  for(var day=1;day<=dim;day++){
    var dk2=y+'-'+pad2(m+1)+'-'+pad2(day);
    var done=state.days[dk2]&&state.days[dk2][rid]&&state.days[dk2][rid].done;
    html+='<div class="md'+(done?' done':'')+(dk2===tk?' today':'')+'">'+day+'</div>';
  }
  html+='</div></div>';
  /* logg */
  var rows=[];for(var dk3 in state.days){var rr=state.days[dk3][rid];if(rr&&rr.done)rows.push({dk:dk3,rec:rr});}
  rows.sort(function(a,b){return a.dk<b.dk?1:-1;});
  html+='<div class="section-title">Senaste stängningar</div>';
  if(!rows.length){html+='<div class="empty-msg">Inga stängningar än. Bocka av kvällens lista så dyker den upp här.</div>';}
  else{html+='<div class="card-panel">';
    rows.slice(0,40).forEach(function(o){
      var d=new Date(o.dk+'T00:00:00');var r=activeRoutine();var p=progress(r,o.rec);
      html+='<div class="hrow"><div class="hd">'+d.getDate()+'<div style="font-size:10px;color:var(--muted)">'+monthName(d.getMonth())+'</div></div>'
        +'<div class="hm">'+esc(weekdayName(d))+'<div class="hsub">'+p.total+' punkter avklarade</div></div>'
        +'<div class="ht">'+clockOf(o.rec.closedAt)+'</div></div>';
    });
    html+='</div>';
    html+='<div class="soft" style="text-align:center;margin-top:10px">'+total+' stängningar totalt</div>';
  }
  body.innerHTML=html;
}
function monthName(m){return ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'][m];}
function weekdayName(d){return ['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'][d.getDay()];}

/* ============ STATIONER (redigerare) ============ */
function renderEdit(){
  var r=activeRoutine(),body=document.getElementById('edit-body'),html='';
  /* rutinval */
  if(state.routines.length>1){
    html+='<div id="rpills2"></div>';
  }
  html+='<div class="card-panel"><label>Rutinens namn</label>'
    +'<div style="display:flex;gap:8px"><input style="width:54px;text-align:center" maxlength="2" value="'+esc(r.ikon)+'" onchange="rRename(\'ikon\',this.value)">'
    +'<input value="'+esc(r.namn)+'" onchange="rRename(\'namn\',this.value)"></div></div>';

  (r.stations||[]).forEach(function(st,i){
    html+='<div class="ed-st"><div class="ed-sh">'
      +'<input class="ico" maxlength="2" value="'+esc(st.ikon||'')+'" onchange="stEdit(\''+st.id+'\',\'ikon\',this.value)">'
      +'<input class="nm" value="'+esc(st.namn)+'" onchange="stEdit(\''+st.id+'\',\'namn\',this.value)">'
      +'<button class="mvbtn" onclick="stMove(\''+st.id+'\',-1)"'+(i===0?' disabled style="opacity:.3"':'')+'>↑</button>'

      +'</div>';

      var locked=it.auto?' disabled':'';
      html+='<div class="ed-it"><input value="'+esc(it.txt)+'"'+locked+' onchange="itEdit(\''+st.id+'\',\''+it.id+'\',this.value)">'
        +(it.auto?'<span class="sbadge" title="kopplad till tre saker">✦</span>':'<button class="xbtn" onclick="itDel(\''+st.id+'\',\''+it.id+'\')">×</button>')+'</div>';
    });
    html+='<div class="ed-foot"><button class="btn ghost" onclick="itAdd(\''+st.id+'\')">+ Punkt</button>'
      +'<button class="btn ghost danger" onclick="stDel(\''+st.id+'\')">Ta bort station</button></div>';
    html+='</div>';
  });
  html+='<button class="btn big" onclick="stAdd()">+ Ny station</button>';
  html+='<div class="section-title">Rutiner</div>';
  html+='<div class="card-panel"><div class="soft">Nedervåningen är vardagsjobbet. Vill du också stänga övervåningen på morgonen kan du lägga till en till rutin.</div>'
    +'<div class="btn-row" style="margin-top:10px"><button class="btn" onclick="rAdd()">+ Ny rutin</button>'
    +(state.routines.length>1?'<button class="btn danger" onclick="rDel()">Ta bort denna</button>':'')+'</div></div>';
  body.innerHTML=html;
  if(state.routines.length>1){
    var el=document.getElementById('rpills2');el.className='rpills';

  }

function setActiveEdit(id){state.active=id;save();renderEdit();}
function rRename(f,v){activeRoutine()[f]=v.trim()||(f==='ikon'?'🔑':'Rutin');save();renderEdit();renderPills();}
function stEdit(sid,f,v){var st=stById(sid);if(st){st[f]=v.trim()||(f==='ikon'?'•':'Station');save();}}
function stById(id){var r=activeRoutine();for(var i=0;i<r.stations.length;i++)if(r.stations[i].id===id)return r.stations[i];return null;}
function stMove(id,dir){var r=activeRoutine(),arr=r.stations;for(var i=0;i<arr.length;i++){if(arr[i].id===id){var j=i+dir;if(j<0||j>=arr.length)return;var t=arr[i];arr[i]=arr[j];arr[j]=t;break;}}save();renderEdit();}
function stAdd(){activeRoutine().stations.push({id:uid(),namn:'Ny station',ikon:'•',items:[{id:uid(),txt:'Ny punkt'}]});save();renderEdit();}
function stDel(id){if(!confirm('Ta bort stationen?'))return;var r=activeRoutine();r.stations=r.stations.filter(function(s){return s.id!==id;});save();renderEdit();}
function itEdit(sid,iid,v){var st=stById(sid);if(!st)return;st.items.forEach(function(it){if(it.id===iid)it.txt=v.trim()||'Punkt';});save();}
function itAdd(sid){var st=stById(sid);if(!st)return;st.items.push({id:uid(),txt:'Ny punkt'});save();renderEdit();}
function itDel(sid,iid){var st=stById(sid);if(!st)return;st.items=st.items.filter(function(it){return it.id!==iid;});save();renderEdit();}
function rAdd(){var nid='r_'+uid();state.routines.push({id:nid,namn:'Övervåningen',ikon:'🌙',stations:[{id:uid(),namn:'Avsluta',ikon:'🛋️',items:[{id:uid(),txt:'Släck och städa undan'}]}]});state.active=nid;save();renderEdit();renderPills();}
function rDel(){if(state.routines.length<2)return;if(!confirm('Ta bort hela rutinen och dess historik?'))return;var id=state.active;state.routines=state.routines.filter(function(r){return r.id!==id;});for(var dk in state.days){if(state.days[dk][id])delete state.days[dk][id];}state.active=state.routines[0].id;save();renderEdit();renderPills();}

/* ============ INSTÄLLNINGAR ============ */
var sync={owner:'',repo:'',token:'',sha:null};
function loadSync(){try{var s=localStorage.getItem(SYNC_KEY);if(s){var d=JSON.parse(s);sync.owner=d.owner||'';sync.repo=d.repo||'';sync.token=d.token||'';}}catch(e){}}
function saveSync(){try{localStorage.setItem(SYNC_KEY,JSON.stringify({owner:sync.owner,repo:sync.repo,token:sync.token}));}catch(e){}}
function getAiKey(p){p=p||state.set.aiProvider;try{return localStorage.getItem(AIKEYS[p])||'';}catch(e){return '';}}
function setAiKey(p,k){try{if(k)localStorage.setItem(AIKEYS[p],k);else localStorage.removeItem(AIKEYS[p]);}catch(e){}}

function renderSet(){
  var b=document.getElementById('set-body'),s=state.set,html='';
  html+='<div class="card-panel"><label>Utseende</label><div class="seg">'
    +['auto','light','dark'].map(function(t){var lbl={auto:'Auto',light:'Ljust',dark:'Mörkt'}[t];return '<button class="'+(s.theme===t?'on':'')+'" onclick="setTheme(\''+t+'\')">'+lbl+'</button>';}).join('')
    +'</div><label style="margin-top:14px">Färgskinn</label><div class="skins">'
    +[['amber','#B07D3C','Amber'],['plommon','#7C5A93','Plommon'],['salvia','#5E7B62','Salvia'],['natt','#4F6CA0','Natt']].map(function(k){
      return '<div class="skin'+(s.skin===k[0]?' on':'')+'" style="background:'+k[1]+'" onclick="setSkin(\''+k[0]+'\')">'+k[2]+'</div>';}).join('')
    +'</div></div>';

  html+='<div class="card-panel"><div class="toggle"><span class="tl">Ljud vid stängning</span><div class="tg'+(s.sound?' on':'')+'" onclick="togSound()"></div></div></div>';

  /* AI */
  html+='<div class="card-panel"><div class="toggle"><span class="tl">AI-hjälp</span><div class="tg'+(s.ai?' on':'')+'" onclick="togAi()"></div></div>'
    +'<div class="soft">Putsar dina tre saker till tydliga uppgifter och ger en lugn kvällshälsning när du stänger.</div>';
  if(s.ai){
    html+='<label>Leverantör</label><div class="seg"><button class="'+(s.aiProvider==='claude'?'on':'')+'" onclick="setProv(\'claude\')">Claude</button><button class="'+(s.aiProvider==='openai'?'on':'')+'" onclick="setProv(\'openai\')">ChatGPT</button></div>'
      +'<label>API-nyckel ('+(s.aiProvider==='claude'?'Anthropic':'OpenAI')+')</label>'
      +'<div style="display:flex;gap:8px"><input id="aikey" type="password" placeholder="'+(getAiKey()?'••••••••':'sk-…')+'" value=""><button class="btn" onclick="saveAiKey()">Spara</button></div>'
      +'<div class="soft" style="margin-top:6px">Nyckeln sparas bara lokalt på den här enheten.</div>';
  }
  html+='</div>';

  /* Synk */
  loadSync();
  html+='<div class="card-panel"><label>Molnsynk (GitHub)</label>'
    +'<input id="sy-owner" placeholder="GitHub-användare" value="'+esc(sync.owner)+'" style="margin-bottom:7px">'
    +'<input id="sy-repo" placeholder="Privat repo (t.ex. app-synk)" value="'+esc(sync.repo)+'" style="margin-bottom:7px">'
    +'<input id="sy-token" type="password" placeholder="'+(sync.token?'••••••••':'Fine-grained PAT')+'" value="" style="margin-bottom:7px">'
    +'<div class="btn-row"><button class="btn" onclick="syncSave()">Spara</button><button class="btn" onclick="ghPull(true)">Hämta nu</button><button class="btn fill" onclick="ghPush(true)">Spara till moln</button></div>'
    +'<div style="margin-top:9px;text-align:center"><span class="sbadge" id="sy-badge">Ej kopplad</span></div>'
    +'<div class="soft" style="margin-top:6px">Filen <b>'+SYNC_FILE+'</b> sparas i ditt privata repo. Token lagras bara lokalt.</div></div>';

  /* Data */
  html+='<div class="card-panel"><label>Data</label>'
    +'<div class="btn-row" style="margin-bottom:8px"><button class="btn ghost" onclick="exportData()">Exportera</button><button class="btn ghost" onclick="document.getElementById(\'impf\').click()">Importera</button></div>'
    +'<input id="impf" type="file" accept="application/json" style="display:none" onchange="importData(this)">'
    +'<button class="btn ghost danger" style="width:100%;margin-top:4px" onclick="resetToday()">Nollställ kvällens lista</button></div>';

  html+='<div class="soft" style="text-align:center;margin-top:4px">Stängningen v'+APPINFO.version+'</div>';
  b.innerHTML=html;
  updateSyncBadge();
}
function setTheme(t){state.set.theme=t;save();applyTheme();renderSet();}
function setSkin(k){state.set.skin=k;save();applyTheme();renderSet();}
function togSound(){state.set.sound=!state.set.sound;save();renderSet();}
function togAi(){state.set.ai=!state.set.ai;save();renderSet();}
function setProv(p){state.set.aiProvider=p;save();renderSet();}
function saveAiKey(){var v=document.getElementById('aikey').value.trim();if(v){setAiKey(state.set.aiProvider,v);toast('Nyckel sparad');}renderSet();}
function syncSave(){sync.owner=document.getElementById('sy-owner').value.trim();sync.repo=document.getElementById('sy-repo').value.trim();var t=document.getElementById('sy-token').value.trim();if(t)sync.token=t;saveSync();toast('Synk sparad');updateSyncBadge();}
function resetToday(){if(!confirm('Nollställ kvällens lista?'))return;var dk=todayKey();if(state.days[dk]&&state.days[dk][state.active])delete state.days[dk][state.active];save();toast('Nollställd');switchView('close');renderClose();}
function exportData(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='stangningen-backup-'+todayKey()+'.json';a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},1000);}
function importData(inp){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var p=JSON.parse(rd.result);if(p.routines){state.routines=p.routines;state.active=p.active||state.routines[0].id;state.days=p.days||{};if(p.set)state.set=Object.assign(state.set,p.set);save();applyTheme();toast('Importerad');switchView('close');renderClose();renderPills();}}catch(e){toast('Kunde inte läsa filen');}};rd.readAsText(f);}

/* ============ TEMA ============ */
function applyTheme(){
  var h=document.documentElement,s=state.set;
  if(s.theme==='dark')h.setAttribute('data-theme','dark');
  else if(s.theme==='light')h.removeAttribute('data-theme');
  else{if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)h.setAttribute('data-theme','dark');else h.removeAttribute('data-theme');}
  if(s.skin&&s.skin!=='amber')h.setAttribute('data-skin',s.skin);else h.removeAttribute('data-skin');
  var dark=h.getAttribute('data-theme')==='dark';
  var mt=document.querySelector('meta[name=theme-color]');if(mt)mt.setAttribute('content',dark?'#171310':'#F7F2EA');
}

/* ============ AI ============ */
function callAI(messages,sys,cb){
  var prov=state.set.aiProvider,key=getAiKey(prov);if(!key){cb(null);return;}
  if(prov==='claude'){
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,system:sys||'',messages:messages})})
    .then(function(r){return r.json();}).then(function(d){var t='';if(d.content)d.content.forEach(function(c){if(c.type==='text')t+=c.text;});cb(t||null);}).catch(function(){cb(null);});
  }else{
    var m=[{role:'system',content:sys||''}].concat(messages);
    fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:400,messages:m})})
    .then(function(r){return r.json();}).then(function(d){cb((d.choices&&d.choices[0]&&d.choices[0].message.content)||null);}).catch(function(){cb(null);});
  }
}
function aiTidy(){
  var rec=dayRec();var notes=rec.three.filter(function(t){return t&&t.trim();});
  if(!notes.length){toast('Skriv något först');return;}
  toast('Putsar…');
  callAI([{role:'user',content:'Skriv om dessa anteckningar till korta, tydliga uppgifter på svenska. Svara ENBART med en JSON-array av strängar, inget annat.\n'+JSON.stringify(notes)}],
    'Du hjälper till att formulera korta konkreta uppgifter. Bara JSON-array, max tre korta rader.',
    function(t){if(!t){toast('AI svarade inte');return;}
      try{var fence=String.fromCharCode(96);var clean=t.split(fence).join('').trim();if(clean.slice(0,4).toLowerCase()==='json')clean=clean.slice(4).trim();var arr=JSON.parse(clean);if(Array.isArray(arr)){for(var i=0;i<3;i++)rec.three[i]=arr[i]||'';save();renderClose();toast('Putsat ✦');}}catch(e){toast('Kunde inte tolka svaret');}});
}
function aiGoodnight(){
  var rec=dayRec();var notes=rec.three.filter(function(t){return t&&t.trim();});
  callAI([{role:'user',content:'Jag har precis stängt ner nedervåningen för kvällen. Imorgon ska jag: '+(notes.join('; ')||'inget särskilt')+'. Ge en kort lugn kvällshälsning på svenska, max 20 ord.'}],
    'Du ger en varm, kort kvällshälsning på svenska. Max 20 ord. Ingen emoji-spam.',
    function(t){if(t)document.getElementById('scene-quote').textContent='”'+t.trim().replace(/^["”]|["”]$/g,'')+'”';});
}

/* ============ SYNK (GitHub) ============ */
function ghHeaders(){return {'Authorization':'Bearer '+sync.token,'Accept':'application/vnd.github+json'};}
function b64enc(s){return btoa(unescape(encodeURIComponent(s)));}
function b64dec(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))));}
function syncReady(){return sync.owner&&sync.repo&&sync.token;}
function syncPayload(){return JSON.stringify({routines:state.routines,active:state.active,days:state.days,_t:new Date().toISOString()});}
function setBadge(txt,cls){var b=document.getElementById('sy-badge');if(b){b.textContent=txt;b.className='sbadge'+(cls?' '+cls:'');}}
function updateSyncBadge(){if(!document.getElementById('sy-badge'))return;loadSync();setBadge(syncReady()?'Kopplad':'Ej kopplad',syncReady()?'ok':'');}

function ghGet(cb){
  if(!syncReady()){cb(null,null);return;}
  fetch('https://api.github.com/repos/'+sync.owner+'/'+sync.repo+'/contents/'+SYNC_FILE,{headers:ghHeaders(),cache:'no-store'})
  .then(function(r){if(r.status===404){sync.sha=null;cb(null,null);return null;}return r.json();})
  .then(function(d){if(!d)return;if(d.sha){sync.sha=d.sha;try{cb(JSON.parse(b64dec(d.content)),d.sha);}catch(e){cb(null,d.sha);}}else{cb(null,null);}})
  .catch(function(){cb(null,null);});
}
function mergeRoutines(local,remote){var byId={};(local||[]).forEach(function(r){byId[r.id]=r;});var order=(local||[]).map(function(r){return r.id;});(remote||[]).forEach(function(r){if(!byId[r.id]){byId[r.id]=r;order.push(r.id);}});return order.map(function(id){return byId[id];});}
function mergeDays(local,remote){var out=JSON.parse(JSON.stringify(local||{}));for(var dk in remote){if(!out[dk]){out[dk]=remote[dk];continue;}for(var rid in remote[dk]){var r=remote[dk][rid],l=out[dk][rid];if(!l){out[dk][rid]=r;continue;}var checks=Object.assign({},l.checks||{});for(var k in (r.checks||{}))if(r.checks[k])checks[k]=true;var lf=(l.three||[]).filter(function(x){return x&&x.trim();}).length,rf=(r.three||[]).filter(function(x){return x&&x.trim();}).length;var three=lf>=rf?(l.three||['','','']):(r.three||['','','']);var closedAt=[l.closedAt,r.closedAt].filter(Boolean).sort();out[dk][rid]={checks:checks,three:three,done:!!(l.done||r.done),closedAt:closedAt.length?closedAt[closedAt.length-1]:''};}}return out;}
function applyRemote(rem){if(!rem)return;state.routines=mergeRoutines(state.routines,rem.routines);state.days=mergeDays(state.days,rem.days);if(rem.active&&!routineById(state.active))state.active=rem.active;if(!routineById(state.active))state.active=state.routines[0].id;}

function ghPull(manual){
  if(!syncReady()){if(manual)toast('Fyll i synk-uppgifter först');return;}
  setBadge('Hämtar…');
  ghGet(function(rem){if(rem){applyRemote(rem);try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}setBadge('Synkad','ok');renderActive();renderPills();if(manual)toast('Hämtat från moln');}else{setBadge(syncReady()?'Kopplad':'Ej kopplad',syncReady()?'ok':'');if(manual)toast('Inget i molnet än');}});
}
var _pushT=null;
function schedulePush(){if(!syncReady())return;clearTimeout(_pushT);_pushT=setTimeout(function(){ghPush(false);},1500);}
function ghPush(manual){
  if(!syncReady()){if(manual)toast('Fyll i synk-uppgifter först');return;}
  setBadge('Sparar…');
  ghGet(function(rem,sha){
    if(rem)applyRemote(rem);
    try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}
    var body={message:'stangningen '+new Date().toISOString(),content:b64enc(syncPayload())};
    if(sync.sha)body.sha=sync.sha;
    fetch('https://api.github.com/repos/'+sync.owner+'/'+sync.repo+'/contents/'+SYNC_FILE,{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)})
    .then(function(r){if(r.status===409||r.status===422){ghGet(function(){ghPush(manual);});return null;}return r.json();})
    .then(function(d){if(!d)return;if(d.content&&d.content.sha){sync.sha=d.content.sha;setBadge('Synkad','ok');if(manual)toast('Sparat till moln');}else{setBadge('Synkfel','err');}})
    .catch(function(){setBadge('Synkfel','err');});
  });
}

/* ============ INFO ============ */
function renderInfo(){
  document.getElementById('info-tag').textContent=APPINFO.tagline;
  var html='<div class="card-panel">';
  APPINFO.functions.forEach(function(f){html+='<div class="fn-area">'+esc(f.area)+'</div>';f.items.forEach(function(it){html+='<div class="fn-li">'+esc(it)+'</div>';});});
  html+='</div><div class="section-title">Uppdateringar</div><div class="card-panel">';
  APPINFO.changelog.forEach(function(c){html+='<div class="cl-v">v'+esc(c.v)+'</div><div class="cl-d">'+esc(c.d)+'</div>';c.items.forEach(function(it){html+='<div class="fn-li">'+esc(it)+'</div>';});});

}

/* ============ NAV ============ */
function renderActive(){var av=document.querySelector('.view.active');if(!av)return;var id=av.id.replace('view-','');renderFor(id);}
function renderFor(v){if(v==='close'){renderPills();renderClose();}else if(v==='hist')renderHist();else if(v==='edit')renderEdit();else if(v==='set')renderSet();else if(v==='info')renderInfo();}
function switchView(v){
  document.querySelectorAll('.view').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.nav button').forEach(function(x){x.classList.remove('active');});
  var view=document.getElementById('view-'+v);if(view)view.classList.add('active');
  var b=document.querySelector('.nav button[data-v="'+v+'"]');if(b)b.classList.add('active');
  renderFor(v);window.scrollTo(0,0);
}
document.querySelectorAll('.nav button').forEach(function(b){b.onclick=function(){switchView(b.getAttribute('data-v'));};});

/* ============ INIT ============ */
load();loadSync();applyTheme();
if(window.matchMedia){try{window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){if(state.set.theme==='auto')applyTheme();});}catch(e){}}
renderPills();renderClose();
if(syncReady())ghPull(false);
document.addEventListener('visibilitychange',function(){if(!document.hidden&&syncReady())ghPull(false);});
</script>
